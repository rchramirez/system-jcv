// ─────────────────────────────────────────────────────────────────
// HELPER — formatea timestamp con auditoría de forma compacta
// ─────────────────────────────────────────────────────────────────
function fmtAudit(isoTs, userName) {
  if (!isoTs) return '—';
  const d = new Date(isoTs);
  if (isNaN(d.getTime())) return isoTs;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  const who = userName ? ` · ${userName}` : '';
  return `${dd}/${mm}/${yy} ${hh}:${mi}${who}`;
}
 
// Chip de auditoría inline — para usar en columnas de tabla
function auditChip(label, isoTs, userName, color) {
  if (!isoTs) return null;
  const chip = el('div', { style: `display:flex;flex-direction:column;gap:2px` });
  chip.appendChild(el('span', {
    style: `font-size:9.5px;font-weight:700;color:${color||'var(--text-muted)'};text-transform:uppercase;letter-spacing:.06em`
  }, label));
  chip.appendChild(el('span', {
    style: `font-size:11.5px;color:var(--text-secondary);white-space:nowrap`
  }, fmtAudit(isoTs, userName)));
  return chip;
}

// ─────────────────────────────────────────────────────────────────
// renderAlumnosTab() — REEMPLAZA la función existente completa
// Nuevas features:
//   • Tabs: En Curso | Egresados | Dados de Baja
//   • Filtro por cuatrimestre (período)
//   • Columnas de auditoría (creado, modificado)
//   • Botón "Dar de baja" con modal de motivo
//   • Re-inscribir desde la solapa "Dados de Baja"
// ─────────────────────────────────────────────────────────────────
function renderAlumnosTab(grade) {
  const gc = GRADE_COLORS[grade];
 
  // Inicializar sub-tab state
  if (!State._alumTab) State._alumTab = {};
  if (!State._alumTab[grade]) State._alumTab[grade] = 'activo';
  const activeTab = State._alumTab[grade];
 
  const fullList = safeArr(State.enrollments[grade]);
 
  // Separar por status
  const enActivo     = fullList.filter(e => !e.status || e.status === 'activo');
  const enEgresados  = fullList.filter(e => e.status === 'aprobado' || e.status === 'desaprobado');
  const enBaja       = fullList.filter(e => e.status === 'baja');
  const currentList  = activeTab === 'activo' ? enActivo : activeTab === 'egresados' ? enEgresados : enBaja;
 
  // ── Stats bar (sobre enActivo)
  const allScoresA = enActivo.map(e => e.scores||{});
  const nTotal     = enActivo.length;
  const nAppr      = enEgresados.filter(e => e.status==='aprobado').length;
  const nProg      = allScoresA.filter(s => !isComplete(s)).length;
  const nFailed    = enEgresados.filter(e => e.status==='desaprobado').length;
 
  const statsBar = el('div', { class:'alumnos-stats-bar' },
    _aStatBox(nTotal+'',  'En curso',     gc.bar),
    el('div',{class:'alumno-stat-div'}),
    _aStatBox(nAppr+'',   'Egresados',    '#16A34A'),
    el('div',{class:'alumno-stat-div'}),
    _aStatBox(enBaja.length+'','Bajas',   '#D97706'),
    el('div',{class:'alumno-stat-div'}),
    _aStatBox(nFailed+'', 'Desaprobados', '#E11D48'),
  );
 
  // ── Sub-tabs: En Curso / Egresados / Dados de Baja
  const TAB_DEF = [
    { key:'activo',    label:'En Curso',      count: enActivo.length,    color: '#3B82F6' },
    { key:'egresados', label:'Egresados',      count: enEgresados.length, color: '#16A34A' },
    { key:'baja',      label:'Dados de Baja',  count: enBaja.length,      color: '#D97706' },
  ];
 
  const tabsEl = el('div', {
    style:`display:flex;align-items:center;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border-soft);background:var(--bg-subtle);flex-wrap:wrap`
  }, ...TAB_DEF.map(t => {
    const isA = activeTab === t.key;
    const btn = el('button', {
      style:`display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:${isA?700:500};font-family:'DM Sans','Inter',sans-serif;cursor:pointer;border:1.5px solid ${isA ? t.color : 'var(--border-soft)'};background:${isA ? t.color+'18' : 'transparent'};color:${isA ? t.color : 'var(--text-secondary)'};transition:all .15s;white-space:nowrap`,
      onClick: () => { State._alumTab[grade] = t.key; renderPage(); }
    },
      el('span',{},t.label),
      el('span',{
        style:`min-width:20px;height:20px;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 5px;background:${isA?t.color:'var(--bg-subtle)'};color:${isA?'#fff':'var(--text-muted)'}`
      }, t.count+'')
    );
    return btn;
  }));
 
  // ── Período actual
  const sem = State.currentSemester || {};
  const periodBadge = sem.name ? el('div', {
    style:`display:flex;align-items:center;gap:6px;padding:5px 12px;background:${gc.bar}14;border:1px solid ${gc.bar}30;border-radius:8px;font-size:12px;font-weight:600;color:${gc.bar}`
  },
    el('span',{style:'font-size:14px'},'📅'),
    el('span',{},sem.name)
  ) : null;
 
  // ── Pager state
  if (!State._alumPager) State._alumPager = {};
  const PK = grade + '_' + activeTab;
  const P  = State._alumPager[PK] = State._alumPager[PK] || { page:1, q:'' };
  const PAGE_SIZE = 15;
 
  // ── Toolbar
  const sWrap = el('div', { class:'alumnos-search-wrap' });
  const sIcon = el('span', { class:'alumnos-search-icon' }); sIcon.innerHTML = IC.search;
  const sInp  = el('input', { class:'alumnos-search-input', placeholder:'Buscar alumno...', value: P.q });
  sInp.addEventListener('input', e => { P.q = e.target.value; P.page = 1; paintAll(); });
  sWrap.append(sIcon, sInp);
 
  const rightBtns = el('div', { class:'alumnos-toolbar-right' });
  if (activeTab === 'activo') {
    rightBtns.appendChild(el('button', {
      class:'btn btn-primary btn-sm',
      onClick: () => openEnrollModal(grade)
    }, '＋ Inscribir'));
    // Egreso masivo: mueve todos los que tienen notas completas a Egresados
    const completedCount = enActivo.filter(e => isComplete(e.scores||{})).length;
    if (completedCount > 0) {
      rightBtns.appendChild(el('button', {
        class:'btn btn-secondary btn-sm',
        title:`${completedCount} alumno${completedCount!==1?'s':''} con notas completas`,
        onClick: () => openEgresoMasivoModal(enActivo.filter(e=>isComplete(e.scores||{})), grade)
      }, '🎓 Egreso masivo ('+completedCount+')'));
    }
  } else if (activeTab === 'baja') {
    rightBtns.appendChild(el('button', {
      class:'btn btn-primary btn-sm',
      onClick: () => openReinscripcionModal(enBaja, grade)
    }, '🔄 Re-inscribir'));
  } //TODO se agrego el else if

  // El botón "＋ Inscribir" vive en schools-tabs-bar (actionBtn),
  // aquí solo ponemos el badge del período activo
  const toolbar = el('div', { class:'alumnos-toolbar' },
    sWrap,
    periodBadge,
    rightBtns
  );
 
  const tableSlot = el('div', { class:'alumnos-table-slot' });
  const pagerSlot = el('div', { class:'alumnos-pager-slot' });
 
  function _aStatBox(val, lbl, color) {
    return el('div', { class:'alumno-stat' },
      el('div', { class:'alumno-stat-val', style:`color:${color}` }, val),
      el('div', { class:'alumno-stat-lbl' }, lbl)
    );
  }
 
  function _filtered() {
    return currentList.filter(entry => {
      const person = safeArr(State.people).find(p => p.id === entry.personId);
      if (!person) return false;
      if (P.q) {
        const hay = ((person.name||'') + ' ' + (person.lastName||'')).toLowerCase();
        if (!hay.includes(P.q.toLowerCase())) return false;
      }
      return true;
    });
  }
 
  function paintAll() { paintTable(); paintPager(); }
 
  function paintTable() {
    tableSlot.innerHTML = '';
    const filtered = _filtered();
    if (!filtered.length) {
      tableSlot.appendChild(el('div', { class:'alumnos-empty-state' },
        el('span', { style:'font-size:28px;opacity:.3' }, activeTab === 'baja' ? '🚪' : '🔍'),
        el('div', { style:'font-weight:600;color:var(--text-primary);margin-top:6px' },
          activeTab === 'baja' ? 'Sin registros de baja' : 'Sin resultados'),
        el('div', { style:'font-size:12px;color:var(--text-muted);margin-top:2px' },
          activeTab === 'activo' ? 'Probá con otro filtro.' : '')
      ));
      pagerSlot.innerHTML = '';
      return;
    }
 
    const pages     = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    P.page          = Math.min(Math.max(1, P.page), pages);
    const start_i   = (P.page - 1) * PAGE_SIZE;
    const pageItems = filtered.slice(start_i, start_i + PAGE_SIZE);
 
    // Cabeceras según el tab activo
    let heads;
    if (activeTab === 'activo') {
      heads = ['Alumno', ...SCORE_FIELDS.map(f => SCORE_LABELS[f]), 'Prom.', 'Estado', 'Creado', 'Acciones'];
    } else if (activeTab === 'egresados') {
      heads = ['Alumno', 'Prom. Final', 'Estado', 'Período', 'Inscripto', 'Última mod.', 'Acciones'];
    } else {
      heads = ['Alumno', 'Grado', 'Motivo de baja', 'Fecha de baja', 'Registrado por', 'Acciones'];
    }
 
    const tbody = el('tbody', {});
 
    pageItems.forEach(entry => {
      const person  = safeArr(State.people).find(p => p.id === entry.personId);
      if (!person) return;
 
      const scores   = entry.scores || {};
      const avg      = fmtAvg(scores);
      const done     = isComplete(scores);
      const appr     = done && passed(scores);
      const avgColor = !done ? '#D97706' : appr ? '#16A34A' : '#E11D48';
 
      const stKey    = entry.status || 'activo';
      const stCfg    = ENROLLMENT_STATUS_COLORS[stKey] || ENROLLMENT_STATUS_COLORS.activo;
      const stLabel  = ENROLLMENT_STATUS_LABELS[stKey] || stKey;
      const statusBadge = el('div', {
        style:`display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:${stCfg.bg};color:${stCfg.text};font-size:11px;font-weight:700;white-space:nowrap`
      },
        el('span',{style:`width:6px;height:6px;border-radius:50%;background:${stCfg.dot};flex-shrink:0`}),
        stLabel
      );
 
      // Columna persona
      const personCell = el('td', {}, el('div', { style:'display:flex;align-items:center;gap:10px' },
        Avatar(person.name, person.lastName, person.photoUrl||'', 34, 12),
        el('div', {},
          el('div', { style:'font-weight:600;font-size:13px;color:var(--text-primary)' }, person.name + ' ' + person.lastName),
          el('div', { style:'font-size:11px;color:var(--text-muted)' }, person.phone || person.email || '')
        )
      ));
 
      let row;
 
      if (activeTab === 'activo') {
        const isEd = State.editingScores === entry.personId;
        const scoreCells = SCORE_FIELDS.map(f => {
          if (isEd) {
            const i = el('input', { class:'input score-input', type:'number', min:'0', max:'10', step:'0.5', value: State.localScores[f] || '' });
            i.addEventListener('input', e => { State.localScores[f] = e.target.value; });
            return el('td', { class:'center' }, i);
          }
          const v = scores[f]; const isEmpty = v === '' || v == null;
          const color = !isEmpty ? (parseFloat(v) >= 6 ? '#16A34A' : '#E11D48') : 'var(--text-muted)';
          return el('td', { class:'center' }, el('span', { style:`font-weight:${isEmpty?400:700};color:${color};font-size:13px` }, isEmpty ? '–' : v));
        });
 
        const createdCell = el('td', {
          style:'font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:110px'
        }, fmtAudit(entry.createdAt, entry.createdByName));
 
        const actionCell = isEd
          ? el('td', { class:'center' }, el('div', { class:'alum-actions' },
              el('button', { class:'btn btn-primary btn-xs', onClick: () => doSaveScores(entry.enrollmentId) }, '✓'),
              el('button', { class:'btn btn-ghost btn-xs', onClick: () => { State.editingScores = null; paintAll(); } }, '✕')
            ))
          : el('td', { class:'center' }, el('div', { class:'alum-actions' },
              el('button', { class:'alum-action-btn alum-btn-view',  title:'Ver perfil', onClick: () => viewPersonModal(person) }, svgI('eye', 14)),
              el('button', { class:'alum-action-btn alum-btn-edit',  title:'Editar notas', onClick: () => { State.editingScores = entry.personId; State.localScores = { ...scores }; paintAll(); } }, svgI('pencil', 14)),
              el('button', { class:'alum-action-btn alum-btn-graduate', title:'Mover a Egresados', onClick: () => openMoverEgresadosModal(person, entry, grade) },
                el('span', { style:'font-size:13px;line-height:1' }, '🎓')
              ),
              el('button', { class:'alum-action-btn alum-btn-del',   title:'Dar de baja', onClick: () => openBajaModal(person, entry, grade) },
                el('span', { style:'font-size:11px;line-height:1;font-weight:700' }, '✕')
              )
            ));
 
        row = el('tr', {},
          personCell, ...scoreCells,
          el('td', { class:'center' }, el('span', { class:'avg-badge', style:`background:${avgColor}18;color:${avgColor};border:1px solid ${avgColor}30` }, avg)),
          el('td', { class:'center' }, statusBadge),
          createdCell,
          actionCell
        );
 
      } else if (activeTab === 'egresados') {
        row = el('tr', {},
          personCell,
          el('td', { class:'center' }, el('span', { class:'avg-badge', style:`background:${avgColor}18;color:${avgColor};border:1px solid ${avgColor}30` }, avg)),
          el('td', { class:'center' }, statusBadge),
          el('td', { class:'center', style:'font-size:12px;color:var(--text-secondary);white-space:nowrap' }, _periodName(entry.period)),
          el('td', { class:'center', style:'font-size:11px;color:var(--text-muted);white-space:nowrap' }, fmtDate(entry.enrolledAt)),
          el('td', { class:'center', style:'font-size:11px;color:var(--text-muted);white-space:nowrap' }, fmtAudit(entry.updatedAt, entry.updatedByName)),
          el('td', { class:'center' }, el('button', { class:'alum-action-btn alum-btn-view', title:'Ver perfil', onClick: () => viewPersonModal(person) }, svgI('eye', 14)))
        );
 
      } else { // baja
        const motivoLabel = BAJA_MOTIVOS_LABELS[entry.bajaMotivo] || entry.bajaMotivo || '—';
        row = el('tr', {},
          personCell,
          el('td', {}, el('span', { style:`font-size:11px;font-weight:600;color:${gc.text};background:${gc.bg};padding:2px 8px;border-radius:20px` }, GRADE_LABELS[grade])),
          el('td', {}, el('div', { style:'display:flex;flex-direction:column;gap:2px' },
            el('span', { style:'font-size:13px;font-weight:600;color:var(--text-primary)' }, motivoLabel),
            entry.bajaDetail ? el('span', { style:'font-size:11px;color:var(--text-muted)' }, entry.bajaDetail) : null
          )),
          el('td', { style:'font-size:11px;color:var(--text-muted);white-space:nowrap' }, fmtDate(entry.bajaAt || entry.updatedAt)),
          el('td', { style:'font-size:11px;color:var(--text-muted)' }, entry.updatedByName || '—'),
          el('td', { class:'center' }, el('div', { class:'alum-actions' },
            el('button', { class:'alum-action-btn alum-btn-view', title:'Ver perfil', onClick: () => viewPersonModal(person) }, svgI('eye', 14)),
            el('button', { class:'btn btn-ghost btn-xs btn-sm', title:'Re-inscribir', style:'font-size:11px', onClick: () => openEnrollModal(grade) }, '↩ Re-inscribir')
          ))
        );
      }
 
      tbody.appendChild(row);
    });
 
    const thStyle = 'white-space:nowrap';
    tableSlot.appendChild(el('div', { class:'table-wrap' },
      el('div', { class:'table-scroll' },
        el('table', {},
          el('thead', {}, el('tr', {}, heads.map((h, i) => el('th', { class: i > 0 ? 'center' : '', style: thStyle }, h)))),
          tbody
        )
      )
    ));
  }
 
  function paintPager() {
    pagerSlot.innerHTML = '';
    const filtered = _filtered();
    const pages    = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (pages <= 1) return;
    const from  = (P.page - 1) * PAGE_SIZE + 1;
    const to    = Math.min(P.page * PAGE_SIZE, filtered.length);
    const mkBtn = (lbl, pg, disabled, active) => {
      const b = el('button', { class:'pager-btn' + (active ? ' pager-active' : '') + (disabled ? ' pager-disabled' : '') }, lbl);
      if (!disabled && !active) b.addEventListener('click', () => { P.page = pg; paintAll(); });
      return b;
    };
    pagerSlot.append(
      mkBtn('«', 1, P.page===1, false),
      mkBtn('‹', P.page-1, P.page===1, false),
      ...Array.from({length: Math.min(5, pages)}, (_, i) => {
        const s = Math.max(1, P.page-2), pg = s + i;
        return pg <= pages ? mkBtn(pg+'', pg, false, pg===P.page) : null;
      }).filter(Boolean),
      mkBtn('›', P.page+1, P.page===pages, false),
      mkBtn('»', pages,    P.page===pages, false),
      el('span', { class:'pager-info' }, `${from}–${to} de ${filtered.length}`)
    );
  }
 
  setTimeout(paintAll, 0);
 
  return el('div', { class:'alumnos-wrap' },
    statsBar,
    el('div', { class:'alumnos-card' }, tabsEl, toolbar, tableSlot, pagerSlot)
  );
}

// ─────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────
// openMoverEgresadosModal() — marca un alumno como Aprobado o Desaprobado
// y le asigna el período académico correspondiente
// ─────────────────────────────────────────────────────────────────
function openMoverEgresadosModal(person, entry, grade) {
  const gc = GRADE_COLORS[grade];
  const personName = (person.name||'') + ' ' + (person.lastName||'');
  const periods = safeArr(State.periods);
  let selectedStatus = 'aprobado';
  let selectedPeriod = (State.currentSemester && State.currentSemester.id) || (periods.length ? periods[periods.length-1].id : '');
 
  // Selector de estado (Aprobado / Desaprobado)
  const statusWrap = el('div', { style:'display:flex;gap:8px;margin-bottom:4px' });
  function renderStatusBtns() {
    statusWrap.innerHTML = '';
    [['aprobado','✓ Aprobado','#16A34A'],['desaprobado','✕ Desaprobado','#E11D48']].forEach(([v,l,col]) => {
      const isA = selectedStatus === v;
      const btn = el('button', {
        style:`flex:1;padding:10px;border-radius:9px;border:1.5px solid ${isA?col:'var(--border-soft)'};background:${isA?col+'18':'transparent'};color:${isA?col:'var(--text-secondary)'};font-size:13px;font-weight:${isA?700:500};font-family:'DM Sans','Inter',sans-serif;cursor:pointer;transition:all .15s`,
        onClick: () => { selectedStatus = v; renderStatusBtns(); }
      }, l);
      statusWrap.appendChild(btn);
    });
  }
  renderStatusBtns();
 
  // Selector de período
  const periodWrap = el('div', {});
  if (!periods.length) {
    periodWrap.appendChild(el('div', {
      style:'padding:12px;border-radius:8px;background:#FEF3C7;color:#92400E;font-size:13px;border:1px solid #F59E0B30'
    }, '⚠ No hay períodos creados. Creá uno en Configuración → Períodos Académicos.'));
  } else {
    const sel = el('select', { class:'input' });
    periods.forEach(p => {
      const o = el('option', { value:p.id }, p.name + (p.status==='activo' ? ' ★ Activo' : ''));
      if (p.id === selectedPeriod) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', e => { selectedPeriod = e.target.value; });
    periodWrap.appendChild(sel);
  }
 
  const body = el('div', {},
    // Header persona
    el('div', { style:`display:flex;align-items:center;gap:14px;padding:14px 16px;background:linear-gradient(135deg,${gc.bar}18,${gc.bar}08);border:1px solid ${gc.bar}30;border-radius:12px;margin-bottom:18px` },
      Avatar(person.name, person.lastName, person.photoUrl||'', 44, 15),
      el('div', {},
        el('div', { style:'font-size:15px;font-weight:700;color:var(--text-primary)' }, personName),
        el('div', { style:`font-size:12px;font-weight:600;color:${gc.text};background:${gc.bg};padding:2px 8px;border-radius:20px;display:inline-block;margin-top:3px` }, GRADE_LABELS[grade])
      )
    ),
    el('div', { class:'field' },
      el('label', { class:'field-label' }, 'Resultado del alumno'),
      statusWrap
    ),
    el('div', { class:'field', style:'margin-top:12px' },
      el('label', { class:'field-label' }, 'Período académico'),
      periodWrap
    ),
    el('div', { class:'modal-actions', style:'margin-top:18px;padding-top:14px;border-top:1px solid var(--border-soft)' },
      el('button', { class:'btn btn-secondary', onClick: closeModal }, 'Cancelar'),
      el('button', {
        class:'btn btn-primary',
        style:'min-width:160px',
        onClick: async function() {
          if (!selectedPeriod && periods.length) { toast('Seleccioná un período', 'error'); return; }
          this.disabled = true; this.textContent = 'Procesando...';
          setLoading(true);
          try {
            await gasMut('setEnrollmentStatus', entry.enrollmentId, selectedStatus, selectedPeriod, (State.currentUser||{}).id||'');
            toast(`${personName} movido a Egresados`, 'success');
            closeModal();
            State.enrollments = safeObj(await gasRead('getEnrollments', {}));
            renderPage();
          } catch(e) {
            toast(e.message, 'error');
            this.disabled = false; this.textContent = '🎓 Confirmar';
          } finally { setLoading(false); }
        }
      }, '🎓 Confirmar')
    )
  );
 
  openModal('Mover a Egresados — ' + personName, body);
}

// Helper: obtiene el nombre de un período dado su ID
function _periodName(periodId) {
  if (!periodId) return '—';
  const p = safeArr(State.periods).find(x => x.id === periodId);
  return p ? p.name : periodId;
}

// ─────────────────────────────────────────────────────────────────
// openBajaModal() — modal de baja con motivo, detalle y confirmación
// REEMPLAZA la función confirmUnenroll() existente
// ─────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────
// openEgresoMasivoModal() — aprueba/desaprueba alumnos con notas completas
// Egresados = Aprobados (prom ≥ 6)
// Dados de baja = Desaprobados + quedaron libres (lógica de asistencia)
// ─────────────────────────────────────────────────────────────────
function openEgresoMasivoModal(entries, grade) {
  const gc       = GRADE_COLORS[grade];
  const periods  = safeArr(State.periods);
  const activePeriod = State.currentSemester || (periods.find(p=>p.status==='activo')) || null;
  let selectedPeriod = activePeriod ? activePeriod.id : (periods.length ? periods[0].id : '');
 
  const approved   = entries.filter(e => passed(e.scores||{}));
  const disapproved= entries.filter(e => !passed(e.scores||{}));
 
  // Selector de período
  const periodSel = el('div',{class:'field',style:'margin-bottom:16px'});
  periodSel.appendChild(el('label',{class:'field-label'},'Período académico'));
  if (!periods.length) {
    periodSel.appendChild(el('div',{style:'padding:10px;background:#FEF3C7;border-radius:8px;font-size:13px;color:#92400E'},'⚠ No hay períodos. Creá uno en Configuración.'));
  } else {
    const sel = el('select',{class:'input'});
    periods.forEach(p=>{
      const o=el('option',{value:p.id},p.name+(p.status==='activo'?' ★ Activo':''));
      if(p.id===selectedPeriod)o.selected=true;
      sel.appendChild(o);
    });
    sel.addEventListener('change',e=>{selectedPeriod=e.target.value;});
    periodSel.appendChild(sel);
  }
 
  const summaryEl = el('div',{style:'display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap'});
  const mkChip=(n,lbl,color)=>el('div',{
    style:`display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:${color}18;border:1.5px solid ${color}40;flex:1;min-width:140px`
  },
    el('span',{style:`font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:${color}`},n+''),
    el('div',{},
      el('div',{style:`font-size:12px;font-weight:700;color:${color}`},lbl),
      el('div',{style:'font-size:11px;color:var(--text-muted)'},n===1?'alumno':'alumnos')
    )
  );
  summaryEl.append(
    mkChip(approved.length,'Aprobados (→ Egresados)','#16A34A'),
    mkChip(disapproved.length,'Desaprobados (→ Dados de baja)','#E11D48')
  );
 
  const body = el('div',{},
    el('div',{style:`padding:14px 16px;background:linear-gradient(135deg,${gc.bar}18,${gc.bar}08);border:1px solid ${gc.bar}30;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:12px`},
      el('span',{style:'font-size:24px'},{escuelaVida:'📖',consolidacion:'🌱',obreros1:'⚒',obreros2:'🏛'}[grade]||'📚'),
      el('div',{},
        el('div',{style:`font-size:15px;font-weight:700;color:${gc.text}`},GRADE_LABELS[grade]),
        el('div',{style:'font-size:12px;color:var(--text-muted)'},entries.length+' alumnos con notas completas')
      )
    ),
    summaryEl,
    periodSel,
    el('div',{style:'background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:12.5px;color:#1E40AF;line-height:1.6'},
      '📋 Los aprobados (prom ≥ 6) quedarán en el tab <strong>Egresados</strong>. Los desaprobados quedarán en <strong>Dados de baja</strong> con motivo "Reprobó".'
    ),
    el('div',{class:'modal-actions',style:'padding-top:14px;border-top:1px solid var(--border-soft)'},
      el('button',{class:'btn btn-secondary',onClick:closeModal},'Cancelar'),
      el('button',{
        class:'btn btn-primary',
        style:'min-width:160px',
        onClick: async function(){
          if(!selectedPeriod&&periods.length){toast('Seleccioná un período','error');return;}
          this.disabled=true; this.textContent='Procesando...';
          setLoading(true);
          try {
            const userId=(State.currentUser||{}).id||'';
            // Aprobados → status aprobado
            for(const e of approved){
              await gasMut('setEnrollmentStatus',e.enrollmentId,'aprobado',selectedPeriod,userId);
            }
            // Desaprobados → baja con motivo reprobo
            for(const e of disapproved){
              await gasMut('unenrollPerson',e.enrollmentId,'reprobo','Reprobó el período',userId);
            }
            toast(`Egreso masivo completado: ${approved.length} aprobados, ${disapproved.length} dados de baja`,'success');
            closeModal();

// ── renderAuditPanel con hero [REEMPLAZAR función completa] ───────────
function renderAuditPanel() {
    const isAdmin = State.currentUser.role === 'admin';

  // ── Hero (mismo patrón que Personas/Células/Nexos/Ministerios)
  const hero = el('div', { class:'sect-hero' },
    el('div', { class:'sect-hero-band', style:{ background:'linear-gradient(135deg,#374151,#1F2937)' } }),
    el('div', { class:'sect-hero-body' },
      el('div', { class:'sect-hero-left', style:'flex-wrap:wrap;gap:12px' },
        el('div', { class:'sect-hero-icon', style:{ background:'#37415118', color:'#374151', border:'1.5px solid #37415140' } }, '📋'),
        el('div', {},
          el('div', { class:'sect-hero-eyebrow' }, 'Sistema'),
          el('h1',  { class:'sect-hero-title' }, 'Registro de Auditoría'),
          el('div', { style:'font-size:13px;color:var(--text-muted);margin-top:4px' }, 'Acciones realizadas por usuarios con fecha y hora')
        )
      ),
      el('div', { class:'sect-hero-metrics' },
        el('div', { class:'sect-metric' },
          el('div', { class:'sect-metric-val', id:'audit-total-cnt', style:'color:#374151' }, '—'),
          el('div', { class:'sect-metric-lbl' }, 'registros')
        )
      )
    )
  );


  const ENTITIES = ['Todas','Personas','Inscripciones','Calificaciones','Clases','Celulas','Nexos','Usuarios'];
  const ACTIONS  = ['Todas','CREATE','UPDATE','DELETE','ENROLL','UNENROLL','BAJA','STATUS_CHANGE','CHANGE_PASSWORD'];
  let filterEntity = 'Todas', filterAction = 'Todas';

  let auditSearch = '';
  const AUDIT_PAGE = 20;
  let auditPage = 1;
  let allRecords = [];

    // ── Toolbar: buscador + selects + refresh

  function makeSelect(label, options, onChange) {
        const w2 = el('div', { style:'display:flex;align-items:center;gap:6px' });
    w2.appendChild(el('span', { style:'font-size:12px;font-weight:600;color:var(--text-muted)' }, label));
    const sel = el('select', { class:'input', style:'padding:6px 10px;font-size:12px;width:auto' });
    options.forEach(o => { const opt = el('option', { value:o }, o); sel.appendChild(opt); });
    sel.addEventListener('change', e => { onChange(e.target.value); auditPage = 1; renderTable(); });
    w2.appendChild(sel);
    return w2;
  }
  
  // Buscador
  const sWrap = el('div', { class:'audit-search-wrap' });
  const sIcon = el('span', { class:'alumnos-search-icon' }); sIcon.innerHTML = IC.search;
  const sInp  = el('input', {
    class:'alumnos-search-input',
    placeholder:'Buscar por usuario, entidad, acción...',
    style:'min-width:220px'
  });
  sInp.addEventListener('input', e => { auditSearch = e.target.value; auditPage = 1; renderTable(); });
  sWrap.append(sIcon, sInp);

  const filterRow = el('div', { class:'audit-toolbar' },
    sWrap,
    makeSelect('Entidad:', ENTITIES, v => { filterEntity = v; }),
    makeSelect('Acción:',  ACTIONS,  v => { filterAction = v; }),
    el('button', { class:'btn btn-ghost btn-sm', style:'white-space:nowrap', onClick: () => { auditPage = 1; loadAudit(); } }, '↻ Actualizar')
  );

  const tableSlot = el('div', {});
  const pagerSlot = el('div', { style:'display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:10px 0 4px' });
  const wrap = el('div', {}, hero, filterRow, tableSlot, pagerSlot);


    const ACTION_COLORS = { CREATE:'#16A34A', UPDATE:'#3B82F6', DELETE:'#DC2626', ENROLL:'#8B5CF6', UNENROLL:'#D97706', BAJA:'#F59E0B', STATUS_CHANGE:'#0891B2', CHANGE_PASSWORD:'#DB2777' };

  function getFiltered() {
    const q  = auditSearch.toLowerCase().trim();
    return allRecords.filter(r => {
      if (filterEntity !== 'Todas' && r.entity !== filterEntity) return false;
      if (filterAction !== 'Todas' && r.action !== filterAction) return false;
      if (q) {
        let meta = '';
        try { meta = Object.values(JSON.parse(r.meta || '{}')).join(' '); } catch(_) {}
        const hay = ((r.action||'')+' '+(r.entity||'')+' '+(r.userName||r.userId||'')+' '+meta).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function renderTable() {
    tableSlot.innerHTML = '';
    pagerSlot.innerHTML = '';
    const filtered = getFiltered();

    // Actualizar contador en hero
    const cntEl = document.getElementById('audit-total-cnt');
    if (cntEl) cntEl.textContent = filtered.length;

    if (!filtered.length) {
      tableSlot.appendChild(el('div', { class:'empty-state' }, el('span', { class:'empty-state-icon' }, '📋'), auditSearch ? 'Sin resultados para la búsqueda.' : 'Sin registros'));
      return;
    }

    const pages   = Math.max(1, Math.ceil(filtered.length / AUDIT_PAGE));
    auditPage     = Math.min(Math.max(1, auditPage), pages);
    const from    = (auditPage - 1) * AUDIT_PAGE;
    const pageRec = filtered.slice(from, from + AUDIT_PAGE);

    const tbody = el('tbody', {}, ...pageRec.map(r => {
      let meta = '';
      try { const m = JSON.parse(r.meta || '{}'); meta = Object.entries(m).map(([k,v]) => `${k}: ${v}`).join(' · '); } catch(_) {}
      const ac = ACTION_COLORS[r.action] || '#94A3B8';
      return el('tr', {},
        el('td', { style:'font-size:11.5px;color:var(--text-muted);white-space:nowrap' }, fmtAudit ? fmtAudit(r.timestamp, '') : r.timestamp),
        el('td', {}, el('span', { style:`font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${ac}18;color:${ac}` }, r.action)),
        el('td', { style:'font-size:12.5px;color:var(--text-secondary)' }, r.entity),
        el('td', { style:'font-size:11.5px;color:var(--text-muted)' }, r.userName || r.userId || '—'),
        el('td', { style:'font-size:11px;color:var(--text-muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, meta)
      );
    }));

    tableSlot.appendChild(el('div', { class:'table-wrap' },
      el('div', { class:'table-scroll' },
        el('table', {},
          el('thead', {}, el('tr', {}, ...['Fecha / Hora','Acción','Entidad','Usuario','Detalle'].map(h => el('th', {}, h)))),
          tbody
        )
      )
    ));

    // Paginación
    if (pages > 1) {
      const toV  = Math.min(auditPage * AUDIT_PAGE, filtered.length);
      const fromV = from + 1;
      const mk = (lbl, p, dis, act) => {
        const b = el('button', { class:'pager-btn' + (act ? ' pager-active' : '') + (dis ? ' pager-disabled' : '') }, lbl);
        if (!dis && !act) b.addEventListener('click', () => { auditPage = p; renderTable(); });
        return b;
      };
      const s = Math.max(1, auditPage - 2);
      const e = Math.min(pages, s + 4);
      pagerSlot.append(mk('«', 1, auditPage === 1, false), mk('‹', auditPage - 1, auditPage === 1, false));
      for (let i = s; i <= e; i++) pagerSlot.appendChild(mk(i + '', i, false, i === auditPage));
      pagerSlot.append(
        mk('›', auditPage + 1, auditPage === pages, false),
        mk('»', pages, auditPage === pages, false),
        el('span', { class:'pager-info' }, `${fromV}–${toV} de ${filtered.length}`)
      );
    }
  }

  async function loadAudit() {
    tableSlot.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
    pagerSlot.innerHTML = '';

    try {
            const res = await new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(r => resolve(r && r.ok ? r.data : [])).withFailureHandler(reject).getAuditLog({});
      });
            allRecords = safeArr(res);
      renderTable();
    } catch(e) {
      tableSlot.innerHTML = '';
      tableSlot.appendChild(el('div', { class:'empty-state' }, '⚠ ' + e.message));
    }
  }
  setTimeout(loadAudit,0);
  return wrap;
}

// Modal de Clase — rediseñado
function openClassModal(cls, grade) {
  const isEdit = !!cls;
  const form   = {grade, title:'', description:'', scheduledDate:'', status:'programada', ...(cls||{})};
  const set    = (k,v) => { form[k]=v; };
  const inp    = (key,type,ph) => {
    const i = el('input', {class:'input', type:type||'text', value:form[key]||'', placeholder:ph||''});
    i.addEventListener('input', e => set(key, e.target.value));
    return i;
  };

  // Status selector visual
  const statusWrap = el('div', {class:'status-picker'});
  let currentStatus = form.status;
  function renderStatusPicker() {
    statusWrap.innerHTML = '';
    CLASS_STATUSES.forEach(st => {
      const isA = currentStatus === st.v;
      const btn = el('button', {
        class: 'status-pick-btn' + (isA ? ' active' : ''),
        style: isA ? {background:st.color+'18',color:st.color,border:`2px solid ${st.color}`,fontWeight:'700'} : {},
        onClick: () => { currentStatus = st.v; set('status', st.v); renderStatusPicker(); }
      }, st.label);
      statusWrap.appendChild(btn);
    });
  }
  renderStatusPicker();

  const body = el('div', {class:'class-modal-body'},
    el('div', {class:'class-modal-grade-tag', style:{background:GRADE_COLORS[grade].bg,color:GRADE_COLORS[grade].text}},
      '📚 ' + GRADE_LABELS[grade]
    ),
    el('div', {class:'form-grid'},
      Field('Título de la clase', inp('title','text','Ej: La Fe y sus fundamentos')),
      Field('Fecha', inp('scheduledDate','date')),
    ),
    Field('Descripción (opcional)', (() => {
      const t = el('textarea', {class:'input', rows:'3', style:{resize:'none'}});
      t.value = form.description || '';
      t.addEventListener('input', e => set('description', e.target.value));
      return t;
    })()),
    el('div', {class:'field'}, el('label', {class:'field-label'}, 'Estado'), statusWrap),
    el('div', {class:'modal-actions'},
      el('button', {class:'btn btn-secondary', onClick:closeModal}, 'Cancelar'),
      isEdit ? el('button', {class:'btn btn-danger btn-sm', style:{marginRight:'auto'}, onClick:async()=>{
        const ok = await showConfirm({icon:'🗑',type:'danger',title:'¿Eliminar clase?',msg:'Se borrarán también la asistencia y cuestionarios asociados.',okText:'Sí, eliminar',cancelText:'Cancelar'});
        if(!ok) return;
        setLoading(true);
        try { await gasMut('deleteClass', cls.id); toast('Clase eliminada','success'); closeModal(); State.classes=safeArr(await gasReadArg('getClasses',grade,[])); renderPage(); }
        catch(e){ toast(e.message,'error'); } finally { setLoading(false); }
      }}, '🗑 Eliminar') : null,
      el('button', {class:'btn btn-primary', onClick:saveClass}, isEdit ? '✓ Guardar cambios' : '+ Crear clase')
    )
  );

  async function saveClass() {
    if (!form.title || !form.scheduledDate) { toast('Título y fecha son requeridos','error'); return; }
    setLoading(true);
    try {
      await gasMut('saveClass', {...form, ...(isEdit?{id:cls.id}:{})});
      toast(isEdit?'Clase actualizada':'Clase creada','success');
      closeModal();
      State.classes = safeArr(await gasReadArg('getClasses', form.grade, []));
      renderPage();
    } catch(e) { toast(e.message,'error'); }
    finally { setLoading(false); }
  }
 
  openModal(isEdit ? 'Editar Clase' : 'Nueva Clase', body);
}

// TAB: ASISTENCIA — rediseñado

function renderAttendanceTab(grade) {
  const classes  = safeArr(State.classes).filter(c => c.grade === grade)
    .sort((a,b) => new Date(b.scheduledDate) - new Date(a.scheduledDate));
  const students = safeArr(State.enrollments[grade]).filter(e => !e.status || e.status === 'activo');
 
  if (!classes.length) {
    return el('div', {class:'schools-empty'},
      el('div', {class:'schools-empty-icon'}, '📅'),
      el('div', {class:'schools-empty-title'}, 'No hay clases aún'),
      el('div', {class:'schools-empty-sub'}, 'Creá clases primero desde la sección Clases.'),
      el('button', {class:'btn btn-primary', style:{marginTop:'12px'}, onClick:()=>{State.schoolsTab='clases';renderPage();}}, '→ Ir a Clases')
    );
  }
 
  const selectedCls = State.selectedClass ||
    (State.selectedClass = classes.find(c => c.status === 'programada') || classes[0]);
 
  // Selector de clase mejorado
  const clsSel = el('div', {class:'att-selector-wrap'},
    el('label', {class:'field-label'}, 'Seleccionar clase'),
    el('div', {class:'att-class-pills'},
      classes.slice(0,8).map(c => {
        const isA = selectedCls && c.id === selectedCls.id;
        const st  = CLASS_STATUSES.find(s=>s.v===c.status)||CLASS_STATUSES[0];
        const btn = el('button', {
          class:'att-class-pill'+(isA?' active':''),
          style: isA ? {borderColor:st.color,background:st.color+'12',color:st.color} : {},
          onClick: () => { State.selectedClass=c; renderPage(); }
        },
          el('span',{class:'att-pill-status-dot',style:{background:st.color}}),
          el('span',{class:'att-pill-date'}, fmtDate(c.scheduledDate)),
          el('span',{class:'att-pill-title'}, c.title)
        );
        return btn;
      }),
      classes.length > 8 ? el('span',{class:'att-more-label'},`+${classes.length-8} más`) : null
    )
  );
 
  if (!students.length) {
    return el('div', {}, clsSel,
      el('div', {class:'schools-empty', style:{marginTop:'16px'}},
        el('div',{class:'schools-empty-icon'},'👤'),
        el('div',{class:'schools-empty-title'},'Sin alumnos'),
        el('div',{class:'schools-empty-sub'},'No hay alumnos inscriptos en este grado.')
      )
    );
  }
 
  const attMap = {};
  safeArr(State.attendance)
    .filter(a => a.classId === (selectedCls ? selectedCls.id : ''))
    .forEach(a => { attMap[a.personId] = a; });
 
  if (!State._attDraft || State._attClassId !== (selectedCls ? selectedCls.id : '')) {
    State._attClassId = selectedCls ? selectedCls.id : '';
    State._attDraft   = {};
    students.forEach(s => {
      State._attDraft[s.personId] = {
        personId:     s.personId,
        enrollmentId: s.enrollmentId,
        type:         (attMap[s.personId]||{}).type || '',
        reason:       (attMap[s.personId]||{}).reason || '',
      };
    });
  }
 
  // Resumen en tiempo real
  const counts = {Presente:0, Ausente:0, Justificado:0, Tarde:0};
  Object.values(State._attDraft).forEach(d => { counts[d.type] = (counts[d.type]||0)+1; });
  const pct = students.length ? Math.round(((counts.Presente+counts.Justificado+counts.Tarde)/students.length)*100) : 0;
 
  const summaryBar = el('div', {class:'att-summary-bar'},
    ATTENDANCE_TYPES.map(at => el('div', {class:'att-sum-item'},
      el('div', {class:'att-sum-val', style:{color:at.color}}, counts[at.v]+''),
      el('div', {class:'att-sum-lbl'}, at.label)
    )),
    el('div', {class:'att-sum-pct-wrap'},
      el('div', {class:'att-sum-pct-val', style:{color:pct>=75?'#16A34A':pct>=50?'#D97706':'#DC2626'}}, pct+'%'),
      el('div', {class:'att-sum-pct-lbl'}, 'Presencia')
    )
  );
 
  // Acciones masivas
  const bulkBar = el('div', {class:'att-bulk-bar-v2'},
    el('span', {class:'att-bulk-label'}, 'Marcar todos como:'),
    ATTENDANCE_TYPES.map(at => el('button', {
      class:'att-bulk-pill',
      style:{background:at.bg, color:at.color, border:`1.5px solid ${at.color}40`},
      onClick: () => { Object.keys(State._attDraft).forEach(pid=>{ State._attDraft[pid].type=at.v; }); renderPage(); }
    }, at.icon+' '+at.label))
  );
 
  // ── Marca de ya-guardado por alumno (persiste en el draft)
  if (!State._attSaved) State._attSaved = {};
  const attSavedKey = selectedCls ? selectedCls.id : '';
  if (!State._attSaved[attSavedKey]) State._attSaved[attSavedKey] = new Set();
  const savedSet = State._attSaved[attSavedKey];
 
  // Buscador de alumno en asistencia
  if(!State._attSearch)State._attSearch={};
  State._attSearch[grade]=State._attSearch[grade]||'';
 
  const attSWrap=el('div',{class:'alumnos-search-wrap',style:{maxWidth:'320px',margin:'0 0 12px 0'}});
  const attSIcon=el('span',{class:'alumnos-search-icon'});attSIcon.innerHTML=IC.search;
  const attSInp=el('input',{class:'alumnos-search-input',placeholder:'Buscar alumno...',value:State._attSearch[grade]});
  const attListEl=el('div',{class:'att-students-list'});
 
  function buildAttRows(){
    attListEl.innerHTML='';
    const qAtt=State._attSearch[grade]||'';
    students.forEach(s => {
      const person=safeArr(State.people).find(p=>p.id===s.personId);
      if(!person)return;
      if(qAtt){
        const hay=((person.name||'')+' '+(person.lastName||'')).toLowerCase();
        if(!hay.includes(qAtt.toLowerCase()))return;
      }
      const draft=State._attDraft[s.personId]||{type:'Presente',reason:''};
      const at=ATTENDANCE_TYPES.find(x=>x.v===draft.type)||ATTENDANCE_TYPES[0];
      const isSaved=savedSet.has(s.personId);
 
      const rowEl=el('div',{
        class:'att-student-row'+(isSaved?' att-row-saved':''),
        style:{borderLeft:`3px solid ${at.color}`,background:isSaved?at.color+'08':at.bg+'40'}
      });
 
      const savedBadge=isSaved?el('span',{class:'att-saved-badge'},'✓ Guardado'):null;
 
      const infoEl=el('div',{class:'att-student-info'},
        Avatar(person.name,person.lastName,person.photoUrl||'',36,13),
        el('div',{class:'att-student-text'},
          el('div',{class:'att-student-name'},person.name+' '+person.lastName),
          el('div',{class:'att-student-sub'},isSaved?
            el('span',{style:'color:#16A34A;font-size:11px;font-weight:600'},'✓ Asistencia tomada'):
            (person.cellLeader||person.phone||'')
          )
        )
      );
 
      // Botones de tipo (reactivos sin re-render global)
      const typeBtnsEl=el('div',{class:'att-type-group'});
      function renderTypeBtns(){
        typeBtnsEl.innerHTML='';
        ATTENDANCE_TYPES.forEach(aType=>{
          const isA=draft.type===aType.v;
          const btn=el('button',{
            class:'att-type-btn-v2'+(isA?' active':''),
            style:isA
              ?{background:aType.color,color:'#fff',border:`1.5px solid ${aType.color}`}
              :{background:'var(--bg-subtle)',color:'var(--text-muted)',border:'1.5px solid var(--border-soft)'},
            onClick:()=>{
              State._attDraft[s.personId].type=aType.v;
              draft.type=aType.v;
              rowEl.style.background=aType.bg+'40';
              rowEl.style.borderLeftColor=aType.color;
              renderTypeBtns();
              if(reasonWrap)buildReasonEl();
            }
          },el('span',{},aType.icon),el('span',{class:'att-type-label'},aType.label));
          typeBtnsEl.appendChild(btn);
        });
      }
      renderTypeBtns();
 
      // Motivo (reactivo)
      const reasonWrap=el('div',{});
      function buildReasonEl(){
        reasonWrap.innerHTML='';
        if(draft.type==='Justificado'||draft.type==='Ausente'){
          const i=el('input',{
            class:'att-reason-input',
            placeholder:`Motivo ${draft.type.toLowerCase()}...`,
            value:draft.reason||''
          });
          i.addEventListener('input',e=>{State._attDraft[s.personId].reason=e.target.value;draft.reason=e.target.value;});
          reasonWrap.appendChild(i);
        }
      }
      buildReasonEl();
 
      // Botón guardar individual
      const saveIndBtn=el('button',{
        class:'att-save-ind-btn'+(isSaved?' att-save-ind-saved':''),
        title:isSaved?'Ya guardado — click para actualizar':'Guardar asistencia de este alumno',
        onClick:async function(){
          this.disabled=true;
          const rec=[{personId:s.personId,enrollmentId:s.enrollmentId,type:draft.type,reason:draft.reason||''}];
          try{
            await gasMut3('saveAttendanceBatch',selectedCls.id,rec,State.currentUser.id||'');
            savedSet.add(s.personId);
            // Actualizar State.attendance local
            State.attendance=safeArr(State.attendance).filter(a=>!(a.classId===selectedCls.id&&a.personId===s.personId));
            State.attendance.push({classId:selectedCls.id,personId:s.personId,enrollmentId:s.enrollmentId,type:draft.type,reason:draft.reason||''});
            // Actualizar badge sin re-render global
            savedBadge&&(savedBadge.style.display='');
            rowEl.classList.add('att-row-saved');
            rowEl.style.background=at.color+'08';
            this.textContent='✓';
            this.classList.add('att-save-ind-saved');
            toast(person.name+': asistencia guardada','success');
          }catch(e){toast(e.message,'error');}
          finally{this.disabled=false;}
        }
      },isSaved?'✓':'💾');
 
      rowEl.append(infoEl,typeBtnsEl,reasonWrap,saveIndBtn);
      attListEl.appendChild(rowEl);
    });
  }
 
  attSInp.addEventListener('input',e=>{State._attSearch[grade]=e.target.value;buildAttRows();});
  attSWrap.append(attSIcon,attSInp);
  buildAttRows();
 
  const studentRows = []; // compatibilidad — la lista real es attListEl
 
  return el('div', {class:'att-tab-wrap'},
    clsSel,
    summaryBar,
    bulkBar,
    attSWrap,
    attListEl,
    el('div', {class:'att-save-bar'},
      el('div', {class:'att-save-info'},
        el('span',{style:{fontSize:'20px'}},'💾'),
        el('div',{},
          el('div',{style:{fontWeight:'600',fontSize:'13px',color:'var(--text-primary)'}}, selectedCls ? selectedCls.title : ''),
          el('div',{style:{fontSize:'12px',color:'var(--text-muted)'}}, `${students.length} alumnos · ${pct}% presencia`)
        )
      ),
      el('button', {class:'btn btn-primary', style:{minWidth:'160px'}, onClick:saveAttendance}, '✓ Guardar asistencia')
    )
  );
 
  async function saveAttendance() {
    if (!selectedCls) { toast('Seleccioná una clase', 'error'); return; }
    const records = Object.values(State._attDraft);
    setLoading(true);
    try {
      await gasMut3('saveAttendanceBatch', selectedCls.id, records, State.currentUser.id || '');
      toast('Asistencia guardada correctamente', 'success');
      State.attendance = safeArr(await gasReadArg('getAttendance', '', []));
      delete State._attDraft;
      delete State._attClassId;
      if (selectedCls.status === 'programada') {
        await gasMut('saveClass', {...selectedCls, status:'realizada'});
        State.classes = safeArr(await gasReadArg('getClasses', grade, []));
      }
      renderPage();
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }
}

// TAB: CUESTIONARIOS — rediseñado
// ══════════════════════════════════════════════════════════════
function renderQuestionnairesTab(grade) {
  const classes  = safeArr(State.classes).filter(c => c.grade === grade)
    .sort((a,b) => new Date(b.scheduledDate) - new Date(a.scheduledDate));
 
  if (!classes.length) {
    return el('div', {class:'schools-empty'},
      el('div',{class:'schools-empty-icon'},'📝'),
      el('div',{class:'schools-empty-title'},'No hay clases'),
      el('div',{class:'schools-empty-sub'},'Creá clases primero para poder asignar cuestionarios.'),
      el('button',{class:'btn btn-primary',style:{marginTop:'12px'},onClick:()=>{State.schoolsTab='clases';renderPage();}},'→ Ir a Clases')
    );
  }
 
  const selectedCls = State.selectedClass ||
    (State.selectedClass = classes[0]);
 
  // ── Buscador local
  if(!State._questSearch)State._questSearch={};
  State._questSearch[grade]=State._questSearch[grade]||'';
 
  // ── Selector de clase tipo pills (igual que Asistencia)
  const clsSel = el('div',{class:'att-selector-wrap'},
    el('label',{class:'field-label'},'Seleccionar clase'),
    el('div',{class:'att-class-pills'},
      classes.slice(0,8).map(cls => {
        const isA = selectedCls && cls.id===selectedCls.id;
        const st  = CLASS_STATUSES.find(s=>s.v===cls.status)||CLASS_STATUSES[0];
        const qCount = safeArr(State.questionnaires).filter(q=>q.classId===cls.id).length;
        const btn = el('button',{
          class:'att-class-pill'+(isA?' active':''),
          style: isA ? {borderColor:st.color,background:st.color+'12',color:st.color} : {},
          onClick:()=>{State.selectedClass=cls;renderPage();}
        },
          el('span',{class:'att-pill-status-dot',style:{background:st.color}}),
          el('span',{class:'att-pill-date'},fmtDate(cls.scheduledDate)),
          el('span',{class:'att-pill-title'},cls.title),
          qCount?el('span',{style:'font-size:10px;opacity:.7;margin-left:4px'},'📝'+qCount):null
        );
        return btn;
      }),
      classes.length>8?el('span',{class:'att-more-label'},`+${classes.length-8} más`):null
    )
  );
 
  const quests = safeArr(State.questionnaires).filter(q=>q.classId===selectedCls.id);
  const students = safeArr(State.enrollments[grade]).filter(e=>!e.status||e.status==='activo');
 
  // ── Stats summary (mismo patron que Asistencia)
  const nEntregados = quests.filter(q=>q.status==='entregado').length;
  const nPendientes = quests.filter(q=>q.status!=='entregado'&&(!q.dueDate||new Date(q.dueDate)>=new Date())).length;
  const nVencidos   = quests.filter(q=>q.status!=='entregado'&&q.dueDate&&new Date(q.dueDate)<new Date()).length;
  const pct = quests.length ? Math.round((nEntregados/quests.length)*100) : 0;
 
  const summaryBar = el('div',{class:'att-summary-bar'},
    el('div',{class:'att-sum-item'},el('div',{class:'att-sum-val',style:{color:'#16A34A'}},nEntregados+''),el('div',{class:'att-sum-lbl'},'Entregados')),
    el('div',{class:'att-sum-item'},el('div',{class:'att-sum-val',style:{color:'#D97706'}},nPendientes+''),el('div',{class:'att-sum-lbl'},'Pendientes')),
    el('div',{class:'att-sum-item'},el('div',{class:'att-sum-val',style:{color:'#E11D48'}},nVencidos+''),el('div',{class:'att-sum-lbl'},'Vencidos')),
    el('div',{class:'att-sum-pct-wrap'},
      el('div',{class:'att-sum-pct-val',style:{color:pct>=75?'#16A34A':pct>=50?'#D97706':'#DC2626'}},pct+'%'),
      el('div',{class:'att-sum-pct-lbl'},'Entregado')
    )
  );
 
  // ── Buscador
  const qSWrap=el('div',{class:'alumnos-search-wrap',style:{maxWidth:'320px',margin:'0 0 12px 0'}});
  const qSIcon=el('span',{class:'alumnos-search-icon'});qSIcon.innerHTML=IC.search;
  const qSInp=el('input',{class:'alumnos-search-input',placeholder:'Buscar alumno...',value:State._questSearch[grade]});
  qSInp.addEventListener('input',e=>{State._questSearch[grade]=e.target.value;repaintQuest();});
  qSWrap.append(qSIcon,qSInp);
 
  // ── Filas de alumnos (mismo formato que Asistencia)
  const questSlot=el('div',{});
 
  function repaintQuest(){
    questSlot.innerHTML='';
    const q2=State._questSearch[grade]||'';
    if(!quests.length){
      questSlot.appendChild(el('div',{class:'schools-empty'},
        el('div',{class:'schools-empty-icon'},'📝'),
        el('div',{class:'schools-empty-title'},'Sin cuestionarios para esta clase'),
        el('div',{class:'schools-empty-sub'},'Usá el botón "+ Cuestionario" para asignar.')
      ));
      return;
    }
    // Agrupar por título de cuestionario
    const titles=[...new Set(quests.map(q=>q.title))];
    titles.forEach(title=>{
      const group=quests.filter(q=>q.title===title);
      const nE=group.filter(q=>q.status==='entregado').length;
      const nP=group.length-nE;
      const gPct=group.length?Math.round((nE/group.length)*100):0;
 
      const groupHdr=el('div',{class:'quest-group-hdr'},
        el('div',{class:'quest-group-hdr-left'},
          el('div',{class:'quest-group-title'},title),
          el('div',{class:'quest-group-sub'},
            el('span',{class:'quest-chip quest-ok'},'✓ '+nE),
            el('span',{class:'quest-chip quest-pending'},'⏳ '+nP),
            el('span',{class:'quest-chip quest-avg'},gPct+'%')
          )
        )
      );
      const rows=group.filter(q=>{
        if(!q2)return true;
        const p=safeArr(State.people).find(p=>p.id===q.personId);
        if(!p)return true;
        return((p.name||'')+' '+(p.lastName||'')).toLowerCase().includes(q2.toLowerCase());
      }).map(q=>{
        const person=safeArr(State.people).find(p=>p.id===q.personId);
        if(!person)return null;
        const isDel=q.status==='entregado';
        const isOvd=!isDel&&q.dueDate&&new Date(q.dueDate)<new Date();
        const stColor=isDel?'#16A34A':isOvd?'#E11D48':'#D97706';
        const stLabel=isDel?'Entregado':isOvd?'Vencido':'Pendiente';
 
        const rowEl=el('div',{
          class:'att-student-row quest-student-row',
          style:{borderLeft:`3px solid ${stColor}`,background:stColor+'10'}
        },
          el('div',{class:'att-student-info'},
            Avatar(person.name,person.lastName,person.photoUrl||'',36,13),
            el('div',{class:'att-student-text'},
              el('div',{class:'att-student-name'},person.name+' '+person.lastName),
              el('div',{class:'att-student-sub'},
                q.dueDate?'Vence: '+fmtDate(q.dueDate):(person.cellLeader||person.phone||'')
              )
            )
          ),
          el('div',{class:'quest-row-status'},
            el('span',{class:'quest-row-badge',style:{background:stColor+'18',color:stColor,border:`1px solid ${stColor}40`}},stLabel),
            isDel?el('span',{class:'quest-row-nota',style:{color:parseFloat(q.nota||0)>=6?'#16A34A':'#E11D48'}},q.nota+'pts'):null
          ),
          el('button',{
            class:'btn '+(isDel?'btn-ghost':'btn-primary')+' btn-sm',
            style:{flexShrink:0},
            onClick:()=>openSubmitModal(q)
          },isDel?[svgI('pencil',13),' Editar']:'✓ Entregar')
        );
        return rowEl;
      }).filter(Boolean);
 
      if(rows.length){
        questSlot.appendChild(el('div',{class:'quest-group-block'},groupHdr,el('div',{class:'att-students-list'},...rows)));
      }
    });
  }
 
  setTimeout(repaintQuest,0);
 
  return el('div',{class:'att-tab-wrap'},
    clsSel,
    quests.length?summaryBar:null,
    qSWrap,
    questSlot
  );
}
 
function renderQuestGroup(title, quests) {
  const entregados = quests.filter(q=>q.status==='entregado').length;
  const pendientes = quests.filter(q=>q.status==='pendiente').length;
  const notas      = quests.filter(q=>q.nota).map(q=>parseFloat(q.nota));
  const avgNota    = notas.length ? (notas.reduce((a,b)=>a+b,0)/notas.length).toFixed(1) : '—';
  const pct        = quests.length ? Math.round((entregados/quests.length)*100) : 0;
 
  return el('div', {class:'quest-group-v2'},
    el('div', {class:'quest-group-v2-header'},
      el('div', {class:'quest-group-v2-left'},
        el('div', {class:'quest-group-v2-icon'}, '📝'),
        el('div', {},
          el('div', {class:'quest-group-v2-title'}, title),
          el('div', {class:'quest-group-v2-sub'},
            el('span',{class:'quest-chip quest-ok'},`✓ ${entregados}`),
            el('span',{class:'quest-chip quest-pending'},`⏳ ${pendientes}`),
            el('span',{class:'quest-chip quest-avg'},`Ø ${avgNota}`)
          )
        )
      ),
      el('div', {class:'quest-group-v2-pct-wrap'},
        el('div', {class:'quest-pct-circle'},
          el('div', {class:'quest-pct-val', style:{color:pct>=75?'#16A34A':pct>=50?'#D97706':'#DC2626'}}, pct+'%'),
          el('div', {class:'quest-pct-sub'}, 'Entregado')
        )
      )
    ),
    el('div', {class:'quest-students-grid'},
      quests.map(q => {
        const person = safeArr(State.people).find(p=>p.id===q.personId);
        if (!person) return null;
        const isDel = q.status === 'entregado';
        const isOvd = !isDel && q.dueDate && new Date(q.dueDate) < new Date();
        const stColor = isDel ? '#16A34A' : isOvd ? '#DC2626' : '#D97706';
        const stLabel = isDel ? 'Entregado' : isOvd ? 'Vencido' : 'Pendiente';
 
        return el('div', {class:'quest-student-card', style:{borderTop:`3px solid ${stColor}`}},
          el('div', {class:'quest-sc-head'},
            Avatar(person.name, person.lastName, person.photoUrl||'', 32, 12),
            el('div', {class:'quest-sc-info'},
              el('div', {class:'quest-sc-name'}, person.name+' '+person.lastName),
              el('span', {class:'quest-sc-status', style:{background:stColor+'15',color:stColor}}, stLabel)
            )
          ),
          el('div', {class:'quest-sc-body'},
            el('div', {class:'quest-sc-row'},
              el('span',{class:'quest-sc-label'},'Items:'),
              el('span',{class:'quest-sc-val'}, q.totalItems||'—')
            ),
            q.dueDate ? el('div', {class:'quest-sc-row'},
              el('span',{class:'quest-sc-label'},'Vence:'),
              el('span',{class:'quest-sc-val',style:{color:isOvd?'#DC2626':'inherit'}}, fmtDate(q.dueDate))
            ) : null,
            isDel ? el('div', {class:'quest-sc-row'},
              el('span',{class:'quest-sc-label'},'Nota:'),
              el('span',{class:'quest-sc-nota',style:{color:parseFloat(q.nota)>=6?'#16A34A':'#DC2626'}}, q.nota)
            ) : null
          ),
          el('button', {
            class:'btn '+(isDel?'btn-ghost':'btn-primary')+' btn-sm quest-sc-btn',
            onClick:()=>openSubmitModal(q)
          }, isDel ? svgI('pencil',13)+' Editar' : '✓ Entregar')
        );
      }).filter(Boolean)
    )
  );
}

// TAB: EXÁMENES — tabla de notas examen1/examen2
// ══════════════════════════════════════════════════════════════
function renderExamenesTab(grade) {
  const fullList = safeArr(State.enrollments[grade]).filter(e => !e.status || e.status === 'activo');
  if (!fullList.length) {
    return el('div', {class:'schools-empty'},
      el('div',{class:'schools-empty-icon'},'📋'),
      el('div',{class:'schools-empty-title'},'Sin alumnos'),
      el('div',{class:'schools-empty-sub'},'Inscribí alumnos primero.')
    );
  }
  const examFields = ['examen1','examen2'];
  const examLabels = {examen1:'Examen 1', examen2:'Examen 2'};
 
  // Pager + buscador
  if(!State._examPager)State._examPager={};
  const EP=State._examPager[grade]=State._examPager[grade]||{q:''};
 
  const eSWrap=el('div',{class:'alumnos-search-wrap',style:{margin:'0 0 12px 0',maxWidth:'320px'}});
  const eSIcon=el('span',{class:'alumnos-search-icon'});eSIcon.innerHTML=IC.search;
  const eSInp=el('input',{class:'alumnos-search-input',placeholder:'Buscar alumno...',value:EP.q});
  eSInp.addEventListener('input',e=>{EP.q=e.target.value;repaintExamen();});
  eSWrap.append(eSIcon,eSInp);
 
  const examTableSlot=el('div',{});
 
  function _examFiltered(){
    return fullList.filter(entry=>{
      if(!EP.q)return true;
      const p=safeArr(State.people).find(p=>p.id===entry.personId);
      if(!p)return false;
      return((p.name||'')+' '+(p.lastName||'')).toLowerCase().includes(EP.q.toLowerCase());
    });
  }
 
  function repaintExamen(){
    examTableSlot.innerHTML='';
    const list=_examFiltered();
 
    const tbody = el('tbody', {}, ...list.map(entry => {
    const person = safeArr(State.people).find(p=>p.id===entry.personId);
    if (!person) return null;
    const isEd = State.editingScores === entry.personId + '_exam';
    const scores = isEd ? State.localScores : (entry.scores||{});
 
    const scoreCells = examFields.map(f => {
      if (isEd) {
        const i = el('input',{class:'input score-input',type:'number',min:'0',max:'10',step:'0.5',value:State.localScores[f]||''});
        i.addEventListener('input', e => { State.localScores[f]=e.target.value; });
        return el('td',{class:'center'},i);
      }
      const v = scores[f]; const isEmpty = v===''||v==null;
      const color = !isEmpty ? (parseFloat(v)>=6?'#16A34A':'#DC2626') : 'var(--text-muted)';
      return el('td',{class:'center'}, el('span',{style:{fontWeight:isEmpty?'400':'700',color,fontSize:'14px'}}, isEmpty?'–':v));
    });
 
    const actionCell = isEd
      ? el('td',{class:'center'}, el('div',{style:{display:'flex',gap:'4px',justifyContent:'center'}},
          el('button',{class:'btn btn-primary btn-sm',onClick:async()=>{
            setLoading(true);
            try{
              // Merge solo campos de examen
              const full = {...(entry.scores||{}), ...State.localScores};

function gasReadArg(fnName, arg, defaultVal) {
  if (defaultVal === undefined) defaultVal = [];
  return new Promise(function(resolve) {
    function ok(res) {
      if (!res) { resolve(defaultVal); return; }
      if (res.ok === false) { resolve(defaultVal); return; }
      const data = res.data !== undefined ? res.data : res;
      resolve(Array.isArray(defaultVal) ? (Array.isArray(data) ? data : []) : (data || {}));
    }
    const r = google.script.run.withSuccessHandler(ok).withFailureHandler(() => resolve(defaultVal));
    if (fnName === 'getClasses')             r.getClasses(arg);
    else if (fnName === 'getAttendance')     r.getAttendance(arg);
    else if (fnName === 'getQuestionnaires') r.getQuestionnaires(arg);
    else resolve(defaultVal);
  });
}

// ─────────────────────────────────────────────────────────────────
// 1. FIX DE FECHAS
//    GAS serializa Date como "Date(year,month,day)" (mes 0-based)
//    o como objetos Date nativos. Esta función maneja todos los casos.
// ─────────────────────────────────────────────────────────────────
function fmtDate(val) {
  if (!val && val !== 0) return '';
 
  // Caso 1: objeto Date nativo (viene de getValues() de Sheets)
  if (val instanceof Date) {
    if (isNaN(val.getTime()) || val.getFullYear() < 1900) return '';
    const d = String(val.getDate()).padStart(2, '0');
    const m = String(val.getMonth() + 1).padStart(2, '0');
    const y = val.getFullYear();
    return `${d}/${m}/${y}`;
  }
 
  const str = String(val).trim();
 
  // Caso 2: serialización de GAS "Date(1978,8,10)" — mes es 0-based
  const gasMatch = str.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
  if (gasMatch) {
    const y = gasMatch[1];
    const m = String(parseInt(gasMatch[2]) + 1).padStart(2, '0'); // +1 porque GAS mes es 0-based
    const d = String(parseInt(gasMatch[3])).padStart(2, '0');
    return `${d}/${m}/${y}`;
  }
 
  // Caso 3: ISO string "1978-09-10" o "1978-09-10T..."
  const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) {
    return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;
  }
 
  // Caso 4: ya tiene formato dd/mm/yyyy → devolver tal cual
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return str;
 
  return str;
}

// FIX 1 — openEnrollModal  [REEMPLAZAR la función existente]
//
// Problema: en contexto Schools, State.people solo contiene
// las personas YA inscriptas (getSchoolData filtra por personIds).
// Solución: verificar si el total de personas en State coincide
// con la cantidad de inscriptos — si es igual, cargar todas.
// ─────────────────────────────────────────────────────────────────
async function openEnrollModal(grade) {
  // En contexto Schools, State.people puede ser solo un subconjunto
  // (personas inscriptas en el grado). Necesitamos TODAS las personas
  // para poder elegir a quién inscribir.
  const enrolledCount = Object.values(safeObj(State.enrollments))
    .reduce((sum, arr) => sum + safeArr(arr).length, 0);

  const needsFullPeople = safeArr(State.people).length <= enrolledCount
    || safeArr(State.people).length === 0;

  if (needsFullPeople) {
    setLoading(true);
    try {
      State.people = safeArr(await gasRead('getPeople', []));
    } catch(_) {}
    finally { setLoading(false); }
  }

  const prereq  = GRADE_PREREQ[grade];
  // Excluir personas que ya están activamente inscriptas en este grado
  const enrolled = new Set(
    safeArr(State.enrollments[grade])
      .filter(e => !e.status || e.status === 'activo')
      .map(e => e.personId)
  );

  const available = safeArr(State.people).filter(p => {
    if (enrolled.has(p.id)) return false;

    // Escuela de Vida: requiere haber asistido al Encuentro
    if (!prereq) {
      return p.attendedEncounter === true
        || String(p.attendedEncounter).toLowerCase() === 'true';
    }

    // Grados superiores: requiere haber aprobado el grado prerrequisito
    const pe    = safeArr(State.enrollments[prereq]);
    const entry = pe.find(e =>
      e.personId === p.id &&
      (e.status === 'aprobado' ||
        (e.scores && isApproved(e.scores) && isComplete(e.scores)))
    );
    return !!entry;
  });

  const tip = prereq
    ? `Requisito: aprobar ${GRADE_LABELS[prereq]}.`
    : 'Requisito: haber asistido al Encuentro.';
  const c = GRADE_COLORS[grade];
  let q   = '';

  const gradeHeader = el('div', {
    class:'enroll-modal-header',
    style:`background:linear-gradient(135deg,${c.bar}22,${c.bar}08);border-bottom:2px solid ${c.bar}40`
  },
    el('div', { class:'enroll-grade-badge', style:`background:${c.bg};color:${c.text};border:1.5px solid ${c.bar}40` },
      GRADE_LABELS[grade]),
    el('p', { class:'enroll-tip' }, tip),
    available.length === 0
      ? el('p', {
          style:'font-size:12px;color:var(--text-muted);margin-top:6px;font-style:italic'
        }, '⚠ No hay personas disponibles para inscribir en este grado.')
      : null

  const searchRow  = el('div', { class:'enroll-search-row' });
  const searchBox  = el('div', { class:'enroll-search-box' });
  const sIcon      = el('span',{ class:'enroll-search-icon' }); sIcon.innerHTML = IC.search;
  const sInput     = el('input',{
    class:'enroll-search-input',
    placeholder:'Buscar por nombre, célula o país...',
    autofocus:'true'
  });
  sInput.addEventListener('input', e => { q = e.target.value; paintList(); });
  const sCount = el('span', { class:'enroll-count', id:'enroll-count' }, '');
  searchBox.append(sIcon, sInput);
  searchRow.append(searchBox, sCount);

  const listWrap = el('div', { class:'enroll-list', id:'enroll-list' });

  function paintList() {
    const filtered = available.filter(p => {
      if (!q) return true;
      const cell = safeArr(State.cells).find(c2 => c2.id === p.cellId)
                || safeArr(State.cells).find(c2 => c2.leader === p.cellLeader);
      const cellName = cell ? cell.name : (p.cellLeader || '');
      return ((p.name||'')+' '+(p.lastName||'')+' '+cellName+' '+(p.country||''))
        .toLowerCase().includes(q.toLowerCase());
    });

    const countEl = document.getElementById('enroll-count');
    if (countEl) countEl.textContent = filtered.length + ' de ' + available.length;

    listWrap.innerHTML = '';
    if (!filtered.length) {
      listWrap.appendChild(el('div', { class:'enroll-empty' },
        svgI('person', 32),
        available.length === 0 ? 'Sin candidatos disponibles' : 'Sin coincidencias'
      ));
      return;
    }

    filtered.forEach(p => {
      const flag     = countryFlag(p.country);
      const cell     = safeArr(State.cells).find(c2 => c2.id === p.cellId)
                    || safeArr(State.cells).find(c2 => c2.leader === p.cellLeader);
      const cellName = cell ? cell.name : (p.cellLeader || '');

      const row = el('div', { class:'enroll-person-row' },
        Avatar(p.name, p.lastName, p.photoUrl || '', 40, 14),
        el('div', { class:'enroll-person-info' },
          el('div', { class:'enroll-person-name' }, p.name + ' ' + p.lastName),
          el('div', { class:'enroll-person-meta' },
            (flag ? flag + ' ' : '') + (p.country || '') +
            (cellName ? ' · 🏠 ' + cellName : '')
          )
        ),
        el('button', {
          class:'btn btn-primary btn-sm enroll-btn',
          onClick: async function() {
            this.disabled = true;
            this.textContent = 'Inscribiendo...';
            setLoading(true);
            try {
              await gasMut('enrollPerson', p.id, grade, (State.currentUser||{}).id || '');
              toast(p.name + ' inscripto correctamente', 'success');
              closeModal();
              // Recargar solo las inscripciones — más rápido que recargar todo
              State.enrollments = safeObj(await gasRead('getEnrollments', {}));
              renderPage();
            } catch(e) {
              toast(e.message, 'error');
              this.disabled    = false;
              this.textContent = 'Inscribir';
            } finally { setLoading(false); }
          }
        }, 'Inscribir')
      );
      listWrap.appendChild(row);
    });
  }

  const body = el('div', { class:'enroll-modal-body' }, gradeHeader, searchRow, listWrap);
  openModal(`Inscribir en ${GRADE_LABELS[grade]}`, body);
  paintList();
  setTimeout(() => sInput.focus(), 80);
}

// renderCellNode — click en card expande/contrae, sin botón inline
function renderCellNode(cell, children, level) {
  const COLORS = ['#4A8AF4','#22C55E','#FBBF24','#A855F7','#F87171'];
  const color  = COLORS[level % COLORS.length];
  const kids   = children[cell.id] || [];
  const isExp  = State.cellTreeExpanded[cell.id] !== false;
  const hasKids = kids.length > 0;
 
  const card = renderCellCard(cell, color, level, hasKids, isExp);
 
  if (hasKids) {
    card.style.cursor = 'pointer';
    card.addEventListener('click', e => {
      if (e.target.closest('button')) return; // no interferir con botones internos
      State.cellTreeExpanded[cell.id] = !isExp;
      renderPage();
    });
  }
 
  const childrenEl = hasKids
    ? el('div', {
        class:'cell-children',
        style:{ display: isExp ? 'block' : 'none', borderLeftColor: color + '40' }
      }, kids.map(k => renderCellNode(k, children, level + 1)))
    : null;
 
  return el('div', {
    class:'cell-tree-node cell-level-' + level,
    style:{ marginBottom:'10px' }
  }, card, childrenEl);
}
