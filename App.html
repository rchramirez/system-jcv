// Paleta de colores para períodos (determinista por hash del id)
function _periodColor(periodId) {
  const PERIOD_PALETTE = [
    { bg:'#EFF6FF', text:'#1E40AF', border:'#BFDBFE', dot:'#3B82F6' }, // azul
    { bg:'#F0FDF4', text:'#166534', border:'#BBF7D0', dot:'#22C55E' }, // verde
    { bg:'#FFF7ED', text:'#9A3412', border:'#FED7AA', dot:'#F97316' }, // naranja
    { bg:'#FDF4FF', text:'#6B21A8', border:'#E9D5FF', dot:'#A855F7' }, // violeta
    { bg:'#FFFBEB', text:'#92400E', border:'#FDE68A', dot:'#F59E0B' }, // amarillo
    { bg:'#FFF1F2', text:'#9F1239', border:'#FECDD3', dot:'#F43F5E' }, // rosa
    { bg:'#F0FDFA', text:'#134E4A', border:'#99F6E4', dot:'#14B8A6' }, // teal
  ];
  if (!periodId) return PERIOD_PALETTE[0];
  let hash = 0;
  for (let i = 0; i < periodId.length; i++) hash = (hash * 31 + periodId.charCodeAt(i)) & 0xFFFFFF;
  return PERIOD_PALETTE[Math.abs(hash) % PERIOD_PALETTE.length];
}

// Nombre legible de un período
function _periodName(periodId) {
  if (!periodId) return '—';
  const allPeriods = safeArr(State.periods || []);
  const per = allPeriods.find(p => String(p.id) === String(periodId));
  return per ? per.name : periodId; // fallback al ID si no se encuentra
}

// Datos de cursada de una persona (grado activo o egresado)
function _personStudyInfo(personId) {
  const enrollments = safeObj(State.enrollments);
  let active    = null;
  let graduated = null;
  for (const grade of GRADE_KEYS) {
    const list = safeArr(enrollments[grade]);
    const enr  = list.find(e => e.personId === personId);
    if (!enr) continue;
    if (!enr.status || enr.status === 'activo') {
      active = { grade, enr };
    } else if (enr.status === 'aprobado') {
      if (!graduated || GRADE_KEYS.indexOf(grade) > GRADE_KEYS.indexOf(graduated.grade)) {
        graduated = { grade, enr };
      }
    }
  }
  return { active, graduated };
}

const el=(tag,a,...ch)=>{

// ─────────────────────────────────────────────────────────────────
// calcAge — compatible con el nuevo fmtDate
// ─────────────────────────────────────────────────────────────────
function calcAge(val) {
  if (!val) return null;
  let d;
 
  if (val instanceof Date) {
    d = val;
  } else {
    const str = String(val).trim();
    // GAS format Date(year,month,day)
    const gasMatch = str.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
    if (gasMatch) {
      d = new Date(parseInt(gasMatch[1]), parseInt(gasMatch[2]), parseInt(gasMatch[3]));
    } else {
      d = new Date(str.includes('T') ? str : str + 'T12:00:00');
    }
  }
 
  if (!d || isNaN(d.getTime()) || d.getFullYear() < 1900) return null;
 
  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  const m = today.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age >= 0 ? age : null;
}

// ══════════════════════════════════════════════════════
// GAS BRIDGE — tolerante a fallos
// ══════════════════════════════════════════════════════
function gasRead(fn,def){
  if(def===undefined)def=[];
  return new Promise(function(resolve){
    function ok(res){
      if(!res){resolve(def);return;}
      if(res.ok===false){resolve(def);return;}
      const data=res.data!==undefined?res.data:res;
      resolve(Array.isArray(def)?(Array.isArray(data)?data:[]):safeObj(data));
    }
    const r=google.script.run.withSuccessHandler(ok).withFailureHandler(()=>resolve(def));
    switch(fn){
      case 'getPeople':             r.getPeople(); break;
      case 'getCells':              r.getCells(); break;
      case 'getChurches':           r.getChurches(); break;
      case 'getEnrollments':        r.getEnrollments(); break;
      case 'getUsers':              r.getUsers(); break;
      case 'getDashboardStats':     r.getDashboardStats(); break;
      case 'getClasses':            r.getClasses(''); break;
      case 'getAttendance':         r.getAttendance(''); break;
      case 'getQuestionnaires':     r.getQuestionnaires(''); break;
      case 'getCurrentSemester':    r.getCurrentSemester(); break;
      case 'getSchoolData':         r.getSchoolData(a0); break;
      case 'getEnrollmentsByGrade': r.getEnrollmentsByGrade(a0); break;
      case 'getPeopleByIds':        r.getPeopleByIds(a0); break;
      case 'getPeriods':            r.getPeriods(); break;
      case 'getAuditLog':           r.getAuditLog(a0); break;
      default: resolve(def);
    }
  });
}

// Versión genérica de gasRead con argumentos — AGREGAR si no existe
function gasReadWith(fn, arg, def) {
  if (def === undefined) def = [];
  return new Promise(function(resolve) {
    function ok(res) {
      if (!res) { resolve(def); return; }
      if (res.ok === false) { resolve(def); return; }
      const data = res.data !== undefined ? res.data : res;
      resolve(Array.isArray(def) ? (Array.isArray(data) ? data : []) : (data || def));
    }
    const r = google.script.run.withSuccessHandler(ok).withFailureHandler(() => resolve(def));
    if      (fn === 'getSchoolData')           r.getSchoolData(arg);
    else if (fn === 'getEnrollmentsByGrade')   r.getEnrollmentsByGrade(arg);
    else if (fn === 'getPeopleByIds')          r.getPeopleByIds(arg);
    else if (fn === 'getPeriods')              r.getPeriods();
    else if (fn === 'getCurrentSemester')      r.getCurrentSemester();
    else if (fn === 'getAuditLog')             r.getAuditLog(arg);
    else resolve(def);
  });
}

// gasMut — versión corregida que incluye gasMut3 inline [REEMPLAZAR]
function gasMut(fn, a0, a1, a2, a3) {
  return new Promise(function(resolve, reject) {
    function ok(res) {
      if (res && res.ok === false) { reject(new Error(res.error || 'Error')); return; }
      resolve(res && res.data !== undefined ? res.data : res);
    }
    const r = google.script.run.withSuccessHandler(ok).withFailureHandler(reject);
    switch (fn) {
      case 'saveMinistry':            r.saveMinistry(a0); break;
      case 'deleteMinistry':          r.deleteMinistry(a0); break;
      case 'addMinistryMember':       r.addMinistryMember(a0, a1); break;
      case 'removeMinistryMember':    r.removeMinistryMember(a0, a1); break;
      case 'savePerson':              r.savePerson(a0); break;
      case 'saveCell':                r.saveCell(a0); break;
      case 'saveChurch':              r.saveChurch(a0); break;
      case 'saveUser':                r.saveUser(a0); break;
      case 'enrollPerson':            r.enrollPerson(a0, a1, a2); break;
      case 'saveScores':              r.saveScores(a0, a1, a2); break;
      case 'saveClass':               r.saveClass(a0); break;
      case 'deleteClass':             r.deleteClass(a0); break;
      case 'saveAttendance':          r.saveAttendance(a0); break;
      case 'saveAttendanceBatch':     r.saveAttendanceBatch(a0, a1, a2); break;// ← unificado
      case 'saveQuestionnaire':       r.saveQuestionnaire(a0); break;
      case 'submitQuestionnaire':     r.submitQuestionnaire(a0, a1); break;
      case 'deleteQuestionnaire':     r.deleteQuestionnaire(a0); break;
      case 'deletePerson':            r.deletePerson(a0); break;
      case 'unenrollPerson':          r.unenrollPerson(a0, a1, a2, a3); break;
      case 'setEnrollmentStatus':     r.setEnrollmentStatus(a0, a1, a2, a3); break;
      case 'savePeriod':              r.savePeriod(a0, a1); break;
      case 'getAuditLog':             r.getAuditLog(a0); break;
      case 'getCurrentSemester':      r.getCurrentSemester(); break;
      case 'changePassword':          r.changePassword(a0, a1, a2); break;
      case 'migrateToV4Fast':         r.migrateToV4Fast(); break;
      case 'clearAllCache':           r.clearAllCache(); break;
      case 'updateEnrollmentStatus':  r.updateEnrollmentStatus(a0,a1,a2,a3); break;
      default: reject(new Error('Función no mapeada: ' + fn)); break
    };
  });
}

// gasMut3 — mantener por compatibilidad, delega a gasMut
function gasMut3(fn, a0, a1, a2) {
  return gasMut(fn, a0, a1, a2);
}

function call(fn,a0,a1){
  const reads=['getPeople','getCells','getChurches','getEnrollments','getUsers','getDashboardStats'];
  if(reads.includes(fn))return gasRead(fn,fn==='getEnrollments'?{}:[]);
  return gasMut(fn,a0,a1);
}

// ─────────────────────────────────────────────────────────────────
// 3. loadPageData() — REEMPLAZAR la función completa
//
// Cambios clave:
//   • 'schools': 1 RPC (getSchoolData) en vez de 6 en serie
//   • 'people':  fetches en paralelo con Promise.all
//   • Ambas páginas son ~60-80% más rápidas
// ─────────────────────────────────────────────────────────────────
async function loadPageData(page) {
  setLoading(true);
  try {
    const user  = State.currentUser || {};
    const role  = user.role || 'admin';
    const grade = user.assignedGrade || '';
 
    if (page === 'dashboard') {
      State.dashStats = safeObj(await gasRead('getDashboardStats', {}));
      if (role === 'secretary' || role === 'maestro') {
        State.secretaryDash = safeObj(await new Promise(function(res) {
          function ok(r) { res(r && r.ok !== false ? (r.data || r) : {}); }
          google.script.run.withSuccessHandler(ok).withFailureHandler(() => res({}))
            .getSecretaryDashboard(grade);
        }));
      }
 
    } else if (page === 'people') {
      const [people, cells, churches, enrollments, minsRaw] = await Promise.all([
        gasRead('getPeople',      []),
        gasRead('getCells',       []),
        gasRead('getChurches',    []),
        gasRead('getEnrollments', {}),
        new Promise(res => {
          function ok(r) { res(r && r.ok !== false ? (r.data || r) : []); }
          google.script.run.withSuccessHandler(ok).withFailureHandler(() => res([])).getMinistries();
        }),
      ]);
      State.people      = safeArr(people);
      State.cells       = safeArr(cells);
      State.churches    = safeArr(churches);
      State.enrollments = safeObj(enrollments);
      State.ministries  = safeArr(minsRaw);
 
    } else if (page === 'schools') {
      // ── UN SOLO RPC trae todo lo necesario para la página Escuelas
      // Para secretary/maestro: filtra por su grado asignado en el servidor
      // Para admin: trae todo (grade='')
      const schoolGrade = (role === 'admin') ? '' : grade;
 
      const schoolData = await new Promise(function(resolve) {
        function ok(res) {
          resolve(res && res.ok !== false ? (res.data || res) : {});
        }
        google.script.run.withSuccessHandler(ok).withFailureHandler(() => resolve({}))
          .getSchoolData(schoolGrade);
      });
 
      State.enrollments     = safeObj(schoolData.enrollments);
      State.people          = safeArr(schoolData.people);
      State.classes         = safeArr(schoolData.classes);
      State.attendance      = safeArr(schoolData.attendance);
      State.questionnaires  = safeArr(schoolData.questionnaires);
      State.users           = safeArr(schoolData.users);
      State.currentSemester = safeObj(schoolData.currentSemester);
      // Cargar períodos si no están (necesarios para _periodName y modal Mover a Egresados)
      if (!State.periods || !State.periods.length) {
        State.periods = safeArr(await gasReadWith('getPeriods', null, []).catch(() => []));
      }
      // Si es admin y people está vacío (el RPC no trajo personas porque no hay
      // inscripciones), cargar personas por separado (lazy)
      if (role === 'admin' && State.people.length === 0) {
        State.people = safeArr(await gasRead('getPeople', []));
      }
    } else if (page === 'ministries') {		
      // Cargar ministerios y personas en paralelo		
      const [minsRaw, people] = await Promise.all([		
        new Promise(res => {		
          function ok(r){ res(r&&r.ok!==false?(r.data||r):[]); }		
          google.script.run.withSuccessHandler(ok).withFailureHandler(()=>res([])).getMinistries();		
        }),		
        gasRead('getPeople', []),		
      ]);		
      State.ministries = safeArr(minsRaw);		
      State.people     = safeArr(people);
    } else if (page === 'cells') {
      const [cells, churches] = await Promise.all([
        gasRead('getCells',    []),
        gasRead('getChurches', []),
      ]);
      State.cells    = safeArr(cells);
      State.churches = safeArr(churches);
 
    } else if (page === 'churches') {
      State.churches = safeArr(await gasRead('getChurches', []));
 
    } else if (page === 'users') {
      const [users, churches] = await Promise.all([
        gasRead('getUsers',    []),
        gasRead('getChurches', []),
      ]);
      State.users    = safeArr(users);
      State.churches = safeArr(churches);
 
    } else if (page === 'config') {
      // Config no necesita carga pesada — solo períodos
      const [periods, churches] = await Promise.all([
        gasReadWith('getPeriods', null, []).catch(() => []),
        gasRead('getChurches', []),
      ]);
      State.periods  = safeArr(periods);
      State.churches = safeArr(churches);
    }
  } catch(e) {
    toast('Error cargando datos: ' + e.message, 'error');
  } finally {
    setLoading(false);
  }
}

function toast(msg,type){

  const t=el('div',{class:'toast '+type},
    el('div',{class:'toast-icon'},{success:'✓',error:'✕',info:'i'}[type]||'i'),
    el('div',{class:'toast-content'},el('div',{class:'toast-msg'},msg)),
    el('button',{class:'toast-close',onClick(){t.remove();}},'×')
  );
  const c=$('toast-container');if(c)c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(28px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),320);},3800);

function showConfirm(opts){
  return new Promise(resolve=>{
    const back=el('div',{class:'modal-backdrop',onClick(e){if(e.target===back)done(false);}});
    const ok=el('button',{class:'btn '+(opts.type==='danger'?'btn-danger':'btn-primary'),style:{minWidth:'110px'},onClick(){done(true);}},opts.okText||'Confirmar');
    const can=el('button',{class:'btn btn-secondary',style:{minWidth:'90px'},onClick(){done(false);}},opts.cancelText||'Cancelar');
    back.appendChild(el('div',{class:'modal confirm-modal'},el('div',{class:'modal-body'},
      el('div',{class:'confirm-icon-wrap '+(opts.type==='danger'?'danger':'warning')},opts.icon||'⚠️'),
      el('div',{class:'confirm-title'},opts.title||'Confirmar'),
      el('div',{class:'confirm-msg'},opts.msg||'¿Estás seguro?'),
      el('div',{class:'confirm-actions'},can,ok)
    )));
    document.body.appendChild(back);
    setTimeout(()=>can.focus(),60);
    function done(r){back.style.opacity='0';back.style.transition='opacity .2s';setTimeout(()=>back.remove(),200);resolve(r);}
  });
}

// ── Autocomplete custom (no datalist nativo) ─────────────────────
function makeAutocomplete(opts){
  // opts: {value, placeholder, items:[], itemLabel, onChange, onSelect}
  const wrap=el('div',{class:'ac-wrap'});
  const input=el('input',{class:'input ac-input',value:opts.value||'',placeholder:opts.placeholder||''});
  const dropdown=el('div',{class:'ac-dropdown'});
  wrap.append(input,dropdown);
  let visible=false;

  function show(q){
    const items=opts.items||[];
    const filtered=q.length<1?[]:items.filter(item=>{
      const lbl=typeof opts.itemLabel==='function'?opts.itemLabel(item):String(item);
      return lbl.toLowerCase().includes(q.toLowerCase());
    }).slice(0,10);
    dropdown.innerHTML='';
    if(!filtered.length){hide();return;}
    filtered.forEach(item=>{
      const lbl=typeof opts.itemLabel==='function'?opts.itemLabel(item):String(item);
      const row=el('div',{class:'ac-item'});
      if(opts.itemRender)row.appendChild(opts.itemRender(item));
      else row.textContent=lbl;
      row.addEventListener('mousedown',e=>{
        e.preventDefault();
        input.value=lbl;
        opts.onChange&&opts.onChange(lbl);
        opts.onSelect&&opts.onSelect(item,lbl);
        hide();
      });
      dropdown.appendChild(row);
    });
    dropdown.style.display='block';visible=true;
  }
  function hide(){dropdown.style.display='none';visible=false;}

  input.addEventListener('input',e=>{
    opts.onChange&&opts.onChange(e.target.value);
    show(e.target.value);
  });
  input.addEventListener('focus',e=>{if(e.target.value)show(e.target.value);});
  input.addEventListener('blur',()=>setTimeout(hide,150));
  document.addEventListener('click',e=>{if(!wrap.contains(e.target))hide();});
  return {wrap,input};
}

// FIX 6 — Login: resetear botón al hacer logout
//
// El problema: doLogout() llama showAuthView('login') desde App.html,
// pero el botón #btn-login puede quedar en estado "loading" si el
// usuario hizo logout MIENTRAS se ejecutaba el spinner del splash.
// Además, showAuthView no limpia el estado del botón.
//
// SOLUCIÓN EN App.html — reemplazar doLogout():
// ══════════════════════════════════════════════════════════════════════
async function doLogout() {
  const ok = await showConfirm({
    icon:'👋', type:'warning', title:'¿Cerrar sesión?',
    msg:'Tu sesión se cerrará.',
    okText:'Sí, salir', cancelText:'Quedarme'
  });
  if (!ok) return;

  try { sessionStorage.clear(); } catch(_) {}
  if (window.JCVStore) {
    window.JCVStore.remove('jcv_token');
    window.JCVStore.remove('jcv_user');
  }
  window.APP.token = null;
  window.APP.user  = null;

  // Limpiar app DOM
  const layout = document.getElementById('app-layout');
  if (layout) layout.remove();

  // Resetear el botón de login — puede haber quedado en estado loading
  const btnLogin = document.getElementById('btn-login');
  if (btnLogin) {
    if (typeof _authBtnReset === 'function') {
      _authBtnReset(btnLogin);
    } else {
      // Fallback si _authBtnReset no está disponible
      btnLogin.disabled      = false;
      btnLogin.style.opacity = '';
      btnLogin.innerHTML     =
        'Ingresar <span class="btn-auth-arrow">→</span>';
    }
  }

  // Limpiar inputs del login
  const loginUser = document.getElementById('login-user');
  const loginPass = document.getElementById('login-pass');
  if (loginUser) loginUser.value = '';
  if (loginPass) loginPass.value = '';

  // Limpiar mensajes de error anteriores
  const msgAuth = document.getElementById('msg-auth');
  if (msgAuth) msgAuth.innerHTML = '';

  // Mostrar pantalla de auth
  const auth = document.getElementById('auth-screen');
  if (auth) {
    auth.style.display = 'flex';
  }

  // Ir a la vista de login (resetea formulario de recovery también)
  if (typeof showAuthView === 'function') {
    showAuthView('login');
  }
}

  // ── Hero header — mismo patrón que Personas
  const totalIntegrantes = [...new Set(ministries.flatMap(m => safeArr(m.memberIds)))].length;
  const tiposActivos     = Object.keys(MINISTRY_TYPES).filter(t => ministries.some(m=>m.type===t)).length;
  const hero = el('div',{class:'sect-hero'},
    el('div',{class:'sect-hero-band',style:{background:'linear-gradient(135deg,#8B5CF6,#6D28D9)'}}),

        ),
        isAdmin ? el('button',{
          class:'btn btn-primary btn-sm',
          style:'align-self:center;white-space:nowrap',
          onClick:()=>openMinistryModal(null)
        },'＋ Nuevo Ministerio') : null
      ),
      el('div',{class:'sect-hero-metrics'},
        _sectMetric(ministries.length+'','ministerios','#8B5CF6'),
        el('div',{class:'shm-sep'}),
        _sectMetric(totalIntegrantes+'','integrantes','#22C55E'),
        el('div',{class:'shm-sep'}),
        _sectMetric(tiposActivos+'','tipos activos','#F59E0B')
      )
    )
  );

  // ── Toolbar
  const sWrap = el('div', { class:'min-search-wrap' });
  const sIcon = el('span', { class:'min-search-icon' }); sIcon.innerHTML = IC.search;
  const sInp  = el('input', {
    class:'min-search-input',
    placeholder:'Buscar ministerio...',
    value: State._minSearch
  });
  sInp.addEventListener('input', e => { State._minSearch=e.target.value; paintGrid(); });
  sWrap.append(sIcon, sInp);

  // Pills de tipo
  const typePills = el('div', { class:'min-type-pills' });
  const allTypes = ['all', ...Object.keys(MINISTRY_TYPES).filter(t => ministries.some(m=>m.type===t))];
  allTypes.forEach(t => {
    const isA  = State._minTypeFilter === t;
    const mt   = MINISTRY_TYPES[t] || { label:'Todos', icon:'✦', color:'#6366F1' };
    const btn  = el('button', {
      class: 'min-type-pill' + (isA?' active':''),
      style: isA ? `background:${mt.color};color:#fff;border-color:${mt.color}` : `border-color:${mt.color}40;color:${mt.color}`,
      onClick: () => { State._minTypeFilter=t; paintGrid(); }
    },
      el('span', {}, t==='all'?'✦':mt.icon),
      el('span', {}, t==='all'?'Todos':mt.label)
    );
      typePills.appendChild(btn);
    });

  const toolbar = el('div', { class:'min-toolbar' },
    sWrap,
    typePills
  );

  const gridSlot = el('div', { class:'min-grid', id:'min-grid' });

  function paintGrid() {
    gridSlot.innerHTML = '';
    const q = (State._minSearch||'').toLowerCase().trim();
    const tf = State._minTypeFilter;
    const filtered = ministries.filter(m => {
      if (tf !== 'all' && m.type !== tf) return false;
      if (q && !((m.name||'')+(m.leaders||'')+(m.description||'')).toLowerCase().includes(q)) return false;
      return true;
    });
    if (!filtered.length) {
      gridSlot.appendChild(el('div', { class:'min-empty' },
        el('div', { class:'min-empty-icon' }, '✦'),
        el('div', { class:'min-empty-title' }, ministries.length ? 'Sin resultados' : 'No hay ministerios'),

        isAdmin ? el('button', { class:'btn btn-primary', style:'margin-top:16px', onClick:()=>openMinistryModal(null) }, '＋ Nuevo Ministerio') : null
      ));
      return;
    }
    filtered.forEach(m => gridSlot.appendChild(ministryCard(m)));
  }
  paintGrid();
  wrap.append(hero, toolbar, gridSlot);
  return wrap;
}

// ── Modal Crear/Editar Ministerio
function openMinistryModal(ministry) {
  const isEdit = !!ministry;
  const form   = {
    name:'', type:'alabanza', description:'', leaders:'',
    schedule:'', location:'', memberIds:[],
    ...(ministry||{})
  };
  const set = (k,v) => { form[k]=v; };
  const inp = (key, type, ph) => {
    const i = el('input',{class:'input',type:type||'text',value:form[key]||'',placeholder:ph||''});
    i.addEventListener('input',e=>set(key,e.target.value));
    return i;
  };

  // ── Selector visual de tipo
  const typeWrap = el('div', { class:'min-type-picker' });
  let curType = form.type;
  function renderTypePicker() {
    typeWrap.innerHTML = '';
    Object.entries(MINISTRY_TYPES).forEach(([k, mt]) => {
      const isA = curType === k;
      const btn = el('button', {
        class: 'min-type-pick-btn' + (isA?' active':''),
        style: isA
          ? `background:${mt.color};color:#fff;border-color:${mt.color};box-shadow:0 4px 12px ${mt.color}44`
          : `background:${mt.bg};color:${mt.text};border-color:${mt.color}30`,
        onClick: () => { curType=k; set('type',k); renderTypePicker(); }
      },
        el('span',{style:'font-size:18px;line-height:1'},mt.icon),
        el('span',{style:'font-size:11px;font-weight:700'},mt.label)
      );
      typeWrap.appendChild(btn);
    });
  }
  renderTypePicker();

  const descTA = el('textarea',{class:'input',rows:'3',style:'resize:none',placeholder:'Descripción del ministerio...'});
  descTA.value = form.description||'';
  descTA.addEventListener('input',e=>set('description',e.target.value));

  const body = el('div', { class:'min-modal-body' },
    el('div', { class:'field' },
      el('label', { class:'field-label' }, 'Tipo de Ministerio'),
      typeWrap
    ),
    Field('Nombre del Ministerio', inp('name','text','Ej: Ministerio de Alabanza')),
    Field('Líderes', inp('leaders','text','Nombre1, Nombre2'), 'Separar con coma si son varios'),
    Field('Descripción', descTA),
    el('div', { class:'form-grid' },
      Field('Días y Horarios', inp('schedule','text','Ej: Viernes 20:00')),
      Field('Lugar', inp('location','text','Ej: Salón principal')),
    ),
    el('div', { class:'modal-actions' },
      el('button',{class:'btn btn-secondary',onClick:closeModal},'Cancelar'),
      isEdit ? el('button',{
        class:'btn btn-danger btn-sm',style:'margin-right:auto',
        onClick:async()=>{
          const ok = await showConfirm({icon:'🗑',type:'danger',title:'¿Eliminar ministerio?',
            msg:'Se eliminará el ministerio y todos sus registros de membresía.',okText:'Sí, eliminar',cancelText:'Cancelar'});
          if(!ok)return;
          setLoading(true);
          try{
            await gasMut('deleteMinistry',ministry.id);
            toast('Ministerio eliminado','success');
            closeModal();
            State.ministries = safeArr(await new Promise(res=>{
              google.script.run.withSuccessHandler(r=>res(r&&r.ok?r.data||r:[])).withFailureHandler(()=>res([])).getMinistries();
            }));
            renderPage();
          }catch(e){toast(e.message,'error');}finally{setLoading(false);}
        }
      },'🗑 Eliminar') : null,
      el('button',{class:'btn btn-primary',onClick:saveMin},isEdit?'✓ Guardar cambios':'＋ Crear Ministerio')
    )
  );

  async function saveMin() {
    if (!form.name) { toast('El nombre es requerido','error'); return; }
    setLoading(true);
    try {
      await gasMut('saveMinistry', {...form, ...(isEdit?{id:ministry.id}:{})});
      toast(isEdit?'Ministerio actualizado':'Ministerio creado','success');
      closeModal();
      State.ministries = safeArr(await new Promise(res=>{
        google.script.run.withSuccessHandler(r=>res(r&&r.ok?r.data||r:[])).withFailureHandler(()=>res([])).getMinistries();
      }));
      renderPage();
    } catch(e){toast(e.message,'error');}finally{setLoading(false);}
  }

  openModal(isEdit?'Editar Ministerio':'Nuevo Ministerio', body, true);
}

// 4. Ver Integrantes de Ministerio — enriquecido con célula y cursada
// REEMPLAZAR openMinistryMembersModal completa
// ══════════════════════════════════════════════════════════════════════
function openMinistryMembersModal(ministry) {
  const mt      = MINISTRY_TYPES[ministry.type] || MINISTRY_TYPES.otro;
  const people  = safeArr(State.people);
  const isAdmin = State.currentUser.role === 'admin';
  let memberIds = [...safeArr(ministry.memberIds)];

  let q = '';
  const sWrap = el('div',{class:'min-mm-search'});
  const sIcon = el('span',{class:'att-search-icon'}); sIcon.innerHTML = IC.search;
  const sInp  = el('input',{class:'att-search-input',placeholder:'Buscar persona...',autofocus:'true'});
  sInp.addEventListener('input', e=>{q=e.target.value; paintMembers();});
  sWrap.append(sIcon, sInp);

  const countBadge = el('span',{class:'min-mm-count',style:`background:${mt.color}18;color:${mt.color}`}, memberIds.length+' integrantes');
  const listSlot   = el('div',{class:'min-mm-list'});

  function paintMembers() {
    listSlot.innerHTML='';
    const qLow = q.toLowerCase().trim();
    const sorted = [...people].sort((a,b) => {
      const aIn=memberIds.includes(a.id), bIn=memberIds.includes(b.id);
      if(aIn&&!bIn) return -1; if(!aIn&&bIn) return 1;
      return (a.name||'').localeCompare(b.name||'');
    }).filter(p => !qLow || ((p.name||'')+' '+(p.lastName||'')+' '+(p.cellLeader||'')).toLowerCase().includes(qLow));

    if (!sorted.length) {
      listSlot.appendChild(el('div',{class:'att-empty-search'},el('span',{style:'font-size:22px;opacity:.3'},'🔍'),el('div',{style:'color:var(--text-muted);font-size:13px;margin-top:4px'},'Sin resultados')));
      return;
    }

    sorted.forEach(p => {
      const isMember = memberIds.includes(p.id);
      const cell     = safeArr(State.cells).find(c=>c.id===p.cellId)||safeArr(State.cells).find(c=>c.leader===p.cellLeader);
      const study    = _personStudyInfo(p.id);

      const studyTag = (() => {
        if (study.active)    return `📚 ${GRADE_LABELS[study.active.grade]} — En curso`;
        if (study.graduated) return `🎓 ${GRADE_LABELS[study.graduated.grade]} — Egresado`;
        return null;
      })();
      const cellTag = cell ? `⬡ ${cell.name} · ${cell.leader}` : null;

      const row = el('div',{
        class:'min-mm-row'+(isMember?' min-mm-row-active':''),
        style: isMember ? `border-left:3px solid ${mt.color};background:${mt.color}08` : ''
      });

      const infoEl = el('div',{class:'min-mm-info'},
        Avatar(p.name,p.lastName,p.photoUrl||'',36,13),
        el('div',{style:'min-width:0;flex:1'},
          el('div',{class:'min-mm-name'},p.name+' '+p.lastName),
          el('div',{style:'display:flex;gap:5px;flex-wrap:wrap;margin-top:3px'},
            cellTag  ? el('span',{style:'font-size:11px;color:var(--text-muted)'},cellTag) : null,
            studyTag ? el('span',{style:'font-size:11px;color:var(--blue-600);font-weight:500'},studyTag) : null
          )
        )
      );

      const badge  = isMember ? el('span',{class:'min-mm-badge',style:`background:${mt.color};color:#fff`},'✓ Integrante') : null;
      let actionBtn = null;
      if (isAdmin) {
        actionBtn = isMember
          ? el('button',{class:'min-mm-btn min-mm-btn-remove',onClick:async()=>{
              try{await gasMut('removeMinistryMember',ministry.id,p.id);memberIds=memberIds.filter(id=>id!==p.id);ministry.memberIds=[...memberIds];countBadge.textContent=memberIds.length+' integrantes';paintMembers();const idx=State.ministries.findIndex(m=>m.id===ministry.id);if(idx>-1)State.ministries[idx].memberIds=[...memberIds];}catch(e){toast(e.message,'error');}
            }},'✕ Quitar')
          : el('button',{class:'min-mm-btn min-mm-btn-add',style:`border-color:${mt.color};color:${mt.color}`,onClick:async()=>{
              try{await gasMut('addMinistryMember',ministry.id,p.id);memberIds.push(p.id);ministry.memberIds=[...memberIds];countBadge.textContent=memberIds.length+' integrantes';paintMembers();const idx=State.ministries.findIndex(m=>m.id===ministry.id);if(idx>-1)State.ministries[idx].memberIds=[...memberIds];}catch(e){toast(e.message,'error');}
            }},'＋ Agregar');
      }

      row.append(infoEl, badge||el('div',{}), actionBtn||el('div',{}));
      listSlot.appendChild(row);
    });
  }
  paintMembers();

  const header = el('div',{class:'min-mm-header'},
    el('div',{class:'min-mm-title-row'},
      el('div',{class:'min-mm-type-icon',style:`background:${mt.color}18;color:${mt.color}`},mt.icon),
      el('div',{},el('div',{class:'min-mm-ministry-name'},ministry.name),el('div',{class:'min-mm-type-label',style:`color:${mt.text}`},mt.label))
    ),
    countBadge
  );

  openModal('Integrantes — '+ministry.name,
    el('div',{class:'min-mm-body'}, header, sWrap, listSlot,
      el('div',{class:'modal-actions',style:'margin-top:16px'},el('button',{class:'btn btn-secondary',onClick:closeModal},'Cerrar'))
    ), true);
  setTimeout(()=>sInp.focus(),80);
}

// Password change section
function _buildPasswordSection(user) {
  let pwCur = '', pwNew = '', pwConf = '';
  let saving = false;
 
  const strBars = [1,2,3,4].map(() => el('div', { style:'flex:1;height:3px;border-radius:2px;background:var(--bg-subtle);transition:background .3s' }));
  const strLabel = el('span', { style:'font-size:11px;color:var(--text-muted);min-width:70px' }, '');
 
  function updateStrength(val) {
    const score = [
      val.length >= 8, /[A-Z]/.test(val), /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val)
    ].filter(Boolean).length;
    const colors = { 1:'#F87171', 2:'#FBBF24', 3:'#5B8EF0', 4:'#22C55E' };
    const labels = { 0:'', 1:'Débil', 2:'Regular', 3:'Buena', 4:'Fuerte' };
    strBars.forEach((b, i) => {
      b.style.background = i < score ? (colors[score] || 'var(--bg-subtle)') : 'var(--bg-subtle)';
    });
    strLabel.textContent  = labels[score] || '';
    strLabel.style.color  = colors[score] || 'var(--text-muted)';
  }
 
  function makeField(label, placeholder, onChange, type) {
    const wrap = el('div', { style:'position:relative' });
    const inp  = el('input', {
      class:'input',
      type: type || 'password',
      placeholder,
      style:'padding-right:38px',
      autocomplete: label.includes('actual') ? 'current-password' : 'new-password'
    });
    inp.addEventListener('input', e => { onChange(e.target.value); if (label.includes('Nueva')) updateStrength(e.target.value); });
    const eye = el('button', {
      style:'position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;padding:3px;transition:color .15s',
      onClick: function() {
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        this.style.color = show ? 'var(--blue-400)' : 'var(--text-muted)';
      }
    });
    eye.innerHTML = '<svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M1 10s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z"/><circle cx="10" cy="10" r="3"/></svg>';
    wrap.append(inp, eye);
    return { wrap, inp };
  }
 
  const { wrap: wCur, inp: inpCur }   = makeField('Contraseña actual',   'Tu contraseña actual',       v => { pwCur  = v; }, 'password');
  const { wrap: wNew, inp: inpNew }   = makeField('Nueva contraseña',     'Mínimo 6 caracteres',        v => { pwNew  = v; }, 'password');
  const { wrap: wConf, inp: inpConf } = makeField('Repetir contraseña',   'Repetí la nueva contraseña', v => { pwConf = v; }, 'password');
 
  const msgEl  = el('div', { style:'min-height:20px;font-size:12.5px;margin-top:4px' }, '');
  const saveBtn = el('button', { class:'btn btn-primary', style:'min-width:160px' }, 'Actualizar contraseña');
 
  function showMsg(msg, isError) {
    msgEl.textContent  = msg;
    msgEl.style.color  = isError ? 'var(--red-600)' : 'var(--green-600)';
  }
 
  saveBtn.addEventListener('click', async function() {
    if (saving) return;
    showMsg('', false);
    if (!pwCur)           { showMsg('⚠ Ingresá tu contraseña actual', true); inpCur.focus();  return; }
    if (pwNew.length < 6) { showMsg('⚠ Mínimo 6 caracteres', true);          inpNew.focus();  return; }
    if (pwNew !== pwConf) { showMsg('⚠ Las contraseñas no coinciden', true);  inpConf.focus(); return; }
 
    saving = true;
    saveBtn.disabled    = true;
    saveBtn.textContent = 'Guardando...';
    try {
      await gasMut('changePassword',
        (State.currentUser || {}).id || '',
        pwCur,
        pwNew
      );
      showMsg('✓ Contraseña actualizada correctamente', false);
      inpCur.value = inpNew.value = inpConf.value = '';
      pwCur = pwNew = pwConf = '';
      updateStrength('');
    } catch(e) {
      showMsg('✕ ' + e.message, true);
    } finally {
      saving = false;
      saveBtn.disabled    = false;
      saveBtn.textContent = 'Actualizar contraseña';
    }
  });
 
  return el('div', { style:'display:flex;flex-direction:column;gap:14px;max-width:400px' },
    Field('Contraseña actual',   wCur),
    Field('Nueva contraseña',    wNew),
    el('div', { style:'display:flex;align-items:center;gap:8px;margin-top:-8px' }, ...strBars, strLabel),
    Field('Confirmar contraseña', wConf),
    msgEl,
    el('div', {}, saveBtn)
  );
}

function _buildPeriodsSection() {

function _renderPeriodsList(container) {
  container.innerHTML = '';
  const periods = safeArr(State.periods);
 
  // Lista de períodos
  const listEl = el('div', { style:'display:flex;flex-direction:column;gap:8px;margin-bottom:16px' });
 
  if (!periods.length) {
    listEl.appendChild(el('div', {
      style:'text-align:center;padding:20px;color:var(--text-muted);font-size:13px;background:var(--bg-subtle);border-radius:var(--radius-md)'
    }, 'No hay períodos creados. Creá el primer período académico.'));
  } else {
    periods.forEach(p => {
      const isActive = p.status === 'activo';
      const row = el('div', {
        style:`display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1.5px solid ${isActive?'var(--blue-400)':'var(--border-soft)'};background:${isActive?'var(--blue-50)':'var(--bg-surface)'};transition:all .15s`
      },
        el('div', { style:'flex:1;min-width:0' },
          el('div', { style:`font-size:14px;font-weight:600;color:${isActive?'var(--blue-600)':'var(--text-primary)'}` }, p.name),
          el('div', { style:'font-size:12px;color:var(--text-muted);margin-top:2px' },
            (p.startDate ? fmtDate(p.startDate) : '') + ' → ' + (p.endDate ? fmtDate(p.endDate) : '')
          )
        ),
        el('span', {
          style:`font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;${isActive?'background:#DBEAFE;color:#1E40AF':'background:var(--bg-subtle);color:var(--text-muted)'}`
        }, isActive ? '● Activo' : p.status === 'cerrado' ? 'Cerrado' : p.status),
        !isActive ? el('button', {
          class:'btn btn-ghost btn-sm',
          onClick: async function() {
            if (!await showConfirm({ icon:'📅', title:'¿Activar período?', msg:`Se cerrará el período activo actual y se activará "${p.name}".`, okText:'Activar', type:'warning' })) return;
            setLoading(true);
            try {
              await gasMut('savePeriod', { ...p, status:'activo' }, (State.currentUser||{}).id);
              State.periods = safeArr(await gasReadWith('getPeriods', null, []));
              _renderPeriodsList(container);
              toast('Período activado', 'success');
            } catch(e) { toast(e.message, 'error'); } finally { setLoading(false); }
          }
        }, 'Activar') : null
      );
      listEl.appendChild(row);
    });
  }
 
  // Formulario nuevo período
  const now = new Date();
  const defSem = now.getMonth() < 6 ? 1 : 2;
  let newPeriod = { name:'', year: now.getFullYear(), semester: defSem, startDate:'', endDate:'' };
  const set = (k,v) => { newPeriod[k] = v; };
 
  const inp = (key, type, ph) => {
    const i = el('input', { class:'input', type:type||'text', value:newPeriod[key]||'', placeholder:ph||'' });
    i.addEventListener('input', e => set(key, e.target.value));
    return i;
  };
 
  function Sel(key, opts) {
    const s = el('select', { class:'input' });
    opts.forEach(([v,l]) => {
      const o = el('option',{value:v}, l);
      if (String(v) === String(newPeriod[key])) o.selected = true;
      s.appendChild(o);
    });
    s.addEventListener('change', e => set(key, e.target.value));
    return s;
  }
 
  const formEl = el('div', {
    style:'border:1px solid var(--border-soft);border-radius:10px;padding:16px;background:var(--bg-subtle);margin-top:4px'
  },
    el('div', { style:'font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px' }, 'Nuevo Período'),
    el('div', { class:'form-grid' },
      Field('Nombre', inp('name','text','Ej: 2025 — Cuatrimestre 1')),
      Field('Año', inp('year','number','2025')),
      Field('Cuatrimestre', Sel('semester', [['1','1° Cuatrimestre'],['2','2° Cuatrimestre']])),
      Field('', el('div', {})), // spacer
      Field('Fecha inicio', inp('startDate','date')),
      Field('Fecha fin',    inp('endDate',  'date')),
    ),
    el('div', { class:'modal-actions', style:'margin-top:14px;padding-top:12px;border-top:1px solid var(--border-soft)' },
      el('button', {
        class:'btn btn-primary',
        onClick: async function() {
          if (!newPeriod.name) { toast('El nombre es requerido', 'error'); return; }
          setLoading(true);
          try {
            await gasMut('savePeriod', { ...newPeriod, status:'cerrado' }, (State.currentUser||{}).id);
            State.periods = safeArr(await gasReadWith('getPeriods', null, []));
            _renderPeriodsList(container);
            toast('Período creado', 'success');
          } catch(e) { toast(e.message, 'error'); } finally { setLoading(false); }
        }
      }, '＋ Crear período')
    )
  );
 
  container.append(listEl, formEl);
}

    const gc2    = GRADE_COLORS[item.grade]||gc;
    const today2 = new Date();
    const due    = item.dueDate ? new Date(item.dueDate+'T12:00:00') : null;
    const isOverdue  = due && due < today2;
    const daysLeft   = due ? Math.ceil((due - today2) / 86400000) : null;
    const dueTxt     = !due ? 'Sin fecha' :
                       isOverdue ? 'Vencido' :
                       daysLeft === 0 ? '¡Hoy!' :
                       daysLeft === 1 ? 'Mañana' :
                       'Vence ' + fmtDate(item.dueDate);
    const dueColor   = !due ? 'var(--text-muted)' :
                       isOverdue ? '#E11D48' :
                       daysLeft <= 2 ? '#D97706' : '#16A34A';
    return el('div',{class:'sec-pend-row'},
      el('div',{class:'sec-pend-left'},
        el('div',{class:'sec-pend-title'},item.title),
        el('div',{class:'sec-pend-class'},
          item.classTitle ? '📅 '+item.classTitle : '',
          item.grade ? el('span',{class:'sec-grade-tag',style:{background:gc2.bar+'18',color:gc2.text,marginLeft:'6px'}},GRADE_LABELS[item.grade]||item.grade) : null
        )
      ),
      el('div',{class:'sec-pend-right'},
        el('div',{class:'sec-pend-stats'},
          item.pendiente ? el('span',{class:'sec-pend-chip sec-pend-pend'},item.pendiente+' pend.') : null,
          item.vencido   ? el('span',{class:'sec-pend-chip sec-pend-venc'},item.vencido+' venc.')   : null
        ),
        el('div',{class:'sec-pend-due',style:{color:dueColor}},dueTxt)
      )
    );
  }

  // ── Tarjeta: Cuestionarios pendientes
  const totalPendQ = pendingQ.reduce((s,i)=>s+i.pendiente+i.vencido,0);
  const questCard = _secCard('📝',
    'Cuestionarios Pendientes',
    pendingQ.length ? totalPendQ+' sin entregar' : 'Al día',
    'sec-icon-quest',
    pendingQ.some(i=>i.vencido>0) ? el('span',{class:'sec-badge-warn'},pendingQ.reduce((s,i)=>s+i.vencido,0)+'') : null,
    el('div',{class:'sec-card-body'},
      pendingQ.length===0
        ? el('div',{class:'sec-empty-msg'},'✓ Sin cuestionarios pendientes')
        : el('div',{class:'sec-pend-list'}, pendingQ.map(_pendingRow))
    )
  );

  // ── Tarjeta: Trabajos Prácticos pendientes
  const totalPendTP = pendingTP.reduce((s,i)=>s+i.pendiente+i.vencido,0);
  const tpCard = _secCard('✏️',
    'Trabajos Prácticos',
    pendingTP.length ? totalPendTP+' sin entregar' : 'Al día',
    'sec-icon-tp',
    pendingTP.some(i=>i.vencido>0) ? el('span',{class:'sec-badge-warn'},pendingTP.reduce((s,i)=>s+i.vencido,0)+'') : null,
    el('div',{class:'sec-card-body'},
      pendingTP.length===0
        ? el('div',{class:'sec-empty-msg'},'✓ Sin trabajos prácticos pendientes')
        : el('div',{class:'sec-pend-list'}, pendingTP.map(_pendingRow))
    )
  );

  return el('div',{class:'sec-dashboard'},
    hero,
    el('div',{class:'sec-grid'},
      el('div',{class:'sec-col'},riskCard,activeCard),
      el('div',{class:'sec-col'},classCard,bdayCard,questCard,tpCard)
    )
  );
}

// ══════════════════════════════════════════════════════════════════════
// FIX 1 — renderPeople [REEMPLAZAR función completa]
//
// Root cause: State._pplPager se inicializaba DESPUÉS del `return wrap`,
// por lo que paint() tiraba TypeError silencioso y la tabla nunca aparecía.
// ══════════════════════════════════════════════════════════════════════
function renderPeople() {
  if (!Array.isArray(State.people)) State.people = [];
 
  // ── Estado paginación y filtros ─────────────────────────────────────
  if (!State._pplPager)   State._pplPager   = { page: 1 };
  if (!State._pplFilters) State._pplFilters = new Set(['all']);
  const PPL_PAGE = 20;
  const F        = State._pplFilters; // referencia viva
 
  const isAdmin = State.currentUser.role === 'admin';
  const wrap    = el('div', {});
 
  // ── Stats para el hero
  const totalPpl = safeArr(State.people).length;
  const attPpl   = safeArr(State.people).filter(p =>
    p.attendedEncounter === true || String(p.attendedEncounter).toLowerCase() === 'true'
  ).length;
  const enrPpl   = new Set(
    GRADE_KEYS.flatMap(g => safeArr((State.enrollments || {})[g]).map(e => e.personId))
  ).size;
  const minPpl   = safeArr(State.people).filter(p => p.ministryId).length;
 
  // ── Hero con botón "Nueva Persona" DENTRO, a la izquierda ─────────
  // Estructura: [icono][título] [botón] ··· [métricas]
  const hero = el('div', { class:'sect-hero' },
    el('div', { class:'sect-hero-band', style:{ background:'linear-gradient(135deg,#3B82F6,#1E40AF)' } }),
    el('div', { class:'sect-hero-body' },
      // Izquierda: icono + título + botón juntos
      el('div', { class:'sect-hero-left', style:'flex-wrap:wrap;gap:12px' },
        el('div', { class:'sect-hero-icon', style:{ background:'#3B82F618', color:'#3B82F6', border:'1.5px solid #3B82F640' } }, '👥'),
        el('div', {},
          el('div', { class:'sect-hero-eyebrow' }, 'Gestión de Miembros'),
          el('h1',  { class:'sect-hero-title' }, 'Personas')
        )
      ),
      // Derecha: métricas
      el('div', { class:'sect-hero-metrics' },
        _sectMetric(totalPpl + '', 'registradas',    '#3B82F6'),
        el('div', { class:'shm-sep' }),
        _sectMetric(attPpl   + '', 'con encuentro', '#22C55E'),
        el('div', { class:'shm-sep' }),
        _sectMetric(enrPpl   + '', 'inscriptas',    '#EAB308'),
        el('div', { class:'shm-sep' }),
        _sectMetric(minPpl   + '', 'en ministerios','#8B5CF6'),
        isAdmin ? el('div', { style:'margin-left:16px' },
          el('button', {
            class:'btn btn-primary',
            style:'white-space:nowrap',
            onClick: () => openPersonModal(null)
          }, '＋ Nueva Persona')
        ) : null

      )
    )
  );
 
  // ── Buscador (sin botón Nueva Persona al costado)
  const sWrap = el('div', { class:'search-input-wrap' });
  const sIcon = el('span', { class:'search-input-icon' }); sIcon.innerHTML = IC.search;
  const sEl   = el('input', {
    class:'search-input', id:'ppl-s',
    placeholder:'Buscar nombre, email, teléfono...',
    value: State.peopleSearch || ''
  });
  const xBtn = el('button', {
    class:'search-clear-btn' + (State.peopleSearch ? ' visible' : ''),
    onClick() {
      State.peopleSearch = ''; sEl.value = '';
      xBtn.classList.remove('visible');
      State._pplPager.page = 1;
      paint();
    }
  }, '×');
  sEl.addEventListener('input', e => {
    State.peopleSearch = e.target.value;
    State._pplPager.page = 1;
    xBtn.classList.toggle('visible', !!e.target.value);
    paint();
  });
  sWrap.append(sIcon, sEl, xBtn);
 
  // ── Filtros multi-select ─────────────────────────────────────────
  // Definición de grupos. Dentro de un grupo son excluyentes (seleccionar
  // uno deselecciona el otro del mismo grupo). Entre grupos son aditivos.
  // "all" desactiva todo y muestra todos.
  const FILTER_DEFS = [
    { k:'all',        l:'Todos',           group:'all'  },
    { k:'enc-yes',    l:'Con Encuentro',   group:'enc'  },
    { k:'enc-no',     l:'Sin Encuentro',   group:'enc'  },
    { k:'min-yes',    l:'Con Ministerio',  group:'min'  },
    { k:'min-no',     l:'Sin Ministerio',  group:'min'  },
    { k:'cell-yes',   l:'Con Célula',      group:'cell' },
    { k:'cell-no',    l:'Sin Célula',      group:'cell' },
  ];
 
  const pillsEl = el('div', { class:'filter-pills', style:'flex-wrap:wrap;gap:5px' });
  let pillEls = {};
 
  function isActive(k) { return F.has(k); }
 
  function toggleFilter(k) {
    const def = FILTER_DEFS.find(d => d.k === k);
    if (!def) return;
 
    if (k === 'all') {
      // "Todos" limpia todo y activa solo 'all'
      F.clear(); F.add('all');
    } else {
      // Quitar 'all' si estaba
      F.delete('all');
      if (F.has(k)) {
        // Deseleccionar este
        F.delete(k);
        // Si no queda nada activo → volver a 'all'
        if (F.size === 0) F.add('all');
      } else {
        // Seleccionar: deseleccionar el otro del mismo grupo primero
        FILTER_DEFS
          .filter(d => d.group === def.group && d.k !== k)
          .forEach(d => F.delete(d.k));
        F.add(k);
      }
    }
    State._pplPager.page = 1;
    refreshPills();
    paint();
  }
 
  function refreshPills() {
    Object.entries(pillEls).forEach(([k, btn]) => {
      btn.className = 'filter-pill' + (isActive(k) ? ' active' : '');
    });
  }
 
  FILTER_DEFS.forEach(d => {
    const btn = el('button', {
      class: 'filter-pill' + (isActive(d.k) ? ' active' : ''),
      onClick: () => toggleFilter(d.k)
    }, d.l);
    pillEls[d.k] = btn;
    pillsEl.appendChild(btn);
  });
 
  const cntEl     = el('span', { class:'results-count', id:'ppl-cnt' });
  const slot      = el('div',  { id:'ppl-slot' });
  const pagerSlot = el('div',  { id:'ppl-pager', style:'display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:10px 0 4px' });
 
  // Barra de herramientas: buscador + filtros + contador
  const toolbar = el('div', {
    style:'display:flex;flex-direction:column;gap:8px;margin-bottom:12px'
  },
    el('div', { class:'search-input-wrap', style:'width:100%;max-width:420px' }, sIcon, sEl, xBtn),
    el('div', { style:'display:flex;align-items:center;gap:8px;flex-wrap:wrap' },
      pillsEl, cntEl
    )
  );
 
  wrap.append(hero, toolbar, slot, pagerSlot);
 
  setTimeout(paint, 0); // asíncrono → DOM montado antes de rellenar
  return wrap;
 
  // ── Helpers ───────────────────────────────────────────────────────
 
  function getFiltered() {
    const q  = (State.peopleSearch || '').toLowerCase().trim();
    const fs = State._pplFilters || new Set(['all']);
 
    return safeArr(State.people).filter(p => {
      // Texto
      if (q) {
        const h = ((p.name||'')+' '+(p.lastName||'')+' '+(p.email||'')+' '+(p.phone||'')).toLowerCase();
        if (!h.includes(q)) return false;
      }
 
      // Si 'all' activo, pasar todo
      if (fs.has('all')) return true;
 
      // Encuentro
      const att = p.attendedEncounter === true || String(p.attendedEncounter).toLowerCase() === 'true';
      if (fs.has('enc-yes') && !att)  return false;
      if (fs.has('enc-no')  &&  att)  return false;
 
      // Ministerio
      const hasMin = !!(p.ministryId);
      if (fs.has('min-yes') && !hasMin) return false;
      if (fs.has('min-no')  &&  hasMin) return false;
 
      // Célula
      const hasCell = !!(p.cellId || p.cellLeader);
      if (fs.has('cell-yes') && !hasCell) return false;
      if (fs.has('cell-no')  &&  hasCell) return false;
 
      return true;
    });
  }
 
  function paint() {
    const slotEl = document.getElementById('ppl-slot');
    if (!slotEl) return;
 
    const filtered  = getFiltered();
    const enr       = safeObj(State.enrollments);
    const pages     = Math.max(1, Math.ceil(filtered.length / PPL_PAGE));
    State._pplPager.page = Math.min(Math.max(1, State._pplPager.page), pages);
    const from      = (State._pplPager.page - 1) * PPL_PAGE;
    const pageItems = filtered.slice(from, from + PPL_PAGE);
 
    const cnt = document.getElementById('ppl-cnt');
    if (cnt) {
      const total = State.people.length;
      cnt.textContent = filtered.length < total
        ? `${filtered.length} de ${total} personas`
        : `${total} persona${total !== 1 ? 's' : ''}`;
    }
 
    slotEl.innerHTML = '';
 
    if (!pageItems.length) {
      slotEl.appendChild(el('div', { class:'table-wrap' },
        el('div', { class:'empty-state' },
          el('span', { class:'empty-state-icon' }, '👤'),
          State.people.length ? 'Sin resultados para los filtros seleccionados.' : 'Aún no hay personas cargadas.',
          State.people.length ? el('button', {
            class:'btn btn-ghost btn-sm', style:{ marginTop:'12px' },
            onClick() {
              State.peopleSearch = ''; State._pplFilters = new Set(['all']);
              State._pplPager.page = 1;
              const si = document.getElementById('ppl-s'); if (si) si.value = '';
              refreshPills(); paint();
            }
          }, 'Limpiar filtros') : null
        )
      ));
      paintPager(filtered);
      return;
    }
 
    const rows = pageItems.map(p => {
      const grades = GRADE_KEYS.filter(g => {
        const l = enr[g];
        return Array.isArray(l) && l.some(e => e && e.personId === p.id && (!e.status || e.status === 'activo'));
      });
      const att      = p.attendedEncounter === true || String(p.attendedEncounter).toLowerCase() === 'true';
      const flag     = countryFlag(p.country);
      const cell     = safeArr(State.cells).find(c => c.id === p.cellId)
                    || safeArr(State.cells).find(c => c.leader === p.cellLeader);
      const ministry = safeArr(State.ministries || []).find(m => m.id === p.ministryId);
      const mt       = ministry ? (MINISTRY_TYPES[ministry.type] || MINISTRY_TYPES.otro) : null;
 
      const cellBadge = cell
        ? el('span', { style:'display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;font-size:11px;font-weight:600;white-space:nowrap' },
            el('span', {}, '⬡'), cell.name)
        : el('span', { style:'font-size:12px;color:var(--text-muted)' }, '—');
 
      const ministryBadge = ministry
        ? el('span', { style:`display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:${mt.color}18;color:${mt.color};border:1px solid ${mt.color}40;font-size:11px;font-weight:600;white-space:nowrap` },
            el('span', {}, mt.icon || '✦'), ministry.name)
        : el('span', { style:'font-size:12px;color:var(--text-muted)' }, '—');
 
      const nameCell = el('div', { class:'person-name-cell', onClick: () => viewPersonModal(p) },
        Avatar(p.name, p.lastName, p.photoUrl || ''),
        el('div', {},
          el('div', { class:'person-name-text' }, (p.name||'') + ' ' + (p.lastName||'')),
          el('div', { class:'person-country-text' }, flag ? flag + ' ' + (p.country||'') : (p.country||''))
        )
      );
 
      return el('tr', {},
        el('td', {}, nameCell),
        el('td', {},
          el('div', { style:{ fontSize:'13px', color:'var(--text-primary)' } }, p.phone || '—'),
          el('div', { style:{ fontSize:'12px', color:'var(--text-muted)' }  }, p.email || '—')
        ),
        el('td', {}, cellBadge),
        el('td', {}, ministryBadge),
        el('td', {}, Badge(att ? 'Sí' : 'No', att ? '#F0FDF4' : '#FEF2F2', att ? '#166534' : '#991B1B')),
        el('td', {}, grades.length
          ? el('div', { style:{ display:'flex', gap:'4px', flexWrap:'wrap' } },
              grades.map(g => Badge(GRADE_LABELS[g], GRADE_COLORS[g].bg, GRADE_COLORS[g].text)))
          : el('span', { style:{ fontSize:'12px', color:'var(--text-muted)' } }, '—')
        ),
        el('td', { class:'center' },
          el('div', { style:{ display:'flex', gap:'4px', justifyContent:'center' } },
            el('button', { class:'btn-tbl-icon btn-tbl-view', title:'Ver perfil',
              onClick: () => viewPersonModal(p) }, svgI('eye', 14)),
            isAdmin
              ? el('button', { class:'btn-tbl-icon btn-tbl-edit', title:'Editar',
                  onClick: () => openPersonModal(p) }, svgI('pencil', 14))
              : null
          )
        )
      );
    });
 
    slotEl.appendChild(el('div', { class:'table-wrap' },
      el('div', { class:'table-scroll' },
        el('table', {},
          el('thead', {},
            el('tr', {}, ['Persona','Contacto','Célula','Ministerio','Encuentro','Cursos','']
              .map((h, i) => el('th', { class: i === 6 ? 'center' : '' }, h)))
          ),
          el('tbody', {}, rows)
        )
      )
    ));
    paintPager(filtered);
  }
 
  function paintPager(filtered) {
    const pg = document.getElementById('ppl-pager');
    if (!pg) return;
    pg.innerHTML = '';
    const pages = Math.max(1, Math.ceil(filtered.length / PPL_PAGE));
    if (pages <= 1) return;
    const from = (State._pplPager.page - 1) * PPL_PAGE + 1;
    const to   = Math.min(State._pplPager.page * PPL_PAGE, filtered.length);
    const mk   = (lbl, p, dis, act) => {
      const b = el('button', { class:'pager-btn' + (act?' pager-active':'') + (dis?' pager-disabled':'') }, lbl);
      if (!dis && !act) b.addEventListener('click', () => { State._pplPager.page = p; paint(); });
      return b;
    };
    const s = Math.max(1, State._pplPager.page - 2);
    const e = Math.min(pages, s + 4);
    pg.append(mk('«', 1, State._pplPager.page===1, false), mk('‹', State._pplPager.page-1, State._pplPager.page===1, false));
    for (let i = s; i <= e; i++) pg.appendChild(mk(i+'', i, false, i === State._pplPager.page));
    pg.append(
      mk('›', State._pplPager.page+1, State._pplPager.page===pages, false),
      mk('»', pages, State._pplPager.page===pages, false),
      el('span', { class:'pager-info' }, `${from}–${to} de ${filtered.length}`)
    );
  }
}

// ─────────────────────────────────────────────────────────────────
function viewPersonModal(p) {
  const enr     = safeObj(State.enrollments);
  const grades  = GRADE_KEYS.filter(g => { const l = enr[g]; return Array.isArray(l) && l.some(e => e && e.personId === p.id); });
  const att     = p.attendedEncounter === true || String(p.attendedEncounter).toLowerCase() === 'true';

  const age     = calcAge(p.birthDate);
  const flag    = countryFlag(p.country);

  const avEl = el('div', { class: 'pv-av' });

    avEl.appendChild(el('img', { src: p.photoUrl, alt: '' }));

    avEl.appendChild(el('div', { class: 'pv-av-init' }, ((p.name || '')[0] || '').toUpperCase() + ((p.lastName || '')[0] || '').toUpperCase()));
  }
 
  // ── Tags en el hero
  const encTag = el('span', { class: 'pv-tag ' + (att ? 'pv-tag-enc-yes' : 'pv-tag-enc-no') },
    att ? '✓ Asistió al Encuentro' : '✗ Sin Encuentro'
  );
  const heroTags = el('div', { class: 'pv-hero-tags' }, encTag);
  if (grades.length) {
    grades.forEach(g => {
      const gc = GRADE_COLORS[g];
      heroTags.appendChild(el('span', {
        class: 'pv-tag',
        style: `background:${gc.bg};color:${gc.text};border-color:${gc.bar}40`
      }, GRADE_LABELS[g]));
    });
  }
 
  // Sub en el hero: nexo + país
  const heroParts = [church ? church.name : null, (flag + ' ' + (p.country || '')).trim() || null].filter(Boolean);
  const heroSub = heroParts.join('  ·  ');
 
  // ── Hero
  const hero = el('div', { class: 'pv-hero' },
    avEl,
    el('div', { class: 'pv-hero-info' },
      el('h2', { class: 'pv-hero-name' }, (p.name || '') + ' ' + (p.lastName || '')),
      heroSub ? el('div', { class: 'pv-hero-sub' }, heroSub) : null,
      heroTags
    )
  );
 
  // ── Helper para fila de info
  function infoRow(iconName, label, value, fullWidth) {
    if (!value && value !== 0) return null;
    const row = el('div', { class: 'pv-row' + (fullWidth ? ' pv-grid-full' : '') });
    const iconWrap = el('div', { class: 'pv-row-icon' });
    iconWrap.innerHTML = (IC[iconName] || '').replace('width="18"', 'width="14"').replace('height="18"', 'height="14"');
    row.append(
      iconWrap,
      el('div', { class: 'pv-row-body' },
        el('div', { class: 'pv-row-lbl' }, label),
        el('div', { class: 'pv-row-val' }, value)
      )
    );
    return row;
  }
 
  // ── Sección contacto (2 columnas)
  const contactGrid = el('div', { class: 'pv-grid' });
  const contactRows = [
    infoRow('phone',    'Teléfono', p.phone),
    infoRow('mail',     'Email',    p.email),
    p.birthDate
      ? (() => {
          const row = el('div', { class: 'pv-row' });
          const iw  = el('div', { class: 'pv-row-icon' });

   })(),

  document.body.appendChild(backdrop);

// ─────────────────────────────────────────────────────────────────
// 4. openPersonModal() — REEMPLAZAR la función completa
//
// Cambio: el campo Célula ahora guarda cellId (ID) + cellLeader (nombre).
// El select muestra "NombreCelula — Líder" pero guarda el ID.
// Retrocompatible: si cellId no existe, muestra cellLeader como fallback.
// ─────────────────────────────────────────────────────────────────
async function openPersonModal(person) {
  const isEdit = !!person;
  const form = {
    name:'', lastName:'', birthDate:'', phone:'', email:'',
    gender:'M', cellId:'', cellLeader:'', photoUrl:'',
    country:'Argentina', churchId:(State.churches[0]||{}).id||'',
    ministryId:'', invitedBy:'', observation:'', attendedEncounter:false,
    invitedBy:'', observation:'', attendedEncounter:false,
    ...(person||{})
  };
  const set = (k, v) => { form[k] = v; };
 
  const inp = (key, type, ph) => {
    const i = el('input', { class:'input', type:type||'text', value:form[key]||'', placeholder:ph||'' });
    i.addEventListener('input', e => set(key, e.target.value));
    return i;
  };
 
  const txtObs = el('textarea', { class:'input', rows:'3', style:'resize:none' });
  txtObs.value = form.observation || '';
  txtObs.addEventListener('input', e => set('observation', e.target.value));
 
  const chk = el('input', { type:'checkbox' });
  chk.checked = form.attendedEncounter === true || String(form.attendedEncounter).toLowerCase() === 'true';
  chk.addEventListener('change', e => set('attendedEncounter', e.target.checked));
 
  const chOpts = (State.churches || []).map(c => [c.id, c.name]);
 
  // País con autocomplete
  const countryAC = makeAutocomplete({
    value: form.country || '',
    placeholder: 'País...',
    items: COUNTRIES,
    itemLabel: c => c.n,
    itemRender: c => {
      const d = el('div', {}); d.innerHTML = `<span class="ac-flag">${c.f}</span><span>${c.n}</span>`; return d;
    },
    onChange: v => set('country', v),
    onSelect: (item, lbl) => set('country', lbl),
  });
 
  // ── CÉLULA — ahora usa Select con IDs en vez de autocomplete libre
  // Construimos las opciones: [id, "NombreCelula — Líder"]
  const cells = safeArr(State.cells);
  const cellOpts = [['', '— Sin célula —'], ...cells.map(c => [c.id, `${c.name} — ${c.leader}`])];
 
  function CellSelect() {
    const s = el('select', { class:'input' });
    cellOpts.forEach(([v, l]) => {
      const o = el('option', { value:v }, l);
      // Matching por ID primero, luego por nombre de líder (retrocompatibilidad)
      if (v && (v === form.cellId || (!form.cellId && cells.find(c => c.id === v && c.leader === form.cellLeader)))) {
        o.selected = true;
      }
      s.appendChild(o);
    });
    s.addEventListener('change', e => {
      const selectedId = e.target.value;
      set('cellId', selectedId);
      const cell = cells.find(c => c.id === selectedId);
      set('cellLeader', cell ? cell.leader : '');
    });
    return s;
  }
 
  // Invitado por con autocomplete
  const pplItems = safeArr(State.people)
    .filter(x => !person || x.id !== person.id)
    .map(x => ({ label: x.name+' '+x.lastName, value: x.name+' '+x.lastName }));
 
  const invitedAC = makeAutocomplete({
    value: form.invitedBy || '',
    placeholder: 'Buscar persona...',
    items: pplItems,
    itemLabel: c => c.label,
    onChange: v => set('invitedBy', v),
    onSelect: (item) => set('invitedBy', item.value),
  });
 
  function Sel2(key, opts) {
    const s = el('select', { class:'input' });
    opts.forEach(([v, l]) => {
      const o = el('option', { value:v }, l);
      if (v === form[key]) o.selected = true;
      s.appendChild(o);
    });
    s.addEventListener('change', e => set(key, e.target.value));
    return s;
  }

  // ── MINISTERIO — Select con íconos y tipo
  if (!safeArr(State.ministries).length) {
    try {
      State.ministries = await new Promise(res => {
        function ok(r) { res(r && r.ok !== false ? (r.data || r) : []); }
        google.script.run.withSuccessHandler(ok).withFailureHandler(() => res([])).getMinistries();
      });
    } catch(_) { State.ministries = []; }
  }
  const ministries = safeArr(State.ministries);
  const ministryOpts = [['', '— Sin ministerio —'], ...ministries.map(m => [m.id, `${MINISTRY_TYPES[m.type]?.icon||'✦'} ${m.name}`])];
  	
  function MinistrySelect() {
    const s = el('select', { class:'input' });
    ministryOpts.forEach(([v, l]) => {
      const o = el('option', { value:v }, l);
      if (v === form.ministryId) o.selected = true;
      s.appendChild(o);
    });
    s.addEventListener('change', e => set('ministryId', e.target.value));
    return s;
  }
 
  const body = el('div', { class:'person-form' },
    el('div', { class:'form-grid' },
      Field('Nombre',             inp('name',      'text', 'Nombre')),
      Field('Apellido',           inp('lastName',  'text', 'Apellido')),
      Field('Fecha de Nacimiento',inp('birthDate', 'date')),
      Field('Género',             Sel2('gender', [['M','Masculino'],['F','Femenino'],['O','Otro']])),
      Field('Teléfono',           inp('phone', 'tel', '+54 11...')),
      Field('Email',              inp('email', 'email', 'correo@ejemplo.com')),
      Field('País de Nacimiento', countryAC.wrap),
      Field('Iglesia',            Sel2('churchId', chOpts)),
    ),
    Field('Célula', CellSelect(), cells.length ? null : 'Cargá células primero desde el menú Células'),
    Field('Ministerio', MinistrySelect(), ministries.length ? null : 'Cargá ministerios primero desde el menú Ministerios'),
    Field('Invitado por', invitedAC.wrap),
    Field('URL de Foto', inp('photoUrl', 'url', 'https://drive.google.com/...')),
    Field('Observación', txtObs),
    el('label', { class:'checkbox-label' }, chk, 'Asistió al Encuentro'),
    el('div', { class:'modal-actions' },
      el('button', { class:'btn btn-secondary', onClick: closeModal }, 'Cancelar'),
      el('button', { class:'btn btn-primary',   onClick: savePersonFn }, 'Guardar persona')
    )
  );
 
  async function savePersonFn() {
    if (!form.name || !form.lastName) { toast('Nombre y Apellido son requeridos', 'error'); return; }
    setLoading(true);
    try {
      const payload = {
        ...form,
        _userId: (State.currentUser || {}).id || '',
        ...(isEdit ? { id: person.id } : {})
      };
      await gasMut('savePerson', payload);
      toast(isEdit ? 'Persona actualizada' : 'Persona creada', 'success');
      closeModal();
      // Refrescar datos en paralelo
      const [people, enrollments] = await Promise.all([
        gasRead('getPeople',      []),
        gasRead('getEnrollments', {}),
      ]);
      State.people      = safeArr(people);
      State.enrollments = safeObj(enrollments);
      renderPage();
    } catch(e) {
      toast(e.message, 'error');
    } finally { setLoading(false); }
  }
 
  openModal(isEdit ? 'Editar Persona' : 'Nueva Persona', body, true);
}
