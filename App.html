  // ── Estado interno de paginación / búsqueda
  if (!State._usersPager) State._usersPager = { page:1, q:'' };
  const P = State._usersPager;
  const USR_PAGE = 15;

  // ── Buscador
  const sWrap = el('div', { class:'audit-search-wrap', style:'max-width:320px;flex:1' });
  const sIcon = el('span', { class:'alumnos-search-icon' }); sIcon.innerHTML = IC.search;
  const sInp  = el('input', { class:'alumnos-search-input', placeholder:'Buscar usuario, email, rol...', value: P.q });
  sInp.addEventListener('input', e => { P.q = e.target.value; P.page = 1; paint(); });
  sWrap.append(sIcon, sInp);

  const toolbar = el('div', { class:'audit-toolbar' }, sWrap);
  const tableSlot = el('div', {});
  const pagerSlot = el('div', { style:'display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:10px 0 4px' });

  const wrap = el('div', {});
  wrap.append(hero, toolbar, tableSlot, pagerSlot);

  function getFiltered() {
    const q = (P.q || '').toLowerCase().trim();
    return users.filter(u => {
      if (!q) return true;
      const church = churches.find(c => c.id === u.churchId);
      const hay = ((u.name||'')+' '+(u.username||'')+' '+(u.email||'')+' '+(ROLES_LABEL[u.role]||u.role||'')+' '+(church?church.name:'')).toLowerCase();
      return hay.includes(q);
    });
  }

  function paint() {
    tableSlot.innerHTML = '';
    pagerSlot.innerHTML = '';
    const filtered = getFiltered();
    const pages = Math.max(1, Math.ceil(filtered.length / USR_PAGE));
    P.page = Math.min(Math.max(1, P.page), pages);
    const from  = (P.page - 1) * USR_PAGE;
    const items = filtered.slice(from, from + USR_PAGE);

    if (!items.length) {
      tableSlot.appendChild(el('div',{class:'empty-state'},el('span',{class:'empty-state-icon'},'⚙'),P.q?'Sin resultados para la búsqueda.':'No hay usuarios cargados.'));
      return;
    }

    const rows = items.map(user => {
      const church  = churches.find(c => c.id === user.churchId);
      // Buscar persona asociada por personId o por coincidencia de nombre/email
      const person  = people.find(p => p.id === user.personId) ||
                      people.find(p => (p.email||'').toLowerCase() === (user.email||'').toLowerCase()) ||
                      null;
      const active  = user.active !== false; // por defecto activo si no tiene campo

      const av = el('div', {
        class:'avatar',
        style:`width:34px;height:34px;font-size:13px;cursor:${person?'pointer':'default'};flex-shrink:0`,
        title: person ? `Ver perfil de ${person.name} ${person.lastName}` : ''
      });
      if (user.photoUrl || (person && person.photoUrl)) {
        const img = el('img',{src:user.photoUrl||(person&&person.photoUrl)||'',alt:''});
        av.appendChild(img);
      } else {
        av.textContent = ((user.name||'')[0]||'').toUpperCase() + ((user.name||'').split(' ')[1]||'')[0]?.toUpperCase() || '';
      }
      if (person) av.addEventListener('click', () => viewPersonModal(person));

      const statusDot = el('span', {
        style:`display:inline-block;width:7px;height:7px;border-radius:50%;background:${active?'#22C55E':'#94A3B8'};margin-right:5px;flex-shrink:0`
      });

      return el('tr', { style: active ? '' : 'opacity:.55' },
        el('td', {},
          el('div', { style:'display:flex;align-items:center;gap:10px' },
            av,
            el('div', {},
              el('div', { style:'font-weight:600;font-size:13.5px;color:var(--text-primary)' }, user.name || '—'),
              el('div', { style:'font-size:11.5px;color:var(--text-muted);margin-top:1px' }, '@'+(user.username||'—'))
            )
          )
        ),
        el('td', { style:'font-size:12.5px;color:var(--text-secondary)' }, user.email || '—'),
        el('td', {},
          Badge(ROLES_LABEL[user.role]||user.role, RB[user.role]||'#E8F0FE', RC[user.role]||'#4A8AF4')
        ),
        el('td', { style:'font-size:12px;color:var(--text-secondary)' },
          church ? church.name : '—'
        ),
        el('td', {},
          person
            ? el('div', {
                style:'display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--blue-500);font-size:12px;font-weight:600',
                onClick:()=>viewPersonModal(person)
              },
                el('span',{},'👤'),
                el('span',{},person.name+' '+person.lastName)
              )
            : el('span',{style:'font-size:12px;color:var(--text-muted);font-style:italic'},'Sin asociar')
        ),
        el('td', {},
          el('div',{style:'display:flex;align-items:center;gap:4px'},
            statusDot,
            el('span',{style:'font-size:12px;color:var(--text-secondary)'},active?'Activo':'Inactivo')
          )
        ),
        el('td', { class:'center' },
          el('div', { style:'display:flex;gap:4px;justify-content:center' },
            el('button', {
              class:'btn-tbl-icon btn-tbl-view',
              title:'Editar usuario',
              onClick: () => openUserModal(user)
            }, svgI('pencil', 14)),
            el('button', {
              class:'btn-tbl-icon',
              style:`border-color:${active?'#FEF3C7':'#F0FDF4'};color:${active?'#D97706':'#16A34A'}`,
              title: active ? 'Desactivar usuario' : 'Activar usuario',
              onClick: async () => {
                const ok = await showConfirm({
                  icon: active?'⏸':'▶',
                  type: active?'warning':'warning',
                  title: active?'¿Desactivar usuario?':'¿Activar usuario?',
                  msg: active?`${user.name} no podrá iniciar sesión.`:`${user.name} podrá volver a iniciar sesión.`,
                  okText: active?'Sí, desactivar':'Sí, activar',
                  cancelText:'Cancelar'
                });
                if (!ok) return;
                setLoading(true);
                try {
                  await gasMut('saveUser', {...user, active: !active});
                  toast(`Usuario ${active?'desactivado':'activado'}`, 'success');
                  State.users = safeArr(await gasRead('getUsers',[]));
                  renderPage();
                } catch(e) { toast(e.message,'error'); } finally { setLoading(false); }
              }
            }, el('span',{style:'font-size:13px'},active?'⏸':'▶')),
            el('button', {
              class:'btn-tbl-icon',
              style:'border-color:#FEE2E2;color:#DC2626',
              title:'Eliminar usuario',
              onClick: async () => {
                const ok = await showConfirm({
                  icon:'🗑', type:'danger',
                  title:'¿Eliminar usuario?',
                  msg:`Se eliminará permanentemente la cuenta de ${user.name}.`,
                  okText:'Sí, eliminar', cancelText:'Cancelar'
                });
                if (!ok) return;
                setLoading(true);
                try {
                  await gasMut('saveUser', {...user, deleted:true});
                  toast('Usuario eliminado','success');
                  State.users = safeArr(await gasRead('getUsers',[]));
                  renderPage();
                } catch(e) { toast(e.message,'error'); } finally { setLoading(false); }
              }
            }, svgI('pencil',14))
          )
        )
      );
    });

    tableSlot.appendChild(el('div',{class:'table-wrap'},
      el('div',{class:'table-scroll'},
        el('table',{},
          el('thead',{},el('tr',{},
            ['Usuario','Email','Rol','Nexo','Persona asociada','Estado','']
              .map((h,i)=>el('th',{class:i===6?'center':''},h))
          )),
          el('tbody',{},...rows)
        )
      )
    ));

    // Paginación
    if (pages > 1) {
      const toV  = Math.min(P.page * USR_PAGE, filtered.length);
      const fromV = from + 1;
      const mk = (lbl, p, dis, act) => {
        const b = el('button',{class:'pager-btn'+(act?' pager-active':'')+(dis?' pager-disabled':'')},lbl);
        if (!dis && !act) b.addEventListener('click',()=>{P.page=p;paint();});
        return b;
      };
      const s = Math.max(1,P.page-2), e = Math.min(pages,s+4);
      pagerSlot.append(mk('«',1,P.page===1,false),mk('‹',P.page-1,P.page===1,false));
      for(let i=s;i<=e;i++) pagerSlot.appendChild(mk(i+'',i,false,i===P.page));
      pagerSlot.append(
        mk('›',P.page+1,P.page===pages,false),
        mk('»',pages,P.page===pages,false),
        el('span',{class:'pager-info'},`${fromV}–${toV} de ${filtered.length}`)
      );
    }
  }

  paint();
  return wrap;
}

function openUserModal(user) {
  const isEdit = !!user;
  const people  = safeArr(State.people);
  const form = {
    name:'', username:'', password:'', email:'', role:'secretary',
    churchId:(safeArr(State.churches)[0]||{}).id||'', assignedGrade:'',
    personId:'', active:true,
    ...(user||{})
  };
  const set = (k,v) => { form[k]=v; };
  const inp = (key, type, ph) => {
    const i = el('input',{class:'input',type:type||'text',value:form[key]||'',placeholder:ph||''});
    i.addEventListener('input',e=>set(key,e.target.value));
    return i;
  };

  function Sel2(key, opts) {
    const s = el('select',{class:'input'});
    opts.forEach(([v,l])=>{const o=el('option',{value:v},l);if(v===form[key])o.selected=true;s.appendChild(o);});
    s.addEventListener('change',e=>set(key,e.target.value));
    return s;
  }

  const chOpts = safeArr(State.churches).map(c=>[c.id,c.name]);

  // Selector de persona asociada con autocompletado
  const personAC = makeAutocomplete({
    value: (() => {
      const p = people.find(x=>x.id===form.personId);
      return p ? `${p.name} ${p.lastName}` : form.personId ? form.personId : '';
    })(),
    placeholder: 'Buscar persona por nombre...',
    items: people,
    itemLabel: p => `${p.name} ${p.lastName}`,
    itemRender: p => {
      const row = el('div',{style:'display:flex;align-items:center;gap:8px'});
      row.append(Avatar(p.name,p.lastName,p.photoUrl||'',28,10));
      const info = el('div',{});
      info.appendChild(el('div',{style:'font-size:13px;font-weight:600;color:var(--text-primary)'},p.name+' '+p.lastName));
      if (p.email) info.appendChild(el('div',{style:'font-size:11px;color:var(--text-muted)'},p.email));
      row.appendChild(info);
      return row;
    },
    onChange: v => { if (!v) set('personId',''); },
    onSelect: (p) => {
      set('personId', p.id);
      // Auto-completar email si está vacío
      if (!form.email && p.email) {
        form.email = p.email;
        const emailInp = document.getElementById('usr-email-inp');
        if (emailInp) emailInp.value = p.email;
      }
      // Auto-completar nombre si está vacío
      if (!form.name && p.name) {
        form.name = p.name + (p.lastName ? ' '+p.lastName : '');
        const nameInp = document.getElementById('usr-name-inp');
        if (nameInp) nameInp.value = form.name;
      }
    }
  });

  // Campo nombre con id para auto-completar
  const nameInp = el('input',{id:'usr-name-inp',class:'input',type:'text',value:form.name||'',placeholder:'Nombre completo'});
  nameInp.addEventListener('input',e=>set('name',e.target.value));

  // Campo email con id
  const emailInp = el('input',{id:'usr-email-inp',class:'input',type:'email',value:form.email||'',placeholder:'correo@ejemplo.com'});
  emailInp.addEventListener('input',e=>set('email',e.target.value));

  // Grade field (reactivo al rol)
  const gs = el('div',{});
  const rSel = Sel2('role',[['admin','Administrador'],['secretary','Secretario/a'],['maestro','Maestro/a']]);
  rSel.addEventListener('change',()=>renderGF());

  function renderGF(){
    gs.innerHTML='';
    if(form.role==='secretary'||form.role==='maestro'){
      const go=[['','— Todos —'],...GRADE_KEYS.map(g=>[g,GRADE_LABELS[g]])];
      gs.appendChild(Field('Grado asignado',Sel2('assignedGrade',go)));
    }
  }
  renderGF();

  const body = el('div',{},
    // Persona asociada (destacado arriba)
    el('div',{style:'padding:14px 16px;background:var(--blue-50);border:1px solid rgba(74,138,244,.2);border-radius:12px;margin-bottom:16px'},
      el('div',{style:'font-size:11px;font-weight:700;color:var(--blue-600);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px'},'👤 Asociar con Persona (opcional)'),
      personAC.wrap,
      el('div',{style:'font-size:11px;color:var(--text-muted);margin-top:5px'},'Al vincular una persona, el usuario hereda su foto y datos de perfil.')
    ),
    el('div',{class:'form-grid'},
      Field('Nombre completo', nameInp),
      Field('Usuario', inp('username','text','@usuario')),
      Field('Contraseña', inp('password','password',isEdit?'(sin cambios)':'')),
      Field('Email', emailInp),
      Field('Rol', rSel),
      Field('Nexo', Sel2('churchId', chOpts)),
    ),
    gs,
    el('div',{class:'modal-actions'},
      el('button',{class:'btn btn-secondary',onClick:closeModal},'Cancelar'),
      isEdit ? el('button',{
        class:'btn btn-danger btn-sm', style:'margin-right:auto',
        onClick: async () => {
          const ok = await showConfirm({icon:'🗑',type:'danger',title:'¿Eliminar usuario?',msg:`Se eliminará permanentemente la cuenta de ${user.name}.`,okText:'Sí, eliminar',cancelText:'Cancelar'});
          if(!ok) return;
          setLoading(true);
          try {
            await gasMut('saveUser',{...form,id:user.id,deleted:true});
            toast('Usuario eliminado','success');
            closeModal();
            State.users=safeArr(await gasRead('getUsers',[]));
            renderPage();
          } catch(e){toast(e.message,'error');}finally{setLoading(false);}
        }
      },'🗑 Eliminar') : null,
      el('button',{class:'btn btn-primary',onClick:saveUser},isEdit?'✓ Guardar cambios':'＋ Crear Usuario')
    )
  );

  async function saveUser(){
    if(!form.name||!form.username){toast('Nombre y usuario son requeridos','error');return;}
    if(!isEdit&&!form.password){toast('Contraseña requerida','error');return;}
    setLoading(true);
    try{
      await gasMut('saveUser',{...form,...(isEdit?{id:user.id}:{})});
      toast(isEdit?'Usuario actualizado':'Usuario creado','success');
      closeModal();
      State.users=safeArr(await gasRead('getUsers',[]));
      renderPage();
    }catch(e){toast(e.message,'error');}finally{setLoading(false);}
  }

  openModal(isEdit?'Editar Usuario':'Nuevo Usuario', body, true);
}

  const root=$('app');root.innerHTML='';
  root.appendChild(el('div',{id:'app-layout',class:'app-layout'},
    el('div',{id:'sidebar-slot'}),
    el('main',{class:'main-content',id:'page-content'})
  ));
  renderSidebar();renderPage();
}

window.initApp=async function(){
  if(!window.APP||!window.APP.user){
    try{const u=JSON.parse((window.JCVStore||{get:()=>null}).get('jcv_user')||'null');if(u){window.APP=window.APP||{};window.APP.user=u;}}catch(e){}
  }
  if(!window.APP||!window.APP.user){
    const sc=document.getElementById('auth-screen');if(sc){sc.style.display='flex';sc.style.flexDirection='column';}return;
  }
  State.currentUser=window.APP.user;
  if((State.currentUser.role==='secretary'||State.currentUser.role==='maestro')&&State.currentUser.assignedGrade)State.activeNav='schools';
  const sp=document.getElementById('splash');if(sp)sp.classList.add('hide');
  const sc=document.getElementById('auth-screen');if(sc)sc.style.display='none';
  renderApp();
  await loadPageData(State.activeNav);
  renderPage();
};

const SB_Controller = (() => {
  let _menuOpen = false;
  let _view     = 'main'; // 'main' | 'pw'
  let _ttTimer  = null;
  const LOGO_KEY = 'jcv:sb:logo';
 
  function persistCollapsed(val) {
    try { localStorage.setItem('jcv:sb:col', JSON.stringify(val)); } catch(_) {}
  }
 
  function getSavedLogo() {
    try { return localStorage.getItem(LOGO_KEY) || null; } catch(_) { return null; }
  }
 
  function uploadLogo(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { toast('Imagen demasiado grande (máx 3 MB)', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      try { localStorage.setItem(LOGO_KEY, dataUrl); } catch(_) {}
      const img = document.getElementById('sb-logo-img');
      if (img) { img.src = dataUrl; img.onload = () => img.classList.add('loaded'); }
      // En producción: gasMut('saveChurch', { id: State.currentChurchId, logoUrl: dataUrl })
      toast('Logo actualizado', 'success');
    };
    reader.readAsDataURL(file);
    input.value = '';
  }
 
  function toggleMenu() {
    if (_menuOpen) _closeMenu(); else _openMenu();
  }
 
  function _openMenu() {
    _menuOpen = true; _view = 'main';
    _renderMenu();
  }
 
  function _closeMenu(cb) {
    const slot = document.getElementById('sb-pm-slot');
    const m = slot && slot.querySelector('.sb-pm');
    if (m) {
      m.classList.add('closing');
      setTimeout(() => { if (slot) slot.innerHTML = ''; _menuOpen = false; if (cb) cb(); }, 170);
    } else {
      if (slot) slot.innerHTML = ''; _menuOpen = false; if (cb) cb();
    }    
    document.removeEventListener('click', _outsideClick);

            </button>
          </div>
        </div>
        <div class="spm-pw-field">
          <label class="spm-pw-label">Nueva contraseña</label>
          <div class="spm-pw-wrap">
            <input type="password" id="sb-pw-new" class="spm-pw-input" placeholder="Mín. 6 caracteres" autocomplete="new-password" oninput="SB_Controller._strength(this.value)">
            <button class="spm-pw-eye" type="button" onclick="SB_Controller._eye('sb-pw-new',this)">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M1 10s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z"/><circle cx="10" cy="10" r="3"/></svg>
            </button>
          </div>
          <div class="spm-str-row">
            <div class="spm-str-bar" id="sb-str-1"></div>
            <div class="spm-str-bar" id="sb-str-2"></div>
            <div class="spm-str-bar" id="sb-str-3"></div>
            <div class="spm-str-bar" id="sb-str-4"></div>
          </div>
        </div>
        <div class="spm-pw-field">
          <label class="spm-pw-label">Repetir contraseña</label>
          <div class="spm-pw-wrap">
            <input type="password" id="sb-pw-conf" class="spm-pw-input" placeholder="••••••••" autocomplete="new-password">
            <button class="spm-pw-eye" type="button" onclick="SB_Controller._eye('sb-pw-conf',this)">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M1 10s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z"/><circle cx="10" cy="10" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="spm-save-btn" onclick="SB_Controller._savePw()">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 10l4 4 8-8"/></svg>
          Guardar contraseña
        </button>
      </div>`;

    slot.innerHTML = `<div class="sb-pm spm" id="sb-pm-inner">${_view === 'pw' ? pwView : mainView}</div>`;

    setTimeout(() => {
      document.addEventListener('click', _outsideClick);
    }, 10);
  }

  function _outsideClick(e) {
    const slot = document.getElementById('sb-pm-slot');
    const trigger = document.getElementById('sb-user-trigger');
    if (slot && !slot.contains(e.target) && trigger && !trigger.contains(e.target)) {
      _closeMenu();
    }
  }

  function _showPw()   { _view = 'pw';   _renderMenu(); }
  function _showMain() { _view = 'main'; _renderMenu(); }

  function _toggleTheme() {
    _closeMenu(() => {
      State.dark = !State.dark;
      document.body.className = State.dark ? 'dark' : '';
      renderSidebar();
    });
  }

  function _confirmLogout() {
    _closeMenu(() => doLogout());
  }

  function _eye(id, btn) {
    const inp = document.getElementById(id); if (!inp) return;
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.style.color = show ? 'rgba(91,142,240,.8)' : '';
  }

  function _strength(val) {
    const score = [
      val.length >= 8, /[A-Z]/.test(val), /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val)
    ].filter(Boolean).length;
    const colors = { 0:'transparent', 1:'#F87171', 2:'#FBBF24', 3:'#5B8EF0', 4:'#22C55E' };
    [1,2,3,4].forEach(i => {
      const b = document.getElementById('sb-str-'+i);
      if (b) b.style.background = i <= score ? colors[score] : 'rgba(255,255,255,.1)';
    });
  }

  async function _savePw() {
    const cur  = (document.getElementById('sb-pw-cur')  || {}).value || '';
    const nw   = (document.getElementById('sb-pw-new')  || {}).value || '';
    const conf = (document.getElementById('sb-pw-conf') || {}).value || '';
    const shake = id => {
      const el = document.getElementById(id); if (!el) return;
      el.style.borderColor = '#F87171'; el.style.boxShadow = '0 0 0 3px rgba(248,113,113,.2)';
      setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 700);
    };
    if (!cur)          { shake('sb-pw-cur');  toast('Ingresá tu contraseña actual', 'error'); return; }
    if (nw.length < 6) { shake('sb-pw-new');  toast('Mínimo 6 caracteres', 'error'); return; }
    if (nw !== conf)   { shake('sb-pw-conf'); toast('Las contraseñas no coinciden', 'error'); return; }

    const btn = document.querySelector('.spm-save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
    try {
      await gasMut('changePassword', (State.currentUser||{}).id, cur, nw);
      _closeMenu(() => toast('Contraseña actualizada correctamente', 'success'));
    } catch(e) {
      toast(e.message || 'Error al cambiar contraseña', 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 10l4 4 8-8"/></svg> Guardar contraseña`; }
    }
  }
 
  function _goTo(page) {
    _closeMenu(() => navigate(page));
  }
 
  // Tooltips — position:fixed para no ser recortados por overflow:hidden
  function wireTooltips() {
    document.querySelectorAll('.sb-ni').forEach(btn => {
      btn.removeEventListener('mouseenter', _onTipEnter);
      btn.removeEventListener('mouseleave', _onTipLeave);
      btn.removeEventListener('click',      _onTipLeave);
      btn.addEventListener('mouseenter', _onTipEnter);
      btn.addEventListener('mouseleave', _onTipLeave);
      btn.addEventListener('click',      _onTipLeave);
    });
  }
 
  function _onTipEnter(e) {
    if (!State.sidebarCollapsed) return;
    clearTimeout(_ttTimer);
    const tip  = document.getElementById('sb-tt'); if (!tip) return;
    const rect = e.currentTarget.getBoundingClientRect();
    tip.textContent = e.currentTarget.dataset.tip || '';
    tip.style.top   = `${rect.top + rect.height / 2}px`;
    tip.style.left  = `${rect.right + 14}px`;
    tip.style.transform = 'translateX(-6px)';
    _ttTimer = setTimeout(() => tip.classList.add('on'), 30);
  }
 
  function _onTipLeave() {
    clearTimeout(_ttTimer);
    const tip = document.getElementById('sb-tt'); if (tip) tip.classList.remove('on');
  }
 
  return { persistCollapsed, getSavedLogo, uploadLogo, toggleMenu, wireTooltips, _togglePw, _savePw, _eye, _strength, _goTo };
})();
</script>
