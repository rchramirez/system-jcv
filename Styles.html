    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
  }

  .class-card-v2-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .class-card-v2-date {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .class-status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .class-card-v2-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .class-card-v2-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    /* Standard property for line-clamp */
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    overflow: hidden;
    display: box;
    box-orient: vertical;
    line-clamp: 2;
  }

  .class-card-v2-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .class-chip {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-subtle);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 2px 8px;
  }

  .class-chip-att {
    color: #16A34A;
    background: #F0FDF4;
    border-color: #22C55E30;
  }

  .class-chip-quest {
    color: #7C3AED;
    background: #F3E8FF;
    border-color: #A855F730;
  }

  .class-card-v2-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-module {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    transition: all .15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .btn-module-att {
    background: #F0FDF4;
    color: #16A34A;
  }

  .btn-module-att:hover {
    background: #22C55E;
    color: #fff;
  }

  .btn-module-quest {
    background: #F3E8FF;
    color: #7C3AED;
  }

  .btn-module-quest:hover {
    background: #A855F7;
    color: #fff;
  }

  .btn-module-edit {
    background: var(--bg-subtle);
    color: var(--text-secondary);
    border: 1px solid var(--border-soft);
    width: 32px;
    height: 32px;
    padding: 0;
    justify-content: center;
  }

  .btn-module-edit:hover {
    background: var(--border-soft);
    color: var(--text-primary);
  }

  /* Modal clase: grade tag + status picker */

  .class-modal-grade-tag {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .status-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .status-pick-btn {
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    border: 2px solid var(--border-soft);
    background: var(--bg-subtle);
    color: var(--text-secondary);
    transition: all .15s;
  }

  .status-pick-btn:hover {
    border-color: var(--border-medium);
    color: var(--text-primary);
  }

  /* ── ASISTENCIA: selector de clase en pills ─────────────── */
  .att-selector-wrap {
    margin-bottom: 16px;
  }

  .att-class-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .att-class-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border-soft);
    background: var(--bg-surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    transition: all .15s;
    max-width: 220px;
  }

  .att-class-pill:hover {
    border-color: var(--border-medium);
    color: var(--text-primary);
  }

  .att-class-pill.active {
    font-weight: 600;
  }

  .att-pill-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .att-pill-date {
    flex-shrink: 0;
  }

  .att-pill-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .att-more-label {
    font-size: 12px;
    color: var(--text-muted);
    padding: 6px 8px;
  }

  /* Barra resumen de asistencia */
  .att-summary-bar {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: var(--shadow-xs);
  }

  .att-sum-item {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    border-right: 1px solid var(--border-soft);
  }

  .att-sum-item:last-child {
    border-right: none;
  }

  .att-sum-val {
    font-size: 22px;
    font-weight: 800;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .att-sum-lbl {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-top: 3px;
  }

  .att-sum-pct-wrap {
    flex: 0 0 80px;
    text-align: center;
    padding: 12px 8px;
    background: var(--bg-subtle);
  }

  .att-sum-pct-val {
    font-size: 20px;
    font-weight: 800;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .att-sum-pct-lbl {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* Bulk bar */
  .att-bulk-bar-v2 {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    margin-bottom: 12px;
  }

  .att-bulk-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .att-bulk-pill {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: filter .15s;
  }

  .att-bulk-pill:hover {
    filter: brightness(.92);
  }

  /* Filas de alumnos en asistencia */
  .att-students-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .att-student-row {
    display: grid;
    grid-template-columns: 200px 1fr auto 40px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--border-soft);
    background: var(--bg-surface);
    border-left-width: 3px;
    transition: background .15s;
  }

  @media(max-width:640px) {
    .att-student-row {
      grid-template-columns: 1fr;
      gap: 10px;
    }
  }

  .att-student-info {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .att-student-text {
    min-width: 0;
  }

  .att-student-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .att-student-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Botones de tipo de asistencia */
  .att-type-group {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .att-type-btn-v2 {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }

  .att-type-btn-v2:hover {
    filter: brightness(.92);
  }


  /* Campo motivo */
  .att-reason-input {
    padding: 6px 10px;
    border: 1.5px solid var(--border-soft);
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    background: var(--bg-surface);
    color: var(--text-primary);
    outline: none;
    transition: border-color .15s;
    min-width: 120px;
  }

  .att-reason-input:focus {
    border-color: var(--blue-400);
  }

  .att-reason-input::placeholder {
    color: var(--text-muted);
  }

  /* Barra de guardar flotante */
  .att-save-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    box-shadow: var(--shadow-md);
    margin-top: 8px;
    position: sticky;
    bottom: 16px;
    z-index: 10;
  }

  .att-save-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ── CUESTIONARIOS v2 ───────────────────────────────────── */
  .quest-tab-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .quest-tab-info {
    font-size: 13px;
    color: var(--text-muted);
  }

  .quest-group-v2 {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    margin-bottom: 16px;
  }

  .quest-group-v2-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 20px;
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border-soft);
    flex-wrap: wrap;
  }

  .quest-group-v2-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .quest-group-v2-icon {
    font-size: 24px;
  }

  .quest-group-v2-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .quest-group-v2-sub {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .quest-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
  }

  .quest-ok {
    background: #F0FDF4;
    color: #16A34A;
    border: 1px solid #22C55E30;
  }

  .quest-pending {
    background: #FFFBEB;
    color: #D97706;
    border: 1px solid #F59E0B30;
  }

  .quest-avg {
    background: #EEF4FF;
    color: #1e40af;
    border: 1px solid #4A8AF430;
  }

  /* Círculo de porcentaje */
  .quest-group-v2-pct-wrap {
    text-align: center;
    padding: 4px;
    flex-shrink: 0;
  }

  .quest-pct-val {
    font-size: 22px;
    font-weight: 800;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .quest-pct-sub {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* Grid de alumnos en cuestionario */
  .quest-students-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    padding: 16px 20px;
  }

  .quest-student-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top-width: 3px;
    transition: box-shadow .15s;
  }

  .quest-student-card:hover {
    box-shadow: var(--shadow-sm);
  }

  .quest-sc-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .quest-sc-info {
    flex: 1;
    min-width: 0;
  }

  .quest-sc-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .quest-sc-status {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .quest-sc-body {
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 12px;
  }

  .quest-sc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .quest-sc-label {
    color: var(--text-muted);
  }

  .quest-sc-val {
    color: var(--text-secondary);
    font-weight: 500;
  }

  .quest-sc-nota {
    font-size: 20px;
    font-weight: 800;
    font-family: 'Playfair Display', serif;
  }

  .quest-sc-btn {
    width: 100%;
    justify-content: center;
    margin-top: 4px;
  }

  /* Modal cuestionario */
  .quest-modal-header {
    margin-bottom: 12px;
  }

  .quest-modal-class-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* Modal entregar */

  .submit-modal-person {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .submit-person-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .submit-quest-title {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .submit-nota-wrap {
    text-align: center;
  }

  /* ── Misc heredados ──────────────────────────────────────── */
  .page-header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .quest-assign-info {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--blue-50, #EEF4FF);
    border: 1px solid rgba(74, 138, 244, .2);
    border-radius: 10px;
    margin: 12px 0 4px;
  }

  body.dark .quest-assign-info {
    background: rgba(74, 138, 244, .1);
    border-color: rgba(74, 138, 244, .25);
  }

  .quest-assign-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .quest-assign-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .quest-assign-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .quest-status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }


  /* ══════════════════════════════════════════════════════════════
   DASHBOARD SECRETARIO — Panel contextual
   ══════════════════════════════════════════════════════════════ */

  /* ── Hero header ─────────────────────────────────────────────── */
  .sec-dashboard {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sec-hero {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .sec-hero-band {
    height: 4px;
  }

  .sec-hero-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 24px;
    flex-wrap: wrap;
  }

  .sec-hero-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .sec-hero-icon {
    width: 50px;
    height: 50px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .sec-hero-eyebrow {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .sec-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text-primary);
    margin: 0 0 7px;
    line-height: 1.1;
  }

  .sec-hero-grade-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .sec-hero-metrics {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .sec-metric {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .sec-metric-val {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
  }

  .sec-metric-lbl {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .sec-met-sep {
    width: 1px;
    height: 30px;
    background: var(--border-soft);
  }

  /* ── 2-col grid ──────────────────────────────────────────────── */
  .sec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  @media(max-width:860px) {
    .sec-grid {
      grid-template-columns: 1fr;
    }
  }

  .sec-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Cards ───────────────────────────────────────────────────── */
  .sec-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    display: flex;
    flex-direction: column;
  }

  .sec-card-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-subtle);
  }

  .sec-card-hdr-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sec-card-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    background: rgba(74, 138, 244, .1);
    flex-shrink: 0;
  }

  .sec-icon-danger {
    background: rgba(244, 63, 94, .1);
  }

  .sec-icon-blue {
    background: rgba(59, 130, 246, .1);
  }

  .sec-icon-pink {
    background: rgba(236, 72, 153, .08);
  }

  .sec-card-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--text-primary);
  }

  .sec-card-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .sec-card-body {
    padding: 10px 14px;
    flex: 1;
  }

  .sec-scroll {
    max-height: 300px;
    overflow-y: auto;
  }

  .sec-scroll::-webkit-scrollbar {
    width: 4px;
  }

  .sec-scroll::-webkit-scrollbar-track {
    background: transparent;
  }

  .sec-scroll::-webkit-scrollbar-thumb {
    background: var(--border-medium);
    border-radius: 4px;
  }

  /* Badges */
  .sec-badge-danger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    padding: 0 6px;
    background: #FFF1F2;
    color: #E11D48;
    border: 1px solid #F43F5E30;
  }

  .sec-badge-bday {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    padding: 0 6px;
    background: #FFF1F2;
    color: #E11D48;
    border: 1px solid #F43F5E30;
  }

  /* ── Student / bday lists ────────────────────────────────────── */
  .sec-list {
    display: flex;
    flex-direction: column;
  }

  .sec-student-row,
  .sec-bday-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    transition: background .12s;
  }

  .sec-student-row:hover,
  .sec-bday-row:hover {
    background: var(--bg-subtle);
  }

  .sec-s-info {
    flex: 1;
    min-width: 0;
  }

  .sec-s-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sec-grade-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    margin-top: 2px;
    display: inline-block;
  }

  /* Attendance chips */
  .sec-att-row {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .sec-att-chip {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
  }

  .sec-att-absent {
    background: #FFF1F2;
    color: #E11D48;
  }

  .sec-att-late {
    background: #FFFBEB;
    color: #D97706;
  }

  .sec-nota {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 800;
    min-width: 32px;
    text-align: center;
  }

  /* Risk rows */
  .sec-risk-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    border-left: 3px solid transparent;
    transition: background .12s;
  }

  .sec-risk-row:hover {
    background: var(--bg-subtle);
  }

  .sec-risk-info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  /* ── Class list ──────────────────────────────────────────────── */
  .sec-class-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .sec-class-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border-soft);
    background: var(--bg-subtle);
    transition: all .14s;
  }

  .sec-class-row:hover {
    border-color: var(--blue-400);
    background: var(--bg-surface);
  }

  .sec-class-today {
    border-color: #3B82F6 !important;
    background: #EFF6FF !important;
  }

  body.dark .sec-class-today {
    background: rgba(59, 130, 246, .1) !important;
  }

  .sec-class-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 28px;
    flex-shrink: 0;
  }

  .sec-class-day {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }

  .sec-class-mon {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    font-weight: 600;
  }

  .sec-class-info {
    flex: 1;
    min-width: 0;
  }

  .sec-class-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sec-class-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 3px;
  }

  .sec-class-enrolled {
    font-size: 11px;
    color: var(--text-muted);
  }

  .sec-today-pill {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    background: #3B82F6;
    color: #fff;
    flex-shrink: 0;
  }

  .sec-soon-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: #FFFBEB;
    color: #D97706;
    border: 1px solid #F59E0B30;
    flex-shrink: 0;
  }

  /* ── Birthday rows ───────────────────────────────────────────── */
  .sec-bday-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .sec-bday-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .sec-past {
    opacity: .5;
  }

  /* Empty message */
  .sec-empty-msg {
    text-align: center;
    padding: 18px 16px;
    font-size: 13px;
    color: var(--text-muted);
    background: var(--bg-subtle);
    border-radius: 10px;
    margin: 4px 0;
  }

  /* ── Admin dashboard grade cards ─────────────────────────────── */
  .dash-grade-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    transition: transform .18s, box-shadow .18s;
    display: flex;
    flex-direction: column;
  }

  .dash-grade-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }


  /* ── Pending items (quests / TPs) ─────────────────────────── */
  .sec-icon-quest {
    background: rgba(139, 92, 246, .1);
  }

  .sec-icon-tp {
    background: rgba(234, 179, 8, .1);
  }

  .sec-badge-warn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    padding: 0 6px;
    background: #FFFBEB;
    color: #D97706;
    border: 1px solid #F59E0B30;
  }

  .sec-pend-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sec-pend-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border-soft);
    background: var(--bg-subtle);
    transition: all .13s;
  }

  .sec-pend-row:hover {
    border-color: var(--border-medium);
    background: var(--bg-surface);
  }

  .sec-pend-left {
    flex: 1;
    min-width: 0;
  }

  .sec-pend-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sec-pend-class {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .sec-pend-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .sec-pend-stats {
    display: flex;
    gap: 4px;
  }

  .sec-pend-chip {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
  }

  .sec-pend-pend {
    background: #FFFBEB;
    color: #D97706;
  }

  .sec-pend-venc {
    background: #FFF1F2;
    color: #E11D48;
  }

  .sec-pend-due {
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Second row of cards (quest + tp) */
  .sec-grid-2 {
    margin-top: 0;
  }


  /* ══════════════════════════════════════════════════════════════
   SCHOOLS — Hero + Horizontal Tabs + Alumnos redesign
   ══════════════════════════════════════════════════════════════ */

  /* ── Hero ─────────────────────────────────────────────────────── */
  .schools-hero {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }

  .schools-hero-band {
    height: 4px;
  }

  .schools-hero-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 24px;
    flex-wrap: wrap;
  }

  .schools-hero-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .schools-hero-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .schools-hero-eyebrow {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .schools-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    margin: 0;
    line-height: 1;
  }

  .schools-hero-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .schools-hero-grade {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }

  .schools-hero-metrics {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .shm-metric {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .shm-val {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }

  .shm-lbl {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .shm-sep {
    width: 1px;
    height: 28px;
    background: var(--border-soft);
  }

  .schools-hero-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .schools-hero-staff {
    display: flex;
    gap: 4px;
  }

  /* ── Horizontal tab bar ───────────────────────────────────────── */
  .schools-tab-shell {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .schools-tabs-bar {
    display: flex;
    align-items: stretch;
    gap: 0;
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
  }

  .schools-tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    border: none;
    border-bottom: 2.5px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
    transition: all .16s;
  }

  .schools-tab-btn:hover {
    background: var(--bg-subtle);
    color: var(--text-primary);
  }

  .schools-tab-btn.active {
    font-weight: 700;
  }

  .schools-tab-icon {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .schools-tab-icon svg {
    width: 15px;
    height: 15px;
  }

  .schools-tabs-cta {
    display: flex;
    align-items: center;
    margin-left: auto;
    padding: 8px 12px;
    border-left: 1px solid var(--border-soft);
  }

  .schools-tab-content {
    min-height: 200px;
  }

  /* ── Alumnos toolbar ──────────────────────────────────────────── */
  .alumnos-wrap {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .alumnos-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .alumnos-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-subtle);
  }

  .alumnos-toolbar-right {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
  }

  .alumnos-search-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-surface);
    border: 1.5px solid var(--border-soft);
    border-radius: 9px;
    padding: 6px 10px;
    flex: 1;
    min-width: 160px;
    max-width: 260px;
    transition: border-color .15s;
  }

  .alumnos-search-wrap:focus-within {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px rgba(74, 138, 244, .1);
  }

  .alumnos-search-icon {
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    display: flex;
    flex-shrink: 0;
  }

  .alumnos-search-icon svg {
    width: 14px;
    height: 14px;
  }

  .alumnos-search-input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    width: 100%;
  }

  .alumnos-search-input::placeholder {
    color: var(--text-muted);
  }

  .alumnos-filter-bar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .alumnos-filter-btn {
    padding: 5px 11px;
    border-radius: 20px;
    border: 1.5px solid var(--border-soft);
    background: var(--bg-surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    transition: all .14s;
    white-space: nowrap;
  }

  .alumnos-filter-btn:hover {
    border-color: var(--border-medium);
    color: var(--text-primary);
  }

  .alumnos-filter-btn.active {
    background: var(--blue-400);
    border-color: var(--blue-400);
    color: #fff;
    font-weight: 600;
  }

  .alumnos-table-slot {
    min-height: 80px;
  }

  .alumnos-pager-slot {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    padding: 10px 16px;
    border-top: 1px solid var(--border-soft);
  }

  .alumnos-empty-state {
    padding: 32px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* ── Alumnos action buttons ───────────────────────────────────── */
  .alum-actions {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .alum-action-btn {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border-soft);
    background: transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .13s;
    color: var(--text-muted);
  }

  .alum-btn-view:hover {
    background: #EFF6FF;
    border-color: #3B82F6;
    color: #3B82F6;
  }

  .alum-btn-edit:hover {
    background: #F0FDF4;
    border-color: #22C55E;
    color: #22C55E;
  }

  .alum-btn-del:hover {
    background: #FFF1F2;
    border-color: #F43F5E;
    color: #F43F5E;
  }

  .btn-xs {
    padding: 4px 10px !important;
    font-size: 11px !important;
    border-radius: 6px !important;
  }

  /* Pager (if not defined) */
  .pager-btn {
    min-width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    border: 1.5px solid var(--border-soft);
    background: var(--bg-surface);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    transition: all .14s;
    padding: 0 5px;
  }

  .pager-btn:hover:not(.pager-disabled) {
    border-color: var(--blue-400);
    color: var(--blue-400);
  }

  .pager-active {
    background: var(--blue-400) !important;
    color: #fff !important;
    border-color: var(--blue-400) !important;
    font-weight: 700;
  }

  .pager-disabled {
    opacity: .35;
    cursor: default;
  }

  .pager-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 6px;
  }

  .alum-tab-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-subtle);
    flex-wrap: wrap;
  }
  
  .alum-subtab {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 9px;
    font-size: 13px; font-weight: 500;
    font-family: 'DM Sans','Inter', sans-serif;
    cursor: pointer; border: 1.5px solid var(--border-soft);
    background: transparent; color: var(--text-secondary);
    transition: all .15s; white-space: nowrap;
  }
  .alum-subtab:hover { background: var(--bg-subtle); color: var(--text-primary); }
  .alum-subtab.active { font-weight: 700; }
  
  .alum-subtab-cnt {
    min-width: 20px; height: 20px; border-radius: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; padding: 0 5px;
    background: var(--bg-subtle); color: var(--text-muted);
  }
  .alum-subtab.active .alum-subtab-cnt { color: #fff; }
  
  .audit-action-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 6px; white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════
     NUEVOS ESTILOS v8 — Fixes de asistencia, clases, búsqueda
     ═══════════════════════════════════════════════════════ */

  /* ── Pill de asistencia "ya tomada" en selector de clase */
  .att-pill-taken-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 700;

/* ═══════════════════════════════════════════════════════════════
