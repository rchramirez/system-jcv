          <div class="mnv2-meta-row">
            <span class="mnv2-meta-icon">📍</span>
            <span class="mnv2-meta-val">${H.escape(ministry.location)}</span>
          </div>` : ''}
      </div>`;

    // ── Footer: avatars + contador + botón integrantes
    const footer = document.createElement('div');
    footer.className = 'mnv2-card-footer';

    // Avatars stack
    const avatarWrap = document.createElement('div');
    avatarWrap.className = 'mnv2-avatars';
    const shown = members.slice(0, 5);
    [...shown].reverse().forEach(p => {
      const av = document.createElement('div');
      av.className = 'mnv2-av';
      av.title = H.fullName(p);
      av.style.cssText = `background:${tc.color}20;color:${tc.color};border-color:var(--bg-surface,#fff)`;
      if (p.photoUrl) {
        av.innerHTML = `<img src="${H.escape(p.photoUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        av.textContent = H.initials(H.fullName(p));
      }
      avatarWrap.appendChild(av);
    });
    if (members.length > 5) {
      const more = document.createElement('div');
      more.className = 'mnv2-av mnv2-av-more';
      more.textContent = `+${members.length - 5}`;
      avatarWrap.appendChild(more);
    }

    const memberCount = document.createElement('span');
    memberCount.className = 'mnv2-member-count';
    memberCount.style.color = tc.color;
    memberCount.textContent = `${members.length} integrante${members.length !== 1 ? 's' : ''}`;

    const leftSide = document.createElement('div');
    leftSide.className = 'mnv2-footer-left';
    leftSide.appendChild(avatarWrap);
    leftSide.appendChild(memberCount);

    const btnMembers = document.createElement('button');
    btnMembers.className = 'mnv2-members-btn';
    btnMembers.style.cssText = `color:${tc.color};border-color:${tc.border};background:${tc.bg}`;
    btnMembers.innerHTML = `${IC.people} <span>Integrantes</span>`;
    btnMembers.addEventListener('click', () => _openMembersModal(ministry, members, tc));

    footer.appendChild(leftSide);
    footer.appendChild(btnMembers);

    body.appendChild(footer);
    card.appendChild(body);

    // Wiring botón editar
    card.querySelector(`#mnv2-edit-${ministry.id}`)?.addEventListener('click', e => {
      e.stopPropagation();
      openModal(ministry);
    });

    return card;
  }

  // ── Modal integrantes ───────────────────────────────────

  function _openMembersModal(ministry, currentMembers, tc) {
    const isAdmin = APP.user?.role === 'admin';
    let memberIds = [...(ministry.memberIds || [])];
    let allPeople = [..._people];
    let addQuery  = '';

    function _buildBody() {
      const nonMembers = H.sortBy(
        allPeople.filter(p => !memberIds.includes(p.id)),
        'name'
      );
      const membersList = allPeople.filter(p => memberIds.includes(p.id));

      const membersHtml = membersList.length
        ? membersList.map(p => `
            <div class="mnv2-mm-row" id="mnv2-mm-${p.id}">
              <div class="person-cell">
                <div class="person-avatar" style="background:${tc.color}18;color:${tc.color}">
                  ${p.photoUrl ? `<img src="${H.escape(p.photoUrl)}">` : H.initials(H.fullName(p))}
                </div>
                <div>
                  <div class="person-name">${H.escape(H.fullName(p))}</div>
                  <div class="person-sub">${H.escape(p.phone || p.email || '')}</div>
                </div>
              </div>
              ${isAdmin
                ? `<button class="mnv2-mm-remove-btn" data-pid="${p.id}" title="Quitar">✕</button>`
                : `<span class="mnv2-mm-badge" style="background:${tc.bg};color:${tc.color};border-color:${tc.border}">✓ Miembro</span>`}
            </div>`).join('')
        : `<div class="mnv2-mm-empty">Sin integrantes aún</div>`;

      const filteredAdd = addQuery
        ? H.filterBySearch(nonMembers, addQuery, ['name', 'lastName'])
        : nonMembers;

      const addHtml = filteredAdd.slice(0, 20).map(p => `
          <div class="mnv2-mm-row">
            <div class="person-cell">
              <div class="person-avatar">
                ${p.photoUrl ? `<img src="${H.escape(p.photoUrl)}">` : H.initials(H.fullName(p))}
              </div>
              <div>
                <div class="person-name">${H.escape(H.fullName(p))}</div>
                <div class="person-sub">${H.escape(p.phone || p.email || '')}</div>
              </div>
            </div>
            <button class="mnv2-mm-add-btn" data-pid="${p.id}"
              style="border-color:${tc.border};color:${tc.color};background:${tc.bg}">
              ＋
            </button>
          </div>`).join('')
        || `<div class="mnv2-mm-empty">Sin resultados</div>`;

      return `
        <div class="mnv2-mm-layout">
          <div class="mnv2-mm-col">
            <div class="mnv2-mm-col-header">
              <span class="mnv2-mm-col-title">Integrantes actuales</span>
              <span class="mnv2-mm-count" style="background:${tc.bg};color:${tc.color};border-color:${tc.border}">
                ${memberIds.length}
              </span>
            </div>
            <div class="mnv2-mm-list" id="mnv2-mm-current">${membersHtml}</div>
          </div>
          ${isAdmin ? `
          <div class="mnv2-mm-col">
            <div class="mnv2-mm-col-header">
              <span class="mnv2-mm-col-title">Agregar persona</span>
            </div>
            <div class="mnv2-mm-search-wrap">
              <span class="mnv2-mm-search-icon">${IC.search}</span>
              <input class="mnv2-mm-search-input" id="mnv2-mm-search"
                placeholder="Buscar persona..." value="${H.escape(addQuery)}">
            </div>
            <div class="mnv2-mm-list" id="mnv2-mm-add">${addHtml}</div>
          </div>` : ''}
        </div>`;
    }

    Modal.open({
      title: `${tc.icon} ${H.escape(ministry.name)} — Integrantes`,
      size: 'lg',
      body: _buildBody(),
      footer: `<button class="btn btn-ghost" onclick="Modal.close()">Cerrar</button>`,
    });

    // Wiring delegado en el body del modal
    setTimeout(() => {
      const overlay = document.getElementById('modal-overlay');
      if (!overlay) return;

      // Buscador add
      overlay.querySelector('#mnv2-mm-search')?.addEventListener('input', e => {
        addQuery = e.target.value.toLowerCase().trim();
        Modal.setBody(_buildBody());
        // Re-wiring tras setBody
        setTimeout(() => _wireModalEvents(overlay, ministry, memberIds, tc, _buildBody), 10);
      });

      _wireModalEvents(overlay, ministry, memberIds, tc, _buildBody);
    }, 80);
  }

  function _wireModalEvents(overlay, ministry, memberIds, tc, rebuildFn) {
    // Quitar miembro
    overlay.querySelectorAll('.mnv2-mm-remove-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const pid = btn.dataset.pid;
        btn.disabled = true;
        try {
          await API.removeMinistryMember(ministry.id, pid);
          memberIds.splice(memberIds.indexOf(pid), 1);
          ministry.memberIds = [...memberIds];
          // Actualizar _all local
          const idx = _all.findIndex(m => m.id === ministry.id);
          if (idx > -1) _all[idx].memberIds = [...memberIds];
          Toast.success('Integrante quitado');
          Modal.setBody(rebuildFn());
          setTimeout(() => _wireModalEvents(overlay, ministry, memberIds, tc, rebuildFn), 10);
        } catch (e) { Toast.error(e.message); btn.disabled = false; }
      });
    });

    // Agregar miembro
    overlay.querySelectorAll('.mnv2-mm-add-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const pid = btn.dataset.pid;
        btn.disabled = true;
        try {
          await API.addMinistryMember(ministry.id, pid);
          memberIds.push(pid);
          ministry.memberIds = [...memberIds];
          const idx = _all.findIndex(m => m.id === ministry.id);
          if (idx > -1) _all[idx].memberIds = [...memberIds];
          Toast.success('Integrante agregado');
          Modal.setBody(rebuildFn());
          setTimeout(() => _wireModalEvents(overlay, ministry, memberIds, tc, rebuildFn), 10);
        } catch (e) { Toast.error(e.message); btn.disabled = false; }
      });
    });

    // Re-search input
    overlay.querySelector('#mnv2-mm-search')?.addEventListener('input', e => {
      // ya manejado arriba, pero por si se re-renderiza
    });
  }

  // ── Modal Crear / Editar ─────────────────────────────────

  async function openModal(m) {
    const isEdit = !!(m && m.id);
    const tc = m ? _tc(m.type) : _tc('otro');

    const typePickerHtml = Object.entries(TYPE_CFG).map(([key, cfg]) => `
      <button class="mnv2-type-pick-btn${m?.type === key ? ' active' : ''}"
        data-type="${key}"
        style="${m?.type === key
          ? `background:${cfg.color};color:#fff;border-color:${cfg.color};box-shadow:0 3px 10px ${cfg.color}44`
          : `background:${cfg.bg};color:${cfg.color};border-color:${cfg.border}`}">
        <span style="font-size:18px;line-height:1">${cfg.icon}</span>
        <span style="font-size:11px;font-weight:700">${cfg.label}</span>
      </button>`).join('');

    Modal.open({
      title: isEdit ? `Editar — ${H.escape(m.name)}` : 'Nuevo Ministerio',
      size:  'lg',
      body: `
        ${isEdit ? `
          <div class="mnv2-modal-header" style="border-color:${tc.border}">
            <div class="mnv2-type-icon" style="width:46px;height:46px;font-size:22px;background:${tc.bg};color:${tc.color};border-color:${tc.border}">${tc.icon}</div>
            <div>
              <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${H.escape(m.name)}</div>
              <div style="font-size:12px;color:${tc.color};font-weight:600">${tc.label}</div>
            </div>
          </div>` : ''}

        <div class="form-group">
          <label class="form-label">Tipo de Ministerio *</label>
          <div class="mnv2-type-picker" id="mnv2-type-picker">${typePickerHtml}</div>
          <input type="hidden" id="mi-type" value="${H.escape(m?.type || '')}">
        </div>

        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Nombre *</label>
            <input class="form-input" id="mi-name" value="${H.escape(m?.name || '')}"
              placeholder="Ej: Ministerio de Alabanza">
          </div>
          <div class="form-group">
            <label class="form-label">Líderes</label>
            <input class="form-input" id="mi-leaders" value="${H.escape(m?.leaders || '')}"
              placeholder="Nombre1, Nombre2">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea class="form-textarea" id="mi-desc" placeholder="Descripción del ministerio...">${H.escape(m?.description || '')}</textarea>
        </div>

        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Días y Horarios</label>
            <input class="form-input" id="mi-sched" value="${H.escape(m?.schedule || '')}"
              placeholder="Ej: Viernes 20:00">
          </div>
          <div class="form-group">
            <label class="form-label">Lugar</label>
            <input class="form-input" id="mi-loc" value="${H.escape(m?.location || '')}"
              placeholder="Salón principal">
          </div>
        </div>

        <div id="mi-msg"></div>`,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        ${isEdit ? `
          <button class="btn btn-danger" style="margin-right:auto"
            onclick="MinistriesModule.deleteMinistry('${m.id}','${H.escape(m.name)}')">
            Eliminar
          </button>` : ''}
        <button class="btn btn-primary" id="mi-save-btn"
          onclick="MinistriesModule._submit('${m?.id || ''}')">
          ${isEdit ? 'Guardar cambios' : '＋ Crear Ministerio'}
        </button>`,
    });

    // Wiring del type picker visual
    setTimeout(() => {
      const picker = document.getElementById('mnv2-type-picker');
      const hiddenInput = document.getElementById('mi-type');
      if (!picker || !hiddenInput) return;

      picker.querySelectorAll('.mnv2-type-pick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const type = btn.dataset.type;
          const cfg  = TYPE_CFG[type];
          hiddenInput.value = type;

          picker.querySelectorAll('.mnv2-type-pick-btn').forEach(b => {
            const bc = TYPE_CFG[b.dataset.type];
            b.classList.remove('active');
            b.style.cssText = `background:${bc.bg};color:${bc.color};border-color:${bc.border}`;
          });
          btn.classList.add('active');
          btn.style.cssText = `background:${cfg.color};color:#fff;border-color:${cfg.color};box-shadow:0 3px 10px ${cfg.color}44`;
        });
      });
    }, 60);
  }

  async function _submit(id) {
    const data = {
      name:        (document.getElementById('mi-name')?.value || '').trim(),
      type:         document.getElementById('mi-type')?.value || '',
      description: (document.getElementById('mi-desc')?.value || '').trim(),
      leaders:     (document.getElementById('mi-leaders')?.value || '').trim(),
      schedule:    (document.getElementById('mi-sched')?.value || '').trim(),
      location:    (document.getElementById('mi-loc')?.value || '').trim(),
    };
    if (id) data.id = id;

    const msgEl = document.getElementById('mi-msg');
    if (!data.name || !data.type) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">Nombre y tipo son requeridos</div>`;
      return;
    }
    const btn = document.getElementById('mi-save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
    try {
      await API.saveMinistry(data);
      Modal.close();
      Toast.success(id ? 'Ministerio actualizado' : 'Ministerio creado');
      await render();
    } catch (e) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">${H.escape(e.message)}</div>`;
      if (btn) { btn.disabled = false; btn.textContent = id ? 'Guardar cambios' : '＋ Crear Ministerio'; }
    }
  }

  async function deleteMinistry(id, name) {
    const ok = await Modal.confirm({
      title:       'Eliminar ministerio',
      message:     `¿Eliminar <strong>${H.escape(name)}</strong>? Se desvinculará a todos sus integrantes.`,
      confirmText: 'Eliminar',
    });
    if (!ok) return;
    Modal.close();
    try {
      await API.deleteMinistry(id);
      Toast.success('Ministerio eliminado');
      await render();
    } catch (e) { Toast.error(e.message); }
  }

  return { render, openModal, _submit, deleteMinistry };
})();

// ═══════════════════════════════════════════════════════════
// USERS MODULE — Rediseño v2
// ═══════════════════════════════════════════════════════════
const UsersModule = (() => {

  let _all      = [];
  let _churches = [];
  let _query    = '';
  let _roleFilter = 'all'; // 'all' | 'admin' | 'secretary' | 'maestro'

  // ── Configuración de roles ──────────────────────────────

  const ROLES_CFG = {
    admin:     { label: 'Administrador', color: '#7C3AED', bg: '#F5F3FF', border: '#EDE9FE', icon: '⚙' },
    secretary: { label: 'Secretario/a',  color: '#1D4ED8', bg: '#EFF6FF', border: '#BFDBFE', icon: '✎' },
    maestro:   { label: 'Maestro/a',     color: '#92400E', bg: '#FFFBEB', border: '#FDE68A', icon: '📖' },
  };

  const GRADES_ICONS = {
    escuelaVida:   '📖',
    consolidacion: '🌱',
    obreros1:      '⚒',
    obreros2:      '🏛',
  };

  // ── Carga ───────────────────────────────────────────────

  async function render() {
    const sect = document.getElementById('sect-users');
    if (!sect) return;
    sect.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      [_all, _churches] = await Promise.all([
        API.getUsers(),
        API.getChurches().catch(() => []),
      ]);
      sect.innerHTML = '';
      sect.appendChild(_buildPage());
    } catch (e) {
      sect.innerHTML = _renderError(e.message);
    }
  }

  // ── Helpers ─────────────────────────────────────────────

  function _churchName(churchId) {
    return _churches.find(c => c.id === churchId)?.name || null;
  }

  function _isActive(u) {
    return u.status !== 'inactive' && u.status !== 'blocked' && !u.deleted;
  }

  function _isMe(u) {
    return u.id === APP.user?.id;
  }

  function _initials(name) {
    if (!name) return '?';
    return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');
  }

  // ── Construcción de la página ────────────────────────────

  function _buildPage() {
    const byRole = {
      admin:     _all.filter(u => u.role === 'admin').length,
      secretary: _all.filter(u => u.role === 'secretary').length,
      maestro:   _all.filter(u => u.role === 'maestro').length,
    };
    const active   = _all.filter(u => _isActive(u)).length;
    const inactive = _all.length - active;

    const wrap = document.createElement('div');
    wrap.className = 'usv2-page';

    // ── Hero
    wrap.innerHTML = `
      <div class="usv2-hero">
        <div class="usv2-hero-band"></div>
        <div class="usv2-hero-body">
          <div class="usv2-hero-left">
            <div class="usv2-hero-icon">${IC.users}</div>
            <div>
              <div class="usv2-hero-eyebrow">Control de acceso</div>
              <h1 class="usv2-hero-title">Usuarios</h1>
            </div>
          </div>
          <div class="usv2-hero-right">
            <div class="usv2-stats">
              <div class="usv2-stat">
                <span class="usv2-stat-val" style="color:#1A5FD4">${_all.length}</span>
                <span class="usv2-stat-lbl">total</span>
              </div>
              <div class="usv2-stat-sep"></div>
              <div class="usv2-stat">
                <span class="usv2-stat-val" style="color:#7C3AED">${byRole.admin}</span>
                <span class="usv2-stat-lbl">admins</span>
              </div>
              <div class="usv2-stat-sep"></div>
              <div class="usv2-stat">
                <span class="usv2-stat-val" style="color:#1D4ED8">${byRole.secretary}</span>
                <span class="usv2-stat-lbl">secretarios</span>
              </div>
              <div class="usv2-stat-sep"></div>
              <div class="usv2-stat">
                <span class="usv2-stat-val" style="color:#92400E">${byRole.maestro}</span>
                <span class="usv2-stat-lbl">maestros</span>
              </div>
              <div class="usv2-stat-sep"></div>
              <div class="usv2-stat">
                <span class="usv2-stat-val" style="color:#16A34A">${active}</span>
                <span class="usv2-stat-lbl">activos</span>
              </div>
              ${inactive > 0 ? `
              <div class="usv2-stat-sep"></div>
              <div class="usv2-stat">
                <span class="usv2-stat-val" style="color:#94A3B8">${inactive}</span>
                <span class="usv2-stat-lbl">inactivos</span>
              </div>` : ''}
            </div>
            <button class="btn btn-primary usv2-new-btn" id="usv2-new-btn">＋ Nuevo Usuario</button>
          </div>
        </div>
      </div>`;

    // ── Toolbar
    const toolbar = document.createElement('div');
    toolbar.className = 'usv2-toolbar';

    // Buscador
    const searchWrap = document.createElement('div');
    searchWrap.className = 'usv2-search';
    searchWrap.innerHTML = `<span class="usv2-search-icon">${IC.search}</span>`;
    const searchInput = document.createElement('input');
    searchInput.className = 'usv2-search-input';
    searchInput.placeholder = 'Buscar nombre, usuario, email...';
    searchInput.value = _query;
    searchInput.addEventListener('input', e => {
      _query = e.target.value.toLowerCase().trim();
      _repaint(listEl);
    });
    searchWrap.appendChild(searchInput);

    // Pills de rol
    const pillsWrap = document.createElement('div');
    pillsWrap.className = 'usv2-pills';

    const pillDefs = [
      { val: 'all',       label: 'Todos',          icon: '👥' },
      { val: 'admin',     label: 'Administradores', icon: '⚙' },
      { val: 'secretary', label: 'Secretarios',     icon: '✎' },
      { val: 'maestro',   label: 'Maestros',        icon: '📖' },
    ];

    pillDefs.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'usv2-pill' + (_roleFilter === p.val ? ' active' : '');
      btn.dataset.val = p.val;
      btn.innerHTML = `${p.icon} ${p.label}`;
      if (_roleFilter === p.val && p.val !== 'all') {
        const rc = ROLES_CFG[p.val];
        btn.style.cssText = `background:${rc.bg};color:${rc.color};border-color:${rc.border}`;
      }
      btn.addEventListener('click', () => {
        _roleFilter = p.val;
        pillsWrap.querySelectorAll('.usv2-pill').forEach(b => {
          b.classList.remove('active');
          b.style.cssText = '';
        });
        btn.classList.add('active');
        if (p.val !== 'all') {
          const rc = ROLES_CFG[p.val];
          btn.style.cssText = `background:${rc.bg};color:${rc.color};border-color:${rc.border}`;
        }
        _repaint(listEl);
      });
      pillsWrap.appendChild(btn);
    });

    toolbar.appendChild(searchWrap);
    toolbar.appendChild(pillsWrap);
    wrap.appendChild(toolbar);

    // ── Lista de usuarios
    const listEl = document.createElement('div');
    listEl.className = 'usv2-list';
    _repaint(listEl);
    wrap.appendChild(listEl);

    // Wiring
    wrap.querySelector('#usv2-new-btn')?.addEventListener('click', () => openModal());

    return wrap;
  }

  // ── Render de la lista ──────────────────────────────────

  function _repaint(container) {
    container.innerHTML = '';

    let list = [..._all];

    if (_roleFilter !== 'all') {
      list = list.filter(u => u.role === _roleFilter);
    }
    if (_query) {
      list = list.filter(u =>
        H.matches(u.name,     _query) ||
        H.matches(u.username, _query) ||
        H.matches(u.email,    _query) ||
        H.matches(u.role,     _query)
      );
    }

    if (!list.length) {
      container.innerHTML = `
        <div class="usv2-empty">
          <div class="usv2-empty-icon">${IC.users}</div>
          <div class="usv2-empty-title">${_query || _roleFilter !== 'all' ? 'Sin resultados' : 'No hay usuarios'}</div>
          <div class="usv2-empty-sub">${_query || _roleFilter !== 'all' ? 'Probá con otro filtro.' : 'Creá el primer usuario del sistema.'}</div>
        </div>`;
      return;
    }

    // Agrupar: yo primero, luego admins, secretarios, maestros
    const sorted = [...list].sort((a, b) => {
      if (_isMe(a)) return -1;
      if (_isMe(b)) return  1;
      const order = { admin: 0, secretary: 1, maestro: 2 };
      return (order[a.role] ?? 3) - (order[b.role] ?? 3);
    });

    sorted.forEach(user => container.appendChild(_renderRow(user)));
  }

  function _renderRow(user) {
    const rc      = ROLES_CFG[user.role] || { label: user.role, color: '#64748B', bg: '#F1F5F9', border: '#E2E8F0', icon: '?' };
    const active  = _isActive(user);
    const isMe    = _isMe(user);
    const church  = _churchName(user.churchId);
    const grade   = user.assignedGrade ? CONFIG.GRADES[user.assignedGrade] : null;
    const gradeIcon = user.assignedGrade ? (GRADES_ICONS[user.assignedGrade] || '') : '';

    const row = document.createElement('div');
    row.className = `usv2-row${!active ? ' usv2-row-inactive' : ''}${isMe ? ' usv2-row-me' : ''}`;

    // Avatar
    const avWrap = document.createElement('div');
    avWrap.className = 'usv2-av-wrap';
    const av = document.createElement('div');
    av.className = 'usv2-av';
    av.style.cssText = `background:${rc.color}20;color:${rc.color}`;
    if (user.photoUrl) {
      av.innerHTML = `<img src="${H.escape(user.photoUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      av.textContent = _initials(user.name || user.username);
    }
    const statusDot = document.createElement('div');
    statusDot.className = 'usv2-av-dot';
    statusDot.style.background = active ? '#22C55E' : '#94A3B8';
    statusDot.title = active ? 'Activo' : 'Inactivo';
    avWrap.appendChild(av);
    avWrap.appendChild(statusDot);

    // Info principal
    const info = document.createElement('div');
    info.className = 'usv2-info';
    info.innerHTML = `
      <div class="usv2-name-row">
        <span class="usv2-name">${H.escape(user.name || user.username)}</span>
        ${isMe ? `<span class="usv2-me-badge">Tú</span>` : ''}
      </div>
      <div class="usv2-meta-row">
        <span class="usv2-username">@${H.escape(user.username)}</span>
        ${user.email ? `<span class="usv2-sep">·</span><span class="usv2-email">${H.escape(user.email)}</span>` : ''}
      </div>`;

    // Badges del centro
    const badges = document.createElement('div');
    badges.className = 'usv2-badges';
    badges.innerHTML = `
      <span class="usv2-role-badge" style="background:${rc.bg};color:${rc.color};border-color:${rc.border}">
        ${rc.icon} ${rc.label}
      </span>
      ${grade ? `
        <span class="usv2-grade-badge">
          ${gradeIcon} ${grade.label}
        </span>` : ''}
      ${church ? `
        <span class="usv2-church-badge">
          🏛 ${H.escape(church)}
        </span>` : ''}`;

    // Acciones
    const actions = document.createElement('div');
    actions.className = 'usv2-actions';

    const btnEdit = document.createElement('button');
    btnEdit.className = 'usv2-act-btn usv2-act-edit';
    btnEdit.title = 'Editar usuario';
    btnEdit.innerHTML = IC.edit;
    btnEdit.addEventListener('click', () => openModal(user));
    actions.appendChild(btnEdit);

    if (!isMe) {
      const btnToggle = document.createElement('button');
      btnToggle.className = `usv2-act-btn ${active ? 'usv2-act-deactivate' : 'usv2-act-activate'}`;
      btnToggle.title = active ? 'Desactivar' : 'Activar';
      btnToggle.innerHTML = active ? IC.eyeOff || IC.eye : IC.check;
      btnToggle.addEventListener('click', () => _toggleActive(user.id, active, user.name || user.username));
      actions.appendChild(btnToggle);

      const btnDel = document.createElement('button');
      btnDel.className = 'usv2-act-btn usv2-act-delete';
      btnDel.title = 'Eliminar usuario';
      btnDel.innerHTML = IC.trash;
      btnDel.addEventListener('click', () => deleteUser(user.id, user.name || user.username));
      actions.appendChild(btnDel);
    }

    row.appendChild(avWrap);
    row.appendChild(info);
    row.appendChild(badges);
    row.appendChild(actions);

    return row;
  }

  // ── Modal Crear / Editar ─────────────────────────────────

  async function openModal(u) {
    const isEdit   = !!(u && u.id);
    const churches = await API.getChurches().catch(() => []);
    const rc       = u ? (ROLES_CFG[u.role] || {}) : {};

    const roleOpts = [
      { v: 'admin',     l: 'Administrador' },
      { v: 'secretary', l: 'Secretario/a'  },
      { v: 'maestro',   l: 'Maestro/a'     },
    ].map(r => `<option value="${r.v}" ${u?.role === r.v ? 'selected' : ''}>${r.l}</option>`).join('');

    const gradeOpts = CONFIG.GRADE_KEYS
      .map(k => `<option value="${k}" ${u?.assignedGrade === k ? 'selected' : ''}>${CONFIG.GRADES[k].label}</option>`)
      .join('');

    const chOpts = churches
      .map(c => `<option value="${c.id}" ${u?.churchId === c.id ? 'selected' : ''}>${H.escape(c.name)}</option>`)
      .join('');

    Modal.open({
      title: isEdit ? `Editar — ${H.escape(u.name || u.username)}` : 'Nuevo Usuario',
      size: 'md',
      body: `
        ${isEdit ? `
        <div class="usv2-modal-user-header" style="border-color:${rc.border||'var(--border-soft)'}">
          <div class="usv2-av" style="width:48px;height:48px;font-size:16px;background:${rc.color ? rc.color+'20' : 'var(--bg-subtle)'};color:${rc.color||'var(--text-muted)'}">
            ${u.photoUrl ? `<img src="${H.escape(u.photoUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : _initials(u.name || u.username)}
          </div>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${H.escape(u.name || u.username)}</div>
            <div style="font-size:12px;color:var(--text-muted)">@${H.escape(u.username)} · <span style="color:${rc.color||'var(--text-muted)'}">${rc.label || u.role}</span></div>
          </div>
        </div>` : ''}

        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Nombre completo *</label>
            <input class="form-input" id="u-name" value="${H.escape(u?.name || '')}" placeholder="Nombre Apellido">
          </div>
          <div class="form-group">
            <label class="form-label">Nombre de usuario *</label>
            <input class="form-input" id="u-user" value="${H.escape(u?.username || '')}" autocomplete="off" placeholder="sin espacios">
          </div>
        </div>

        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="u-email" type="email" value="${H.escape(u?.email || '')}" placeholder="correo@ejemplo.com">
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña ${isEdit ? '(vacío = sin cambios)' : '*'}</label>
            <input class="form-input" id="u-pass" type="password" autocomplete="new-password" placeholder="${isEdit ? '••••••••' : 'Mín. 6 caracteres'}">
          </div>
        </div>

        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label">Rol *</label>
            <select class="form-select" id="u-role" onchange="UsersModule._onRoleChange(this.value)">
              ${roleOpts}
            </select>
          </div>
          <div class="form-group" id="u-grade-group">
            <label class="form-label">Grado asignado</label>
            <select class="form-select" id="u-grade">
              <option value="">Todos los grados</option>
              ${gradeOpts}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nexo</label>
            <select class="form-select" id="u-church">
              <option value="">Sin nexo</option>
              ${chOpts}
            </select>
          </div>
        </div>

        <div id="u-msg"></div>`,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        ${isEdit && !_isMe(u) ? `
          <button class="btn btn-danger" style="margin-right:auto"
            onclick="UsersModule.deleteUser('${u.id}','${H.escape(u.name || u.username)}')">
            Eliminar
          </button>` : ''}
        <button class="btn btn-primary" onclick="UsersModule._submit('${u?.id || ''}')">
          ${isEdit ? 'Guardar cambios' : 'Crear usuario'}
        </button>`,
    });

    // Mostrar/ocultar campo de grado según el rol inicial
    setTimeout(() => _onRoleChange(u?.role || 'admin'), 50);
  }

  function _onRoleChange(role) {
    const gradeGroup = document.getElementById('u-grade-group');
    if (!gradeGroup) return;
    // Grado asignado solo aplica a secretary y maestro
    gradeGroup.style.display = (role === 'secretary' || role === 'maestro') ? '' : 'none';
  }

  async function _submit(id) {
    const data = {
      name:          (document.getElementById('u-name')?.value || '').trim(),
      username:      (document.getElementById('u-user')?.value || '').trim(),
      email:         (document.getElementById('u-email')?.value || '').trim(),
      password:       document.getElementById('u-pass')?.value || '',
      role:           document.getElementById('u-role')?.value || '',
      assignedGrade:  document.getElementById('u-grade')?.value || '',
      churchId:       document.getElementById('u-church')?.value || '',
    };
    if (id) data.id = id;

    const msgEl = document.getElementById('u-msg');

    if (!data.name || !data.username || !data.role) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">Nombre, usuario y rol son requeridos</div>`;
      return;
    }
    if (!id && !data.password) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">La contraseña es requerida al crear un usuario</div>`;
      return;
    }

    const btn = document.querySelector('#modal-overlay .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

    try {
      await API.saveUser(data);
      Modal.close();
      Toast.success(id ? 'Usuario actualizado' : 'Usuario creado');
      await render();
    } catch (e) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">${H.escape(e.message)}</div>`;
      if (btn) { btn.disabled = false; btn.textContent = id ? 'Guardar cambios' : 'Crear usuario'; }
    }
  }

  async function _toggleActive(id, currentlyActive, name) {
    const ok = await Modal.confirm({
      title:       `${currentlyActive ? 'Desactivar' : 'Activar'} usuario`,
      message:     `¿${currentlyActive ? 'Desactivar' : 'Activar'} la cuenta de <strong>${H.escape(name)}</strong>?
                   ${currentlyActive ? 'No podrá iniciar sesión.' : 'Podrá volver a iniciar sesión.'}`,
      confirmText:  currentlyActive ? 'Desactivar' : 'Activar',
    });
    if (!ok) return;
    try {
      await API.saveUser({ id, status: currentlyActive ? 'inactive' : 'active' });
      Toast.success(`Usuario ${currentlyActive ? 'desactivado' : 'activado'}`);
      await render();
    } catch (e) { Toast.error(e.message); }
  }

  async function deleteUser(id, name) {
    const ok = await Modal.confirm({
      title:       'Eliminar usuario',
      message:     `¿Eliminar permanentemente la cuenta de <strong>${H.escape(name)}</strong>? Esta acción no se puede deshacer.`,
      confirmText: 'Eliminar',
    });
    if (!ok) return;
    Modal.close();
    try {
      await API.deleteUser(id);
      Toast.success('Usuario eliminado');
      await render();
    } catch (e) { Toast.error(e.message); }
  }

  return { render, openModal, _submit, _toggleActive, deleteUser, _onRoleChange };
})();

// AUDIT MODULE
// ═══════════════════════════════════════════════════════════
const AuditModule = (() => {
  let _all = [], _filtered = [], _page = 1;
  const PAGE = 20;
  let _searchFn;

  async function render() {
    const el = document.getElementById('sect-audit');
    if (!el) return;
    el.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      _all = await API.getAuditLog({ limit: 500 });
      _filtered = [..._all]; _page = 1;
      el.innerHTML = _buildShell();
      _searchFn = H.debounce(q => { _onSearch(q); }, 300);
      _renderTable();
    } catch (e) { el.innerHTML = _renderError(e.message); }
  }

  function _buildShell() {
    const entities = [...new Set(_all.map(r => r.entity).filter(Boolean))].sort();
    const entOpts  = entities.map(e => `<option value="${e}">${e}</option>`).join('');
    return `
      <div class="sect-hero">
        <div class="sect-hero-left">
          <div class="sect-hero-icon">${IC.audit}</div>
          <div class="sect-hero-text"><div class="sect-hero-eyebrow">Seguridad</div>
            <div class="sect-hero-title">Auditoría</div><div class="sect-hero-sub">Registro de actividad del sistema</div></div>
        </div>
        <div class="sect-hero-right">
          <div class="sect-metric"><div class="sect-metric-val" id="aud-total">${_all.length}</div><div class="sect-metric-label">Eventos</div></div>
        </div>
      </div>
      <div class="sect-toolbar">
        <div class="search-wrap">${IC.search}<input class="search-input" id="aud-search" placeholder="Buscar por usuario, acción…" oninput="_searchFn(this.value)"></div>
        <select class="form-select" id="aud-entity" onchange="AuditModule._onFilter()" style="width:160px;padding:8px 12px">
          <option value="">Todas las entidades</option>${entOpts}
        </select>
        <select class="form-select" id="aud-action" onchange="AuditModule._onFilter()" style="width:140px;padding:8px 12px">
          <option value="">Todas las acciones</option>
          ${['CREATE','UPDATE','DELETE','LOGIN','ENROLL','BAJA','STATUS_CHANGE','CHANGE_PASSWORD'].map(a=>`<option value="${a}">${a}</option>`).join('')}
        </select>
      </div>
      <div id="aud-table"></div>
      <div id="aud-pagination"></div>`;
  }

  function _onSearch(q) {
    _applyFilters(q);
  }

  function _onFilter() {
    const q = document.getElementById('aud-search')?.value || '';
    _applyFilters(q);
  }

  function _applyFilters(q) {
    const entity = document.getElementById('aud-entity')?.value || '';
    const action = document.getElementById('aud-action')?.value || '';
    _filtered = _all.filter(r => {
      if (entity && r.entity !== entity) return false;
      if (action && r.action !== action) return false;
      if (q) return H.matches(r.userName, q) || H.matches(r.action, q) || H.matches(r.entity, q) || H.matches(r.meta, q);
      return true;
    });
    _page = 1;
    _renderTable();
    const tot = document.getElementById('aud-total');
    if (tot) tot.textContent = _filtered.length;
  }

  function _renderTable() {
    const tEl  = document.getElementById('aud-table');
    const pEl  = document.getElementById('aud-pagination');
    if (!tEl) return;
    const pag  = H.paginate(_filtered, _page, PAGE);

    const actionBadge = a => {
      const m = { CREATE:'badge-green', UPDATE:'badge-blue', DELETE:'badge-red', LOGIN:'badge-teal',
                  ENROLL:'badge-green', BAJA:'badge-gray', STATUS_CHANGE:'badge-amber', CHANGE_PASSWORD:'badge-purple' };
      return `<span class="badge ${m[a]||'badge-gray'}">${a}</span>`;
    };

    tEl.innerHTML = pag.rows.length ? `
      <div class="table-wrap"><table class="table">
        <thead><tr><th>Fecha y hora</th><th>Entidad</th><th>Acción</th><th>Usuario</th><th>Detalle</th></tr></thead>
        <tbody>${pag.rows.map(r => `
          <tr>
            <td class="text-sm text-muted" style="white-space:nowrap">${H.date(r.timestamp)} ${r.timestamp ? new Date(r.timestamp).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : ''}</td>
            <td><span class="badge badge-gray">${H.escape(r.entity||'—')}</span></td>
            <td>${actionBadge(r.action||'')}</td>
            <td><div class="person-name" style="font-size:12px">${H.escape(r.userName||'Sistema')}</div>
                <div class="person-sub">${H.escape(r.userRole||'')}</div></td>
            <td class="text-sm text-muted">${H.truncate(r.meta||'', 60)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>` : `<div class="table-empty"><div class="table-empty-icon">${IC.audit}</div>Sin registros</div>`;

    if (pEl) pEl.innerHTML = _renderPagination(pag, 'AuditModule._goPage');
  }

  function _goPage(p) { _page = p; _renderTable(); }

  return { render, _onSearch, _onFilter, _goPage };
})();

const ConfigModule = (() => {

  async function render() {
    const el = document.getElementById('sect-config');
    if (!el) return;
    const user  = APP.user || {};
    const periods = await API.getPeriods().catch(() => []);

    el.innerHTML = `
      <div class="sect-hero">
        <div class="sect-hero-left">
          <div class="sect-hero-icon">${IC.config}</div>
          <div class="sect-hero-text"><div class="sect-hero-eyebrow">Sistema</div>
            <div class="sect-hero-title">Configuración</div><div class="sect-hero-sub">Períodos académicos y preferencias</div></div>
        </div>
      </div>
      <div style="padding:24px;display:grid;gap:24px;max-width:800px">

        <!-- Perfil -->
        <div class="config-card">
          <div class="config-card-title">${IC.user} Mi perfil</div>
          <div class="config-profile">
            <div class="person-avatar" style="width:56px;height:56px;font-size:18px">
              ${user.photoUrl ? `<img src="${H.escape(user.photoUrl)}">` : H.initials(user.name)}
            </div>
            <div>
              <div class="person-name" style="font-size:15px">${H.escape(user.name||'')}</div>
              <div class="person-sub">@${H.escape(user.username||'')} · ${user.role||''}</div>
              <div class="person-sub">${H.escape(user.email||'')}</div>
            </div>
          </div>
          <button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="ProfileMenu.showChangePassword()">${IC.key} Cambiar contraseña</button>
        </div>

        <!-- Períodos académicos -->
        ${user.role === 'admin' ? `
        <div class="config-card">
          <div class="config-card-title" style="display:flex;justify-content:space-between;align-items:center">
            <span>${IC.calendar} Períodos académicos</span>
            <button class="btn btn-primary btn-sm" onclick="ConfigModule.openPeriodModal()">${IC.add} Nuevo período</button>
          </div>
          <div class="table-wrap" style="margin-top:12px">
            <table class="table">
              <thead><tr><th>Nombre</th><th>Año</th><th>Semestre</th><th>Fechas</th><th>Estado</th><th></th></tr></thead>
              <tbody>${periods.map(p => `
                <tr>
                  <td class="person-name">${H.escape(p.name)}</td>
                  <td>${p.year}</td>
                  <td>${p.semester}°</td>
                  <td class="text-sm text-muted">${H.date(p.startDate)} — ${H.date(p.endDate)}</td>
                  <td><span class="badge ${p.status==='active'||p.status==='activo'?'badge-green':'badge-gray'}">${p.status==='active'||p.status==='activo'?'Activo':'Cerrado'}</span></td>
                  <td><button class="btn btn-icon btn-ghost btn-sm" onclick="ConfigModule.openPeriodModal(${JSON.stringify(p)})">${IC.edit}</button></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Caché -->
        <div class="config-card">
          <div class="config-card-title">${IC.refresh} Caché del sistema</div>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Limpia el caché del servidor para forzar la recarga de datos frescos.</p>
          <button class="btn btn-ghost" onclick="ConfigModule.clearCache()">${IC.refresh} Limpiar caché del servidor</button>
        </div>` : ''}

      </div>`;
  }

  async function openPeriodModal(p) {
    const isEdit = !!(p && p.id);
    Modal.open({
      title: isEdit ? 'Editar período' : 'Nuevo período', size: 'md',
      body: `
        <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="per-name" value="${H.escape(p?.name||'')}" placeholder="2025 — Cuatrimestre 1"></div>
        <div class="form-row form-row-3">
          <div class="form-group"><label class="form-label">Año *</label><input class="form-input" id="per-year" type="number" value="${p?.year||new Date().getFullYear()}"></div>
          <div class="form-group"><label class="form-label">Semestre *</label>
            <select class="form-select" id="per-sem"><option value="1" ${p?.semester==1?'selected':''}>1°</option><option value="2" ${p?.semester==2?'selected':''}>2°</option></select></div>
          <div class="form-group"><label class="form-label">Estado</label>
            <select class="form-select" id="per-status">
              <option value="active" ${p?.status==='active'||p?.status==='activo'?'selected':''}>Activo</option>
              <option value="closed" ${p?.status==='closed'||p?.status==='cerrado'?'selected':''}>Cerrado</option>
            </select></div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group"><label class="form-label">Inicio *</label><input class="form-input" id="per-start" type="date" value="${H.escape(p?.startDate||'')}"></div>
          <div class="form-group"><label class="form-label">Fin *</label><input class="form-input" id="per-end" type="date" value="${H.escape(p?.endDate||'')}"></div>
        </div>
        <div id="per-msg"></div>`,
      footer: `<button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
               <button class="btn btn-primary" onclick="ConfigModule._submitPeriod('${p?.id||''}')">
               ${isEdit ? 'Guardar' : 'Crear período'}</button>`,
    });
  }

  async function _submitPeriod(id) {
    const data = {
      name: (document.getElementById('per-name')?.value||'').trim(),
      year: parseInt(document.getElementById('per-year')?.value||0),
      semester: parseInt(document.getElementById('per-sem')?.value||1),
      status: document.getElementById('per-status')?.value||'closed',
      startDate: document.getElementById('per-start')?.value||'',
      endDate: document.getElementById('per-end')?.value||'',
    };
    if (id) data.id = id;
    const msgEl = document.getElementById('per-msg');
    if (!data.name || !data.year || !data.startDate || !data.endDate) {
      if (msgEl) msgEl.innerHTML=`<div class="form-msg form-msg-error">Todos los campos son requeridos</div>`; return;
    }
    const btn = document.querySelector('#modal-overlay .btn-primary');
    if (btn) { btn.disabled=true; btn.textContent='Guardando…'; }
    try {
      await API.savePeriod(data); Modal.close(); Toast.success(id?'Período actualizado':'Período creado'); await render();
    } catch (e) {
      if (msgEl) msgEl.innerHTML=`<div class="form-msg form-msg-error">${H.escape(e.message)}</div>`;
      if (btn) { btn.disabled=false; btn.textContent=id?'Guardar':'Crear período'; }
    }
  }

  async function clearCache() {
    const btn = event.currentTarget;
    if (btn) { btn.disabled=true; btn.textContent='Limpiando…'; }
    try {
      await API.clearAllCache();
      Toast.success('Caché limpiado correctamente');
    } catch (e) { Toast.error(e.message); }
    finally { if (btn) { btn.disabled=false; btn.innerHTML=`${IC.refresh} Limpiar caché del servidor`; } }
  }

  return { render, openPeriodModal, _submitPeriod, clearCache };
})();

// ═══════════════════════════════════════════════════════════
// HELPERS COMPARTIDOS (usados por todos los módulos)
// ═══════════════════════════════════════════════════════════

function _renderError(msg) {
  return `<div style="padding:48px 24px;text-align:center">
    <div style="font-size:32px;margin-bottom:12px;opacity:.4">${IC.alert}</div>
    <div style="font-size:14px;color:var(--red-600)">${H.escape(msg || 'Error al cargar los datos')}</div>
    <button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="Shell.refreshCurrentSection()">
      ${IC.refresh} Reintentar
    </button>
  </div>`;
}

function _renderPagination(pag, fnName) {
  if (pag.pages <= 1) return '';
  const info = `${((pag.page-1)*pag.pageSize)+1}–${Math.min(pag.page*pag.pageSize, pag.total)} de ${pag.total}`;
  let btns = '';
  // Prev
  btns += `<button class="page-btn" ${pag.page<=1?'disabled':''} onclick="${fnName}(${pag.page-1})">${IC.chevronLeft}</button>`;
  // Páginas
  const range = _pageRange(pag.page, pag.pages);
  range.forEach(p => {
    if (p === '…') { btns += `<span class="page-btn" style="cursor:default;border:none">…</span>`; }
    else { btns += `<button class="page-btn ${p===pag.page?'active':''}" onclick="${fnName}(${p})">${p}</button>`; }
  });
  // Next
  btns += `<button class="page-btn" ${pag.page>=pag.pages?'disabled':''} onclick="${fnName}(${pag.page+1})">${IC.chevronRight}</button>`;
  return `<div class="pagination"><span class="pagination-info">${info}</span><div class="pagination-btns">${btns}</div></div>`;
}

function _pageRange(current, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  if (current <= 4) return [1,2,3,4,5,'…',total];
  if (current >= total-3) return [1,'…',total-4,total-3,total-2,total-1,total];
  return [1,'…',current-1,current,current+1,'…',total];
}
</script>
