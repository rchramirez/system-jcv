<script>
// ============================================================
// JCV FRONTEND — App.Modules.html  v5.0
//
// Módulos de entidades. Cada módulo es un objeto con:
//   render(params)  — dibuja la sección en #sect-X
//   _load()         — fetcha datos y actualiza el Store
//   _renderTable()  — genera el HTML de la tabla/lista
//
// Módulos:
//   DashboardModule  — panel de estadísticas admin
//   PeopleModule     — Personas (tabla, modal CRUD, foto)
//   CellsModule      — Células (tabla, modal, miembros)
//   ChurchesModule   — Nexos (tabla, modal CRUD)
//   MinistriesModule — Ministerios (tabla, modal, miembros)
//   UsersModule      — Usuarios (tabla, modal, activar/desactivar)
//   AuditModule      — Log de auditoría (tabla filtrable + paginada)
//   ConfigModule     — Configuración (períodos, cache, perfil)
//
// Dependencias cargadas antes:
//   App.Constants, App.State, App.Bridge, App.Shell
// ============================================================

// ═══════════════════════════════════════════════════════════
// DASHBOARD MODULE
// ═══════════════════════════════════════════════════════════
const DashboardModule = (() => {

  async function render() {
    const el = document.getElementById('sect-dashboard');
    if (!el) return;
    // Guard: si no hay usuario en Store todavía, reintentar en 300ms
    if (!APP.user) {
      el.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
      setTimeout(() => render(), 300);
      return;
    }
    el.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      const stats = await API.getDashboardStats();
      const secDash = APP.user && APP.user.role !== 'admin'
        ? await API.getSecretaryDashboard(APP.user.assignedGrade || '')
        : null;
      el.innerHTML = _renderDashboard(stats, secDash);
    } catch (e) {
      el.innerHTML = _renderError(e.message);
    }
  }

  function _renderDashboard(stats, secDash) {
    const g = stats.gradeStats || {};
    const gradeCards = CONFIG.GRADE_KEYS.map(key => {
      const d = g[key] || {};
      return `
        <div class="dash-grade-card" onclick="Router.go('schools',{grade:'${key}'})">
          <div class="dash-grade-header">
            <span class="badge badge-${CONFIG.GRADES[key].color}">${CONFIG.GRADES[key].short}</span>
            <span class="dash-grade-label">${CONFIG.GRADES[key].label}</span>
          </div>
          <div class="dash-grade-stats">
            <div class="dash-stat">
              <div class="dash-stat-val">${d.total || 0}</div>
              <div class="dash-stat-lbl">Inscriptos</div>
            </div>
            <div class="dash-stat">
              <div class="dash-stat-val text-green">${d.approved || 0}</div>
              <div class="dash-stat-lbl">Aprobados</div>
            </div>
            <div class="dash-stat">
              <div class="dash-stat-val">${d.classes || 0}</div>
              <div class="dash-stat-lbl">Clases</div>
            </div>
          </div>
        </div>`;
    }).join('');

    const kpis = [
      { label: 'Personas', val: stats.totalPeople   || 0, icon: IC.people,   section: 'people'     },
      { label: 'Inscriptos',val: stats.totalEnrolled|| 0, icon: IC.schools,  section: 'schools'    },
      { label: 'Células',   val: stats.totalCells   || 0, icon: IC.cells,    section: 'cells'      },
      { label: 'Nexos',     val: stats.totalChurches|| 0, icon: IC.churches, section: 'churches'   },
    ];
    const kpiHtml = kpis.map(k => `
      <div class="dash-kpi" onclick="Router.go('${k.section}')">
        <div class="dash-kpi-icon">${k.icon}</div>
        <div class="dash-kpi-val">${k.val.toLocaleString('es-AR')}</div>
        <div class="dash-kpi-lbl">${k.label}</div>
      </div>`).join('');

    // Panel secretario
    let secHtml = '';
    if (secDash) {
      const risks = (secDash.activeStudents || []).filter(s => s.riskLevel !== 'ok').slice(0, 5);
      const bdays = (secDash.birthdays || []).slice(0, 5);
      secHtml = `
        <div class="dash-row">
          ${risks.length ? `
          <div class="dash-card">
            <div class="dash-card-title">${IC.warning} Alumnos en riesgo</div>
            ${risks.map(s => `
              <div class="dash-risk-row">
                <div class="person-cell">
                  <div class="person-avatar">${s.photoUrl ? `<img src="${s.photoUrl}">` : H.initials(`${s.name} ${s.lastName}`)}</div>
                  <div><div class="person-name">${H.escape(s.name)} ${H.escape(s.lastName)}</div>
                  <div class="person-sub">${H.gradeLabel(s.grade)}</div></div>
                </div>
                <span class="badge ${H.statusBadge(s.riskLevel)}">${s.ausentes} ausencias</span>
              </div>`).join('')}
          </div>` : ''}
          ${bdays.length ? `
          <div class="dash-card">
            <div class="dash-card-title">${IC.cake} Cumpleaños del mes</div>
            ${bdays.map(b => `
              <div class="dash-risk-row">
                <div class="person-cell">
                  <div class="person-avatar">${b.photoUrl ? `<img src="${b.photoUrl}">` : H.initials(`${b.name} ${b.lastName}`)}</div>
                  <div><div class="person-name">${H.escape(b.name)} ${H.escape(b.lastName)}</div>
                  <div class="person-sub">Día ${b.day} · ${b.age} años</div></div>
                </div>
              </div>`).join('')}
          </div>` : ''}
        </div>`;
    }

    return `
      <div class="sect-hero">
        <div class="sect-hero-left">
          <div class="sect-hero-icon">${IC.dashboard}</div>
          <div class="sect-hero-text">
            <div class="sect-hero-eyebrow">Panel principal</div>
            <div class="sect-hero-title">Dashboard</div>
            <div class="sect-hero-sub">Resumen general del sistema</div>
          </div>
        </div>
      </div>
      <div class="dash-body">
        <div class="dash-kpis">${kpiHtml}</div>
        <div class="dash-grades-title">Escuelas</div>
        <div class="dash-grades">${gradeCards}</div>
        ${secHtml}
      </div>`;
  }

  return { render };
})();

// ═══════════════════════════════════════════════════════════
// PEOPLE MODULE
// ═══════════════════════════════════════════════════════════
const PeopleModule = (() => {
  let _all = [], _filtered = [], _page = 1;
  const PAGE = 50;

  async function render() {
    const el = document.getElementById('sect-people');
    if (!el) return;
    if (!APP.user) {
      el.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
      setTimeout(() => render(), 300);
      return;
    }
    el.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      // Fetch paralelo: personas + datos relacionados
      // getCells/getMinistries/getEnrollments ya guardan en Store y CacheMgr
      const [people] = await Promise.all([
        API.getPeople(),
        API.getCells(),
        API.getMinistries(),
        API.getEnrollments(),
      ]);
      _all      = people;
      _filtered = [..._all];
      _page     = 1;
      el.innerHTML = _buildShell();
      _bindEvents(el);
      _renderTable();
    } catch (e) { el.innerHTML = _renderError(e.message); }
  }

  function _buildShell() {
    const canEdit = ['admin','secretary'].includes(APP.user?.role);
    return `
      <div class="sect-hero">
        <div class="sect-hero-left">
          <div class="sect-hero-icon">${IC.people}</div>
          <div class="sect-hero-text">
            <div class="sect-hero-eyebrow">Gestión</div>
            <div class="sect-hero-title">Personas</div>
            <div class="sect-hero-sub">Registro de la congregación</div>
          </div>
        </div>
        <div class="sect-hero-right">
          <div class="sect-metric">
            <div class="sect-metric-val" id="ppl-total">${_all.length}</div>
            <div class="sect-metric-label">Total</div>
          </div>
          ${canEdit ? `<button class="btn btn-primary" onclick="PeopleModule.openModal()">${IC.add} Nueva persona</button>` : ''}
        </div>
      </div>
      <div class="sect-toolbar">
        <div class="search-wrap">
          ${IC.search}
          <input class="search-input" id="ppl-search" placeholder="Buscar por nombre, email, teléfono…" oninput="PeopleModule._onSearch(this.value)">
        </div>
        <button class="btn btn-ghost btn-sm" onclick="PeopleModule._export()">${IC.download} Exportar</button>
      </div>
      <div id="ppl-table"></div>
      <div id="ppl-pagination"></div>`;
  }

  function _bindEvents(el) {
    el.querySelector('#ppl-search')?.addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.target.value = ''; PeopleModule._onSearch(''); }
    });
  }

  function _onSearch(q) {
    Store.patch('search', { people: q });
    _filtered = H.filterBySearch(_all, q, ['name','lastName','email','phone','cellLeader','country']);
    _page = 1;
    _renderTable();
    const tot = document.getElementById('ppl-total');
    if (tot) tot.textContent = _filtered.length;
  }

  function _renderTable() {
    const tableEl = document.getElementById('ppl-table');
    const pagEl   = document.getElementById('ppl-pagination');
    if (!tableEl) return;

    const pag     = H.paginate(_filtered, _page, PAGE);
    const rows    = pag.rows;
    const canEdit = ['admin','secretary'].includes(APP.user?.role);
    const isAdmin = APP.user?.role === 'admin';

    // Datos relacionados desde Store/caché
    const cells      = Store.get('cells')      || [];
    const ministries = Store.get('ministries') || [];
    const enrollments= Store.get('enrollments')|| {};

    tableEl.innerHTML = rows.length ? `
      <div class="table-wrap">
        <div class="table-scroll">
          <table class="table ppl-table-v2">
            <thead>
              <tr>
                <th style="min-width:200px">Persona</th>
                <th style="min-width:160px">Contacto</th>
                <th style="min-width:150px">Célula</th>
                <th style="min-width:150px">Ministerio</th>
                <th style="min-width:160px">Cursos</th>
                <th style="text-align:center;min-width:90px">Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(p => _renderRow(p, canEdit, isAdmin, cells, ministries, enrollments)).join('')}
            </tbody>
          </table>
        </div>
      </div>` : `<div class="table-empty"><div class="table-empty-icon">${IC.people}</div>No se encontraron personas</div>`;

    if (pagEl) pagEl.innerHTML = _renderPagination(pag, 'PeopleModule._goPage');
  }

  function _renderRow(p, canEdit, isAdmin, cells, ministries, enrollments) {
    // ── Persona: edad + bandera + país
    const initials = H.initials(H.fullName(p));
    const avatar   = p.photoUrl
      ? `<img src="${H.escape(p.photoUrl)}" alt="">`
      : initials;

    const age = _calcAge(p.birthDate);
    const flag = _countryFlag(p.country);
    const ageLine = [
      age !== null ? `<span class="ppl-age">${age} años</span>` : '',
      (age !== null && (flag || p.country)) ? `<span class="ppl-sep">·</span>` : '',
      flag  ? `<span class="ppl-flag">${flag}</span>` : '',
      p.country ? `<span class="ppl-country">${H.escape(p.country)}</span>` : '',
    ].filter(Boolean).join('');

    // ── Célula: nombre + líder
    const cell = cells.find(c => c.id === p.cellId)
              || cells.find(c => c.leader === p.cellLeader);
    const cellHtml = cell
      ? `<div>
          <span class="ppl-chip ppl-chip-green">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><polygon points="5,1 9,3 9,7 5,9 1,7 1,3"/></svg>
            ${H.escape(cell.name)}
          </span>
          <div class="ppl-subline">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>
            ${H.escape(cell.leader || '—')}
          </div>
        </div>`
      : `<span class="ppl-none">—</span>`;

    // ── Ministerio: nombre + tipo con color
    const ministry = ministries.find(m => m.id === p.ministryId);
    const MTYPE_COLORS = {
      alabanza:'#8B5CF6',ensenanza:'#3B82F6',ujieres:'#22C55E',
      intercesion:'#D97706',evangelismo:'#EF4444',jovenes:'#06B6D4',
      ninos:'#F97316',medios:'#EC4899',accion:'#78716C',otro:'#6366F1'
    };
    const MTYPE_ICONS = {
      alabanza:'🎵',ensenanza:'📖',ujieres:'🤝',intercesion:'🙏',
      evangelismo:'📢',jovenes:'⚡',ninos:'⭐',medios:'🎬',accion:'☕',otro:'✦'
    };
    const mColor = ministry ? (MTYPE_COLORS[ministry.type] || '#6366F1') : null;
    const mIcon  = ministry ? (MTYPE_ICONS[ministry.type]  || '✦') : null;
    const ministerioHtml = ministry
      ? `<span class="ppl-chip" style="background:${mColor}18;color:${mColor};border-color:${mColor}30">
          <span style="font-size:12px">${mIcon}</span>
          ${H.escape(ministry.name)}
        </span>`
      : `<span class="ppl-none">—</span>`;

    // ── Cursos: todos los grados activos con estado
    const GRADE_KEYS  = CONFIG.GRADE_KEYS;
    const GRADE_LABELS= {};
    const GRADE_BG    = {escuelaVida:'#FEFCE8',consolidacion:'#F0FDF4',obreros1:'#FFF1F2',obreros2:'#EFF6FF'};
    const GRADE_TEXT  = {escuelaVida:'#854D0E',consolidacion:'#166534',obreros1:'#9F1239',obreros2:'#1E40AF'};
    CONFIG.GRADE_KEYS.forEach(k => { GRADE_LABELS[k] = CONFIG.GRADES[k].label; });

    const STATUS_LABELS_MAP = {activo:'En curso',active:'En curso',aprobado:'Aprobado',approved:'Aprobado',desaprobado:'Desaprobado',failed:'Desaprobado',baja:'Baja',dropped:'Baja'};
    const STATUS_BG  = {activo:'#DBEAFE',active:'#DBEAFE',aprobado:'#DCFCE7',approved:'#DCFCE7',desaprobado:'#FFE4E6',failed:'#FFE4E6',baja:'#F1F5F9',dropped:'#F1F5F9'};
    const STATUS_TX  = {activo:'#1E40AF',active:'#1E40AF',aprobado:'#166534',approved:'#166534',desaprobado:'#9F1239',failed:'#9F1239',baja:'#64748B',dropped:'#64748B'};
    const STATUS_DOT = {activo:'#3B82F6',active:'#3B82F6',aprobado:'#22C55E',approved:'#22C55E',desaprobado:'#F43F5E',failed:'#F43F5E',baja:'#94A3B8',dropped:'#94A3B8'};

    const personGrades = GRADE_KEYS
      .map(g => {
        const list = Array.isArray(enrollments[g]) ? enrollments[g] : [];
        return list.find(e => e.personId === p.id) ? { g, enr: list.find(e => e.personId === p.id) } : null;
      })
      .filter(Boolean);

    const cursosHtml = personGrades.length
      ? personGrades.map(({ g, enr }) => {
          const st  = enr.status || 'activo';
          const stL = STATUS_LABELS_MAP[st] || st;
          const bg  = STATUS_BG[st]  || '#F1F5F9';
          const tx  = STATUS_TX[st]  || '#64748B';
          const dot = STATUS_DOT[st] || '#94A3B8';
          return `<div class="ppl-course">
            <span class="ppl-course-name" style="color:${GRADE_TEXT[g]}">${GRADE_LABELS[g]}</span>
            <span class="ppl-status-chip" style="background:${bg};color:${tx}">
              <span style="width:5px;height:5px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
              ${stL}
            </span>
          </div>`;
        }).join('')
      : `<span class="ppl-none">—</span>`;

    // ── Acciones
    const accionesHtml = `
      <div class="ppl-acts">
        <button class="ppl-btn ppl-btn-view" title="Ver perfil"
          onclick="PeopleModule._viewPerson(${JSON.stringify(p)})">
          ${IC.eye}
        </button>
        ${canEdit ? `
        <button class="ppl-btn ppl-btn-edit" title="Editar"
          onclick="PeopleModule.openModal(${JSON.stringify(p)})">
          ${IC.edit}
        </button>` : ''}
        ${isAdmin ? `
        <button class="ppl-btn ppl-btn-del" title="Eliminar"
          onclick="PeopleModule.deletePerson('${p.id}','${H.escape(p.name)} ${H.escape(p.lastName||'')}')">
          ${IC.trash}
        </button>` : ''}
      </div>`;

    return `
      <tr class="ppl-row">
        <td>
          <div class="ppl-cell" onclick="PeopleModule._viewPerson(${JSON.stringify(p)})">
            <div class="ppl-av">${avatar}</div>
            <div class="ppl-info">
              <div class="ppl-name">${H.escape(p.name)} ${H.escape(p.lastName || '')}</div>
              <div class="ppl-subline ppl-subline-gap">${ageLine}</div>
            </div>
          </div>
        </td>
        <td>
          ${p.phone
            ? `<div class="ppl-contact-main">
                <svg class="ppl-ico" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 1.5h2.5L5.8 4.5l-1.3.8A7 7 0 009.2 9.5l.8-1.3 3 1.3V12a.8.8 0 01-.8.8C4.5 12.8 1.2 8 1.2 3a.8.8 0 01.8-.8"/></svg>
                ${H.escape(p.phone)}
              </div>`
            : '<span class="ppl-none">—</span>'}
          ${p.email
            ? `<div class="ppl-contact-sub">
                <svg class="ppl-ico" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="3" width="12" height="8" rx="1"/><path d="M1 4l6 4 6-4"/></svg>
                ${H.escape(p.email)}
              </div>`
            : ''}
        </td>
        <td>${cellHtml}</td>
        <td>${ministerioHtml}</td>
        <td>${cursosHtml}</td>
        <td style="text-align:center">${accionesHtml}</td>
      </tr>`;
  }

  // Calcula edad desde birthDate (ISO, Date(), o dd/mm/yyyy)
  function _calcAge(val) {
    if (!val) return null;
    let d;
    const str = String(val).trim();
    const gas = str.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
    if (gas) {
      d = new Date(parseInt(gas[1]), parseInt(gas[2]), parseInt(gas[3]));
    } else if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
      const [dd, mm, yy] = str.split('/');
      d = new Date(`${yy}-${mm}-${dd}T12:00:00`);
    } else {
      d = new Date(str.includes('T') ? str : str + 'T12:00:00');
    }
    if (!d || isNaN(d.getTime()) || d.getFullYear() < 1900) return null;
    const today = new Date();
    let age = today.getFullYear() - d.getFullYear();
    const m = today.getMonth() - d.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
    return age >= 0 ? age : null;
  }

  // Retorna el emoji de bandera para un país
  function _countryFlag(country) {
    const FLAGS = {
      'Argentina':'🇦🇷','Bolivia':'🇧🇴','Brasil':'🇧🇷','Chile':'🇨🇱',
      'Colombia':'🇨🇴','Costa Rica':'🇨🇷','Cuba':'🇨🇺','Rep. Dominicana':'🇩🇴',
      'Ecuador':'🇪🇨','El Salvador':'🇸🇻','Guatemala':'🇬🇹','Honduras':'🇭🇳',
      'México':'🇲🇽','Nicaragua':'🇳🇮','Panamá':'🇵🇦','Paraguay':'🇵🇾',
      'Perú':'🇵🇪','Puerto Rico':'🇵🇷','Uruguay':'🇺🇾','Venezuela':'🇻🇪',
      'Estados Unidos':'🇺🇸','España':'🇪🇸','Italia':'🇮🇹','Portugal':'🇵🇹',
      'Francia':'🇫🇷','Alemania':'🇩🇪','Reino Unido':'🇬🇧','Canadá':'🇨🇦',
      'Japón':'🇯🇵','China':'🇨🇳','Israel':'🇮🇱','Haití':'🇭🇹',
      'Nigeria':'🇳🇬','Sudáfrica':'🇿🇦'
    };
    return FLAGS[country] || '';
  }

  async function openModal(person) {
    const cells    = await API.getCells().catch(() => []);
    const churches = await API.getChurches().catch(() => []);
    const isEdit   = !!(person && person.id);

    const cellOpts     = cells.map(c => `<option value="${c.id}" ${person?.cellId === c.id ? 'selected' : ''}>${H.escape(c.name)} — ${H.escape(c.leader||'')}</option>`).join('');
    const churchOpts   = churches.map(c => `<option value="${c.id}" ${person?.churchId === c.id ? 'selected' : ''}>${H.escape(c.name)}</option>`).join('');
    const genderOpts   = CONFIG.GENDERS.map(g => `<option value="${g.value}" ${person?.gender === g.value ? 'selected' : ''}>${g.label}</option>`).join('');

    Modal.open({
      title: isEdit ? 'Editar persona' : 'Nueva persona',
      size: 'lg',
      body: `
        <div class="form-row form-row-2">
          <div class="form-group"><label class="form-label">Nombre *</label>
            <input class="form-input" id="p-name" value="${H.escape(person?.name||'')}" placeholder="Nombre"></div>
          <div class="form-group"><label class="form-label">Apellido *</label>
            <input class="form-input" id="p-last" value="${H.escape(person?.lastName||'')}" placeholder="Apellido"></div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group"><label class="form-label">Email</label>
            <input class="form-input" id="p-email" type="email" value="${H.escape(person?.email||'')}" placeholder="email@ejemplo.com"></div>
          <div class="form-group"><label class="form-label">Teléfono</label>
            <input class="form-input" id="p-phone" value="${H.escape(person?.phone||'')}" placeholder="+54 11 1234-5678"></div>
        </div>
        <div class="form-row form-row-3">
          <div class="form-group"><label class="form-label">Género</label>
            <select class="form-select" id="p-gender"><option value="">—</option>${genderOpts}</select></div>
          <div class="form-group"><label class="form-label">Fecha de nacimiento</label>
            <input class="form-input" id="p-birth" type="date" value="${H.escape(person?.birthDate||'')}"></div>
          <div class="form-group"><label class="form-label">País</label>
            <input class="form-input" id="p-country" value="${H.escape(person?.country||'Argentina')}" placeholder="Argentina"></div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group"><label class="form-label">Célula</label>
            <select class="form-select" id="p-cell"><option value="">Sin célula</option>${cellOpts}</select></div>
          <div class="form-group"><label class="form-label">Nexo / Iglesia</label>
            <select class="form-select" id="p-church"><option value="">Sin nexo</option>${churchOpts}</select></div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group"><label class="form-label">Invitado por</label>
            <input class="form-input" id="p-invited" value="${H.escape(person?.invitedBy||'')}"></div>
          <div class="form-group" style="justify-content:flex-end;padding-top:20px">
            <label class="form-check">
              <input type="checkbox" id="p-encounter" ${String(person?.attendedEncounter).toLowerCase()==='true' ? 'checked' : ''}>
              Asistió al Encuentro
            </label>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Observación</label>
          <textarea class="form-textarea" id="p-obs" placeholder="Notas internas…">${H.escape(person?.observation||'')}</textarea></div>
        <div id="p-msg"></div>`,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        <button class="btn btn-primary" onclick="PeopleModule._submit('${person?.id||''}')">
          ${isEdit ? 'Guardar cambios' : 'Crear persona'}
        </button>`,
    });
  }

  async function _submit(id) {
    const data = {
      name:              (document.getElementById('p-name')?.value||'').trim(),
      lastName:          (document.getElementById('p-last')?.value||'').trim(),
      email:             (document.getElementById('p-email')?.value||'').trim(),
      phone:             (document.getElementById('p-phone')?.value||'').trim(),
      gender:            document.getElementById('p-gender')?.value||'',
      birthDate:         document.getElementById('p-birth')?.value||'',
      country:           (document.getElementById('p-country')?.value||'').trim(),
      cellId:            document.getElementById('p-cell')?.value||'',
      churchId:          document.getElementById('p-church')?.value||'',
      invitedBy:         (document.getElementById('p-invited')?.value||'').trim(),
      attendedEncounter: document.getElementById('p-encounter')?.checked || false,
      observation:       (document.getElementById('p-obs')?.value||'').trim(),
    };
    if (id) data.id = id;

    const msgEl = document.getElementById('p-msg');
    if (!data.name || !data.lastName) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">Nombre y apellido son requeridos</div>`;
      return;
    }

    const btn = document.querySelector('#modal-overlay .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

    try {
      await API.savePerson(data);
      Modal.close();
      Toast.success(id ? 'Persona actualizada' : 'Persona creada');
      await render();
    } catch (e) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">${H.escape(e.message)}</div>`;
      if (btn) { btn.disabled = false; btn.textContent = id ? 'Guardar cambios' : 'Crear persona'; }
    }
  }

  async function deletePerson(id, name) {
    const ok = await Modal.confirm({ title: 'Eliminar persona', message: `¿Eliminar a <strong>${H.escape(name)}</strong>? Esta acción no se puede deshacer.`, confirmText: 'Eliminar' });
    if (!ok) return;
    try {
      await API.deletePerson(id);
      Toast.success('Persona eliminada');
      await render();
    } catch (e) { Toast.error(e.message); }
  }

  function _export() {
    H.downloadCSV(_filtered, [
      { field: 'name',      label: 'Nombre'   },
      { field: 'lastName',  label: 'Apellido' },
      { field: 'email',     label: 'Email'    },
      { field: 'phone',     label: 'Teléfono' },
      { field: 'cellLeader',label: 'Célula'   },
      { field: 'country',   label: 'País'     },
    ], 'personas.csv');
  }

  function _goPage(p) { _page = p; _renderTable(); }

  function _viewPerson(person) {
    // Redirige al modal de vista — usa el openModal con modo lectura
    // o simplemente abre el modal de edición si no hay vista separada
    if (typeof Modal !== 'undefined') {
      const enc = String(person.attendedEncounter).toLowerCase() === 'true';
      Modal.open({
        title: `${H.escape(person.name)} ${H.escape(person.lastName || '')}`,
        size: 'md',
        body: `
          <div style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg-subtle);border-radius:12px;margin-bottom:16px">
            <div class="ppl-av" style="width:52px;height:52px;font-size:17px">
              ${person.photoUrl ? `<img src="${H.escape(person.photoUrl)}" alt="">` : H.initials(H.fullName(person))}
            </div>
            <div>
              <div style="font-size:16px;font-weight:700;color:var(--text-primary)">${H.escape(person.name)} ${H.escape(person.lastName||'')}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${H.escape(person.country||'')} ${_countryFlag(person.country)}</div>
            </div>
            <span class="badge ${enc?'badge-green':'badge-gray'}" style="margin-left:auto">${enc?'Con Encuentro':'Sin Encuentro'}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
            ${[
              ['Teléfono', person.phone],
              ['Email',    person.email],
              ['País',     person.country],
              ['Género',   person.gender],
            ].filter(([,v]) => v).map(([l,v]) =>
              `<div style="padding:10px 12px;background:var(--bg-subtle);border-radius:9px">
                <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">${l}</div>
                <div style="margin-top:3px;font-weight:500;color:var(--text-primary)">${H.escape(String(v))}</div>
              </div>`
            ).join('')}
          </div>
          ${person.observation ? `<div style="margin-top:12px;padding:12px;background:var(--bg-subtle);border-radius:9px;font-size:13px;color:var(--text-secondary)">${H.escape(person.observation)}</div>` : ''}`,
        footer: `<button class="btn btn-ghost" onclick="Modal.close()">Cerrar</button>`
      });
    }
  }

  return { render, openModal, _submit, deletePerson, _onSearch, _goPage, _export, _viewPerson };
})();

// ═══════════════════════════════════════════════════════════
// CELLS MODULE — Vista de árbol v2
// ═══════════════════════════════════════════════════════════
const CellsModule = (() => {

  let _all       = [];   // todas las células
  let _people    = [];   // personas (para conteo de integrantes)
  let _churches  = [];   // nexos (para mostrar nombre en card)
  let _expanded  = {};   // estado expand/colapso por id
  let _query     = '';   // búsqueda activa

  // Paleta de colores por profundidad de nivel
  const DEPTH = [
    { accent:'#A855F7', bg:'#FAF5FF', text:'#7C3AED', border:'#E9D5FF' },
    { accent:'#3B82F6', bg:'#EFF6FF', text:'#1D4ED8', border:'#BFDBFE' },
    { accent:'#22C55E', bg:'#F0FDF4', text:'#15803D', border:'#BBF7D0' },
    { accent:'#F59E0B', bg:'#FFFBEB', text:'#92400E', border:'#FDE68A' },
  ];

  const CAT_LABELS = {
    general:        'General',
    jovenes:        'Jóvenes',
    matrimonios:    'Matrimonios',
    adolescentes:   'Adolescentes',
    ninos:          'Niños',
    preadolescentes:'Preadolescentes',
  };

  // ── Carga de datos ──────────────────────────────────────

  async function render() {
    const sect = document.getElementById('sect-cells');
    if (!sect) return;
    sect.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      [_all, _people, _churches] = await Promise.all([
        API.getCells(),
        API.getPeople().catch(() => []),
        API.getChurches().catch(() => []),
      ]);
      // Inicializar todos expandidos la primera vez
      _all.forEach(c => {
        if (_expanded[c.id] === undefined) _expanded[c.id] = true;
      });
      sect.innerHTML = '';
      sect.appendChild(_buildPage());
    } catch (e) {
      sect.innerHTML = _renderError(e.message);
    }
  }

  // ── Construcción del DOM principal ─────────────────────

  function _buildPage() {
    const isAdmin     = APP.user?.role === 'admin';
    const rootCells   = _all.filter(c => !c.parentCellId || !_all.find(x => x.id === c.parentCellId));
    const childrenMap = _buildChildrenMap();
    const totalM      = new Set(_people.filter(p => p.cellId || p.cellLeader).map(p => p.id)).size;
    const totalL      = new Set(_all.map(c => c.leader).filter(Boolean)).size;
    const allExp      = _all.length > 0 && _all.every(c => _expanded[c.id] !== false);

    const wrap = document.createElement('div');

    // ── Hero
    wrap.innerHTML = `
      <div class="ctv2-hero">
        <div class="ctv2-hero-band"></div>
        <div class="ctv2-hero-body">
          <div class="ctv2-hero-left">
            <div class="ctv2-hero-icon">${IC.cells}</div>
            <div>
              <div class="ctv2-hero-eyebrow">Estructura de la iglesia</div>
              <h1 class="ctv2-hero-title">Células</h1>
            </div>
          </div>
          <div class="ctv2-hero-right">
            <div class="ctv2-stats-row">
              <div class="ctv2-stat"><span class="ctv2-stat-val" style="color:#A855F7">${_all.length}</span><span class="ctv2-stat-lbl">células</span></div>
              <div class="ctv2-stat-sep"></div>
              <div class="ctv2-stat"><span class="ctv2-stat-val" style="color:#22C55E">${totalM}</span><span class="ctv2-stat-lbl">integrantes</span></div>
              <div class="ctv2-stat-sep"></div>
              <div class="ctv2-stat"><span class="ctv2-stat-val" style="color:#F97316">${totalL}</span><span class="ctv2-stat-lbl">líderes</span></div>
              <div class="ctv2-stat-sep"></div>
              <div class="ctv2-stat"><span class="ctv2-stat-val" style="color:#3B82F6">${rootCells.length}</span><span class="ctv2-stat-lbl">raíces</span></div>
            </div>
            ${isAdmin ? `<button class="btn btn-primary ctv2-new-btn" id="ctv2-new-btn">＋ Nueva Célula</button>` : ''}
          </div>
        </div>
      </div>`;

    // ── Toolbar
    const toolbar = document.createElement('div');
    toolbar.className = 'ctv2-toolbar';

    const searchWrap = document.createElement('div');
    searchWrap.className = 'ctv2-search';
    searchWrap.innerHTML = `<span class="ctv2-search-icon">${IC.search}</span>`;
    const searchInput = document.createElement('input');
    searchInput.className = 'ctv2-search-input';
    searchInput.placeholder = 'Buscar célula o líder...';
    searchInput.value = _query;
    searchInput.addEventListener('input', e => {
      _query = e.target.value.toLowerCase().trim();
      _repaint(treeWrap, childrenMap);
    });
    searchWrap.appendChild(searchInput);

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'btn btn-ghost btn-sm';
    toggleBtn.id = 'ctv2-toggle-all';
    toggleBtn.style.whiteSpace = 'nowrap';
    toggleBtn.textContent = allExp ? '⊟ Contraer todo' : '⊞ Expandir todo';
    toggleBtn.addEventListener('click', () => {
      const next = !_all.every(c => _expanded[c.id] !== false);
      _all.forEach(c => { _expanded[c.id] = next; });
      toggleBtn.textContent = next ? '⊟ Contraer todo' : '⊞ Expandir todo';
      _repaint(treeWrap, childrenMap);
    });

    toolbar.appendChild(searchWrap);
    toolbar.appendChild(toggleBtn);

    // ── Árbol
    const treeWrap = document.createElement('div');
    treeWrap.className = 'ctv2-tree';

    _repaint(treeWrap, childrenMap);

    wrap.appendChild(toolbar);
    wrap.appendChild(treeWrap);

    // Wiring post-insert
    wrap.querySelector('#ctv2-new-btn')?.addEventListener('click', () => openModal());

    return wrap;
  }

  // ── Lógica del árbol ────────────────────────────────────

  function _buildChildrenMap() {
    const map = {};
    _all.forEach(c => {
      const pid = c.parentCellId;
      if (pid && _all.find(x => x.id === pid)) {
        if (!map[pid]) map[pid] = [];
        map[pid].push(c);
      }
    });
    return map;
  }

  function _countDirectMembers(cell) {
    return _people.filter(p =>
      p.cellId === cell.id ||
      (!p.cellId && cell.leader && p.cellLeader === cell.leader)
    );
  }

  function _countTotalMembers(cellId, childrenMap) {
    const cell = _all.find(c => c.id === cellId);
    if (!cell) return 0;
    const direct = _countDirectMembers(cell).length;
    const children = childrenMap[cellId] || [];
    return children.reduce((sum, ch) => sum + _countTotalMembers(ch.id, childrenMap), direct);
  }

  function _repaint(container, childrenMap) {
    container.innerHTML = '';
    const q = _query;

    // Si hay búsqueda, modo flat con todas las coincidencias
    if (q) {
      const matches = _all.filter(c =>
        H.matches(c.name, q) || H.matches(c.leader, q) || H.matches(c.location, q)
      );
      if (!matches.length) {
        container.innerHTML = `
          <div class="table-empty">
            <div class="table-empty-icon">${IC.cells}</div>
            Sin resultados para "<strong>${H.escape(q)}</strong>"
          </div>`;
        return;
      }
      matches.forEach(cell => {
        const depth = _getDepth(cell.id, childrenMap);
        container.appendChild(_renderCard(cell, childrenMap, depth, false));
      });
      return;
    }

    // Modo árbol normal
    const roots = _all.filter(c => !c.parentCellId || !_all.find(x => x.id === c.parentCellId));
    if (!roots.length) {
      container.innerHTML = `
        <div class="table-empty">
          <div class="table-empty-icon">${IC.cells}</div>
          No hay células cargadas.
          ${APP.user?.role === 'admin' ? `<button class="btn btn-primary" style="margin-top:14px" onclick="CellsModule.openModal()">＋ Nueva Célula</button>` : ''}
        </div>`;
      return;
    }
    roots.forEach(cell => {
      container.appendChild(_renderNode(cell, childrenMap, 0));
    });
  }

  function _getDepth(cellId, childrenMap) {
    let depth = 0;
    let current = _all.find(c => c.id === cellId);
    while (current && current.parentCellId) {
      const parent = _all.find(c => c.id === current.parentCellId);
      if (!parent) break;
      depth++;
      current = parent;
    }
    return depth;
  }

  function _renderNode(cell, childrenMap, depth) {
    const children = childrenMap[cell.id] || [];
    const hasChildren = children.length > 0;
    const isOpen = _expanded[cell.id] !== false;

    const nodeEl = document.createElement('div');
    nodeEl.className = 'ctv2-node';

    nodeEl.appendChild(_renderCard(cell, childrenMap, depth, true));

    if (hasChildren && isOpen) {
      const childrenWrap = document.createElement('div');
      childrenWrap.className = 'ctv2-children';
      const pal = DEPTH[Math.min(depth, 3)];
      childrenWrap.style.borderLeftColor = pal.accent + '40';

      children.forEach(child => {
        const childRow = document.createElement('div');
        childRow.className = 'ctv2-child-row';
        // Conector horizontal
        const connector = document.createElement('div');
        connector.className = 'ctv2-connector';
        connector.style.background = pal.accent + '50';
        childRow.appendChild(connector);
        childRow.appendChild(_renderNode(child, childrenMap, depth + 1));
        childrenWrap.appendChild(childRow);
      });

      nodeEl.appendChild(childrenWrap);
    }

    return nodeEl;
  }

  function _renderCard(cell, childrenMap, depth, withToggle) {
    const isAdmin    = APP.user?.role === 'admin';
    const pal        = DEPTH[Math.min(depth, 3)];
    const children   = childrenMap[cell.id] || [];
    const hasKids    = children.length > 0;
    const isOpen     = _expanded[cell.id] !== false;
    const directM    = _countDirectMembers(cell);
    const totalM     = _countTotalMembers(cell.id, childrenMap);
    const hasExtra   = totalM > directM.length;
    const church     = _churches.find(ch => ch.id === cell.churchId);

    const card = document.createElement('div');
    card.className = 'ctv2-card';
    card.style.borderLeftColor = pal.accent;

    if (withToggle && hasKids) {
      card.style.cursor = 'pointer';
      card.addEventListener('click', e => {
        if (e.target.closest('.ctv2-act-btn')) return;
        _expanded[cell.id] = !isOpen;
        // Re-renderizar el árbol completo
        const treeWrap = document.querySelector('.ctv2-tree');
        if (treeWrap) _repaint(treeWrap, _buildChildrenMap());
        // Actualizar texto del botón toggle
        const tBtn = document.getElementById('ctv2-toggle-all');
        if (tBtn) {
          const allExp = _all.every(c => _expanded[c.id] !== false);
          tBtn.textContent = allExp ? '⊟ Contraer todo' : '⊞ Expandir todo';
        }
      });
    }

    // ── Header (nombre + chevron + badges)
    const memberLabel = hasExtra
      ? `${directM.length} · ${totalM} total`
      : `${directM.length}`;

    card.innerHTML = `
      <div class="ctv2-card-header">
        <div style="display:flex;align-items:center;gap:7px;min-width:0;flex:1">
          ${withToggle && hasKids
            ? `<span class="ctv2-chevron${isOpen ? ' open' : ''}" style="color:${pal.accent}">▶</span>`
            : ''}
          <span class="ctv2-name">${H.escape(cell.name)}</span>
        </div>
        <div class="ctv2-badges">
          <span class="ctv2-badge" style="background:${pal.bg};color:${pal.text};border-color:${pal.border}">
            👥 ${memberLabel}
          </span>
          <span class="ctv2-badge" style="background:${pal.bg};color:${pal.text};border-color:${pal.border}">
            ${CAT_LABELS[cell.category] || cell.category || 'General'}
          </span>
        </div>
      </div>

      <div class="ctv2-meta">
        <span class="ctv2-meta-item">👤 ${H.escape(cell.leader || '—')}</span>
        ${cell.schedule ? `<span class="ctv2-meta-item">📅 ${H.escape(cell.schedule)}</span>` : ''}
        ${cell.location ? `<span class="ctv2-meta-item">📍 ${H.escape(cell.location)}</span>` : ''}
        ${church        ? `<span class="ctv2-meta-item">🏛 ${H.escape(church.name)}</span>` : ''}
        ${hasKids && isOpen
          ? `<span class="ctv2-subbadge" style="background:${pal.bg};color:${pal.text};border-color:${pal.border}">
               ⬡ ${children.length} subcélula${children.length !== 1 ? 's' : ''}
             </span>`
          : ''}
      </div>`;

    // ── Footer (avatars + acciones)
    const footer = document.createElement('div');
    footer.className = 'ctv2-footer';

    // Avatars
    const avatarWrap = document.createElement('div');
    avatarWrap.className = 'ctv2-avatars';
    const shown = directM.slice(0, 5);
    [...shown].reverse().forEach(p => {
      const av = document.createElement('div');
      av.className = 'ctv2-av';
      av.title = H.fullName(p);
      av.style.cssText = `background:${pal.accent}22;color:${pal.accent};border-color:var(--bg-surface,#fff)`;
      if (p.photoUrl) {
        av.innerHTML = `<img src="${H.escape(p.photoUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        av.textContent = H.initials(H.fullName(p));
      }
      avatarWrap.appendChild(av);
    });
    if (directM.length > 5) {
      const more = document.createElement('div');
      more.className = 'ctv2-av ctv2-av-more';
      more.textContent = `+${directM.length - 5}`;
      avatarWrap.appendChild(more);
    }

    // Botones de acción
    const actWrap = document.createElement('div');
    actWrap.style.cssText = 'display:flex;gap:6px;align-items:center';

    const btnMembers = document.createElement('button');
    btnMembers.className = 'ctv2-act-btn';
    btnMembers.title = 'Ver integrantes';
    btnMembers.style.borderColor = pal.border;
    btnMembers.innerHTML = '👥';
    btnMembers.addEventListener('click', e => {
      e.stopPropagation();
      _openMembersModal(cell, pal);
    });
    actWrap.appendChild(btnMembers);

    if (isAdmin) {
      const btnEdit = document.createElement('button');
      btnEdit.className = 'ctv2-act-btn';
      btnEdit.title = 'Editar célula';
      btnEdit.style.borderColor = pal.border;
      btnEdit.innerHTML = IC.edit;
      btnEdit.addEventListener('click', e => {
        e.stopPropagation();
        openModal(cell);
      });
      actWrap.appendChild(btnEdit);
    }

    footer.appendChild(avatarWrap);
    footer.appendChild(actWrap);
    card.appendChild(footer);

    return card;
  }

  // ── Modal Integrantes ───────────────────────────────────

  function _openMembersModal(cell, pal) {
    const members = _countDirectMembers(cell);
    const childrenMap = _buildChildrenMap();
    const totalM = _countTotalMembers(cell.id, childrenMap);

    const rows = members.map(p => `
      <div class="ctv2-member-row">
        <div class="person-cell">
          <div class="person-avatar" style="background:${pal.accent}18;color:${pal.accent}">
            ${p.photoUrl ? `<img src="${H.escape(p.photoUrl)}">` : H.initials(H.fullName(p))}
          </div>
          <div>
            <div class="person-name">${H.escape(H.fullName(p))}</div>
            <div class="person-sub">${H.escape(p.phone || p.email || '')}</div>
          </div>
        </div>
      </div>`).join('');

    Modal.open({
      title: `Integrantes — ${H.escape(cell.name)}`,
      size: 'md',
      body: `
        <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;
             background:${pal.bg};border:1px solid ${pal.border};margin-bottom:16px">
          <span style="font-size:20px">⬡</span>
          <div>
            <div style="font-size:14px;font-weight:600;color:${pal.text}">${H.escape(cell.name)}</div>
            <div style="font-size:12px;color:var(--text-muted)">
              Líder: ${H.escape(cell.leader || '—')} ·
              ${members.length} directo${members.length !== 1 ? 's' : ''}
              ${totalM > members.length ? ` · ${totalM} total (con subcélulas)` : ''}
            </div>
          </div>
        </div>
        ${members.length
          ? `<div class="ctv2-members-list">${rows}</div>`
          : `<div class="table-empty" style="padding:24px"><div class="table-empty-icon">👤</div>Sin integrantes directos</div>`
        }`,
      footer: `<button class="btn btn-ghost" onclick="Modal.close()">Cerrar</button>`,
    });
  }

  // ── Modal Crear / Editar célula ─────────────────────────

  async function openModal(cell) {
    const churches = await API.getChurches().catch(() => []);
    const isEdit   = !!(cell && cell.id);

    const catOpts  = CONFIG.CELL_CATEGORIES.map(c =>
      `<option value="${c.value}" ${cell?.category === c.value ? 'selected' : ''}>${c.label}</option>`
    ).join('');
    const chOpts   = churches.map(c =>
      `<option value="${c.id}" ${cell?.churchId === c.id ? 'selected' : ''}>${H.escape(c.name)}</option>`
    ).join('');
    const parentOpts = _all
      .filter(c => !cell || c.id !== cell.id)
      .map(c => `<option value="${c.id}" ${cell?.parentCellId === c.id ? 'selected' : ''}>${H.escape(c.name)} — ${H.escape(c.leader || '')}</option>`)
      .join('');

    Modal.open({
      title: isEdit ? 'Editar célula' : 'Nueva célula',
      size: 'md',
      body: `
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input class="form-input" id="cl-name" value="${H.escape(cell?.name || '')}" placeholder="Nombre de la célula">
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Líder *</label>
            <input class="form-input" id="cl-leader" value="${H.escape(cell?.leader || '')}">
          </div>
          <div class="form-group">
            <label class="form-label">Categoría</label>
            <select class="form-select" id="cl-cat">
              <option value="">General</option>${catOpts}
            </select>
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Horario</label>
            <input class="form-input" id="cl-sched" value="${H.escape(cell?.schedule || '')}" placeholder="Ej: Lunes 20:00">
          </div>
          <div class="form-group">
            <label class="form-label">Ubicación</label>
            <input class="form-input" id="cl-loc" value="${H.escape(cell?.location || '')}">
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Nexo</label>
            <select class="form-select" id="cl-church">
              <option value="">Sin nexo</option>${chOpts}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Célula padre (jerarquía)</label>
            <select class="form-select" id="cl-parent">
              <option value="">— Sin padre (raíz) —</option>${parentOpts}
            </select>
          </div>
        </div>
        <div id="cl-msg"></div>`,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        ${isEdit ? `<button class="btn btn-danger" style="margin-right:auto" onclick="CellsModule.deleteCell('${cell.id}','${H.escape(cell.name)}')">Eliminar</button>` : ''}
        <button class="btn btn-primary" onclick="CellsModule._submit('${cell?.id || ''}')">
          ${isEdit ? 'Guardar cambios' : 'Crear célula'}
        </button>`,
    });
  }

  async function _submit(id) {
    const data = {
      name:         (document.getElementById('cl-name')?.value || '').trim(),
      leader:       (document.getElementById('cl-leader')?.value || '').trim(),
      category:     document.getElementById('cl-cat')?.value || '',
      schedule:     (document.getElementById('cl-sched')?.value || '').trim(),
      location:     (document.getElementById('cl-loc')?.value || '').trim(),
      churchId:     document.getElementById('cl-church')?.value || '',
      parentCellId: document.getElementById('cl-parent')?.value || '',
    };
    if (id) data.id = id;

    const msgEl = document.getElementById('cl-msg');
    if (!data.name || !data.leader) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">Nombre y líder son requeridos</div>`;
      return;
    }
    const btn = document.querySelector('#modal-overlay .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
    try {
      await API.saveCell(data);
      Modal.close();
      Toast.success(id ? 'Célula actualizada' : 'Célula creada');
      await render();
    } catch (e) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">${H.escape(e.message)}</div>`;
      if (btn) { btn.disabled = false; btn.textContent = id ? 'Guardar cambios' : 'Crear célula'; }
    }
  }

  async function deleteCell(id, name) {
    const ok = await Modal.confirm({
      title: 'Eliminar célula',
      message: `¿Eliminar la célula <strong>${H.escape(name)}</strong>? Esta acción no se puede deshacer.`,
      confirmText: 'Eliminar',
    });
    if (!ok) return;
    try {
      await API.deleteCell(id);
      Toast.success('Célula eliminada');
      await render();
    } catch (e) { Toast.error(e.message); }
  }

  // ── API pública ─────────────────────────────────────────

  return { render, openModal, _submit, deleteCell };
})();

// ═══════════════════════════════════════════════════════════
// CHURCHES MODULE — Rediseño v2
// ═══════════════════════════════════════════════════════════
const ChurchesModule = (() => {

  let _all      = [];
  let _people   = [];
  let _cells    = [];
  let _query    = '';
  let _filter   = 'all'; // 'all' | country code

  // ── Carga ───────────────────────────────────────────────

  async function render() {
    const sect = document.getElementById('sect-churches');
    if (!sect) return;
    sect.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      [_all, _people, _cells] = await Promise.all([
        API.getChurches(),
        API.getPeople().catch(() => []),
        API.getCells().catch(() => []),
      ]);
      sect.innerHTML = '';
      sect.appendChild(_buildPage());
    } catch (e) {
      sect.innerHTML = _renderError(e.message);
    }
  }

  // ── Helpers de datos ────────────────────────────────────

  function _peopleOf(churchId) {
    return _people.filter(p => p.churchId === churchId);
  }

  function _cellsOf(churchId) {
    return _cells.filter(c => c.churchId === churchId);
  }

  function _countries() {
    return [...new Set(_all.map(c => c.country).filter(Boolean))].sort();
  }

  function _countryFlag(country) {
    if (!country) return '🌐';
    const flags = {
      'Argentina':'🇦🇷','Bolivia':'🇧🇴','Brasil':'🇧🇷','Chile':'🇨🇱',
      'Colombia':'🇨🇴','Costa Rica':'🇨🇷','Cuba':'🇨🇺','Rep. Dominicana':'🇩🇴',
      'Ecuador':'🇪🇨','El Salvador':'🇸🇻','Guatemala':'🇬🇹','Honduras':'🇭🇳',
      'México':'🇲🇽','Nicaragua':'🇳🇮','Panamá':'🇵🇦','Paraguay':'🇵🇾',
      'Perú':'🇵🇪','Puerto Rico':'🇵🇷','Uruguay':'🇺🇾','Venezuela':'🇻🇪',
      'Estados Unidos':'🇺🇸','España':'🇪🇸','Italia':'🇮🇹','Portugal':'🇵🇹',
    };
    return flags[country] || '🌐';
  }

  function _initials(name) {
    if (!name) return '?';
    return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');
  }

  // ── Construcción de la página ────────────────────────────

  function _buildPage() {
    const isAdmin    = APP.user?.role === 'admin';
    const countries  = _countries();
    const totalPeople = _people.filter(p => _all.some(c => c.id === p.churchId)).length;

    const wrap = document.createElement('div');
    wrap.className = 'nxv2-page';

    // ── Hero
    const heroEl = document.createElement('div');
    heroEl.className = 'nxv2-hero';
    heroEl.innerHTML = `
      <div class="nxv2-hero-band"></div>
      <div class="nxv2-hero-body">
        <div class="nxv2-hero-left">
          <div class="nxv2-hero-icon">${IC.churches}</div>
          <div>
            <div class="nxv2-hero-eyebrow">Red Eclesiástica</div>
            <h1 class="nxv2-hero-title">Nexos</h1>
          </div>
        </div>
        <div class="nxv2-hero-right">
          <div class="nxv2-stats">
            <div class="nxv2-stat">
              <span class="nxv2-stat-val" style="color:#6D28D9">${_all.length}</span>
              <span class="nxv2-stat-lbl">nexos</span>
            </div>
            <div class="nxv2-stat-sep"></div>
            <div class="nxv2-stat">
              <span class="nxv2-stat-val" style="color:#0891B2">${countries.length}</span>
              <span class="nxv2-stat-lbl">países</span>
            </div>
            <div class="nxv2-stat-sep"></div>
            <div class="nxv2-stat">
              <span class="nxv2-stat-val" style="color:#16A34A">${totalPeople}</span>
              <span class="nxv2-stat-lbl">personas</span>
            </div>
            <div class="nxv2-stat-sep"></div>
            <div class="nxv2-stat">
              <span class="nxv2-stat-val" style="color:#D97706">${_cells.length}</span>
              <span class="nxv2-stat-lbl">células</span>
            </div>
          </div>
          ${isAdmin ? `<button class="btn btn-primary nxv2-new-btn" id="nxv2-new-btn">＋ Nuevo Nexo</button>` : ''}
        </div>
      </div>`;
    wrap.appendChild(heroEl);

    // ── Toolbar: buscador + filtro por país
    const toolbar = document.createElement('div');
    toolbar.className = 'nxv2-toolbar';

    const searchWrap = document.createElement('div');
    searchWrap.className = 'nxv2-search';
    searchWrap.innerHTML = `<span class="nxv2-search-icon">${IC.search}</span>`;
    const searchInput = document.createElement('input');
    searchInput.className = 'nxv2-search-input';
    searchInput.placeholder = 'Buscar nexo, país, pastor...';
    searchInput.value = _query;
    searchInput.addEventListener('input', e => {
      _query = e.target.value.toLowerCase().trim();
      _repaint(gridEl);
    });
    searchWrap.appendChild(searchInput);

    // Pills de país
    const pillsWrap = document.createElement('div');
    pillsWrap.className = 'nxv2-pills';
    pillsWrap.innerHTML = `
      <button class="nxv2-pill${_filter === 'all' ? ' active' : ''}" data-val="all">
        🌎 Todos
      </button>
      ${countries.map(c => `
        <button class="nxv2-pill${_filter === c ? ' active' : ''}" data-val="${H.escape(c)}">
          ${_countryFlag(c)} ${H.escape(c)}
        </button>`).join('')}`;

    pillsWrap.querySelectorAll('.nxv2-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        _filter = btn.dataset.val;
        pillsWrap.querySelectorAll('.nxv2-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _repaint(gridEl);
      });
    });

    toolbar.appendChild(searchWrap);
    toolbar.appendChild(pillsWrap);
    wrap.appendChild(toolbar);

    // ── Grid de cards
    const gridEl = document.createElement('div');
    gridEl.className = 'nxv2-grid';
    _repaint(gridEl);
    wrap.appendChild(gridEl);

    // Wiring
    wrap.querySelector('#nxv2-new-btn')?.addEventListener('click', () => openModal());

    return wrap;
  }

  // ── Render del grid ─────────────────────────────────────

  function _repaint(container) {
    container.innerHTML = '';

    let list = [..._all];
    if (_filter !== 'all') {
      list = list.filter(c => c.country === _filter);
    }
    if (_query) {
      list = list.filter(c =>
        H.matches(c.name, _query)    ||
        H.matches(c.fullName, _query)||
        H.matches(c.country, _query) ||
        H.matches(c.pastors, _query) ||
        H.matches(c.email, _query)
      );
    }

    if (!list.length) {
      container.innerHTML = `
        <div class="nxv2-empty">
          <div class="nxv2-empty-icon">${IC.churches}</div>
          <div class="nxv2-empty-title">${_query || _filter !== 'all' ? 'Sin resultados' : 'No hay nexos'}</div>
          <div class="nxv2-empty-sub">${_query || _filter !== 'all' ? 'Probá con otro filtro.' : 'Creá el primer nexo de la red.'}</div>
          ${APP.user?.role === 'admin' && !_query && _filter === 'all'
            ? `<button class="btn btn-primary" style="margin-top:16px" onclick="ChurchesModule.openModal()">＋ Nuevo Nexo</button>`
            : ''}
        </div>`;
      return;
    }

    list.forEach(church => {
      container.appendChild(_renderCard(church));
    });
  }

  function _renderCard(church) {
    const isAdmin  = APP.user?.role === 'admin';
    const people   = _peopleOf(church.id);
    const cells    = _cellsOf(church.id);
    const flag     = _countryFlag(church.country);
    const pastors  = (church.pastors || '').split(',').map(s => s.trim()).filter(Boolean);
    const hasLogo  = !!church.logoUrl;

    const card = document.createElement('div');
    card.className = 'nxv2-card';

    // ── Header con logo / iniciales
    const logoEl = hasLogo
      ? `<img src="${H.escape(church.logoUrl)}" alt="${H.escape(church.name)}" class="nxv2-logo-img">`
      : `<div class="nxv2-logo-initials">${_initials(church.name)}</div>`;

    card.innerHTML = `
      <div class="nxv2-card-header">
        <div class="nxv2-logo">${logoEl}</div>
        <div class="nxv2-card-top">
          <div class="nxv2-card-name">${H.escape(church.name)}</div>
          ${church.fullName && church.fullName !== church.name
            ? `<div class="nxv2-card-fullname">${H.escape(church.fullName)}</div>`
            : ''}
          <div class="nxv2-country-pill">
            <span>${flag}</span>
            <span>${H.escape(church.country || '—')}</span>
          </div>
        </div>
        ${isAdmin ? `
          <button class="nxv2-edit-btn" id="nxv2-edit-${church.id}" title="Editar nexo">
            ${IC.edit}
          </button>` : ''}
      </div>

      <div class="nxv2-divider"></div>

      <div class="nxv2-card-body">
        ${pastors.length ? `
          <div class="nxv2-info-row">
            <span class="nxv2-info-icon">👑</span>
            <div class="nxv2-info-content">
              <span class="nxv2-info-label">Pastor${pastors.length > 1 ? 'es' : ''}</span>
              <span class="nxv2-info-value">${pastors.map(p => H.escape(p)).join(' · ')}</span>
            </div>
          </div>` : ''}

        ${church.address ? `
          <div class="nxv2-info-row">
            <span class="nxv2-info-icon">📍</span>
            <div class="nxv2-info-content">
              <span class="nxv2-info-label">Dirección</span>
              <span class="nxv2-info-value">${H.escape(church.address)}</span>
            </div>
          </div>` : ''}

        ${church.email ? `
          <div class="nxv2-info-row">
            <span class="nxv2-info-icon">✉</span>
            <div class="nxv2-info-content">
              <span class="nxv2-info-label">Email</span>
              <span class="nxv2-info-value">
                <a href="mailto:${H.escape(church.email)}" class="nxv2-link" onclick="event.stopPropagation()">
                  ${H.escape(church.email)}
                </a>
              </span>
            </div>
          </div>` : ''}

        ${church.phone ? `
          <div class="nxv2-info-row">
            <span class="nxv2-info-icon">📞</span>
            <div class="nxv2-info-content">
              <span class="nxv2-info-label">Teléfono</span>
              <span class="nxv2-info-value">${H.escape(church.phone)}</span>
            </div>
          </div>` : ''}
      </div>

      <div class="nxv2-card-footer">
        <div class="nxv2-footer-stats">
          <div class="nxv2-footer-stat">
            <span class="nxv2-footer-stat-val">${people.length}</span>
            <span class="nxv2-footer-stat-lbl">persona${people.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="nxv2-footer-stat-sep"></div>
          <div class="nxv2-footer-stat">
            <span class="nxv2-footer-stat-val">${cells.length}</span>
            <span class="nxv2-footer-stat-lbl">célula${cells.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        ${isAdmin ? `
          <button class="nxv2-detail-btn" id="nxv2-detail-${church.id}">
            Ver detalle →
          </button>` : ''}
      </div>`;

    // Wiring botones
    card.querySelector(`#nxv2-edit-${church.id}`)?.addEventListener('click', e => {
      e.stopPropagation();
      openModal(church);
    });
    card.querySelector(`#nxv2-detail-${church.id}`)?.addEventListener('click', e => {
      e.stopPropagation();
      _openDetailModal(church, people, cells);
    });

    return card;
  }

  // ── Modal de detalle ─────────────────────────────────────

  function _openDetailModal(church, people, cells) {
    const flag    = _countryFlag(church.country);
    const pastors = (church.pastors || '').split(',').map(s => s.trim()).filter(Boolean);

    const peopleRows = people.slice(0, 10).map(p => `
      <div class="nxv2-member-row">
        <div class="person-cell">
          <div class="person-avatar" style="background:#EDE9FE;color:#6D28D9">
            ${p.photoUrl ? `<img src="${H.escape(p.photoUrl)}">` : H.initials(H.fullName(p))}
          </div>
          <div>
            <div class="person-name">${H.escape(H.fullName(p))}</div>
            <div class="person-sub">${H.escape(p.phone || p.email || '')}</div>
          </div>
        </div>
      </div>`).join('');

    const cellRows = cells.map(c => `
      <div class="nxv2-cell-row">
        <span style="font-size:16px">⬡</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${H.escape(c.name)}</div>
          <div style="font-size:11px;color:var(--text-muted)">Líder: ${H.escape(c.leader || '—')}</div>
        </div>
        ${c.schedule ? `<span style="font-size:11px;color:var(--text-muted);white-space:nowrap">${H.escape(c.schedule)}</span>` : ''}
      </div>`).join('');

    Modal.open({
      title: `${flag} ${church.name}`,
      size: 'lg',
      body: `
        <div class="nxv2-detail-grid">

          <div class="nxv2-detail-section">
            <div class="nxv2-detail-section-title">Información</div>
            ${church.fullName ? `
              <div class="nxv2-detail-row">
                <span class="nxv2-detail-label">Nombre completo</span>
                <span class="nxv2-detail-val">${H.escape(church.fullName)}</span>
              </div>` : ''}
            <div class="nxv2-detail-row">
              <span class="nxv2-detail-label">País</span>
              <span class="nxv2-detail-val">${flag} ${H.escape(church.country || '—')}</span>
            </div>
            ${church.address ? `
              <div class="nxv2-detail-row">
                <span class="nxv2-detail-label">Dirección</span>
                <span class="nxv2-detail-val">${H.escape(church.address)}</span>
              </div>` : ''}
            ${church.email ? `
              <div class="nxv2-detail-row">
                <span class="nxv2-detail-label">Email</span>
                <span class="nxv2-detail-val">
                  <a href="mailto:${H.escape(church.email)}" class="nxv2-link">${H.escape(church.email)}</a>
                </span>
              </div>` : ''}
            ${church.phone ? `
              <div class="nxv2-detail-row">
                <span class="nxv2-detail-label">Teléfono</span>
                <span class="nxv2-detail-val">${H.escape(church.phone)}</span>
              </div>` : ''}
            ${pastors.length ? `
              <div class="nxv2-detail-row">
                <span class="nxv2-detail-label">Pastores</span>
                <div style="display:flex;flex-direction:column;gap:4px">
                  ${pastors.map(p => `
                    <span class="nxv2-pastor-chip">👑 ${H.escape(p)}</span>`).join('')}
                </div>
              </div>` : ''}
          </div>

          <div class="nxv2-detail-section">
            <div class="nxv2-detail-section-title" style="display:flex;justify-content:space-between">
              <span>Personas <span class="nxv2-count-badge">${people.length}</span></span>
            </div>
            ${people.length
              ? `<div class="nxv2-members-list">${peopleRows}</div>
                 ${people.length > 10
                    ? `<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:8px">
                         +${people.length - 10} más...
                       </div>`
                    : ''}`
              : `<div class="nxv2-empty-sm">Sin personas asociadas</div>`}
          </div>

          <div class="nxv2-detail-section nxv2-detail-full">
            <div class="nxv2-detail-section-title">
              Células <span class="nxv2-count-badge">${cells.length}</span>
            </div>
            ${cells.length
              ? `<div class="nxv2-cells-list">${cellRows}</div>`
              : `<div class="nxv2-empty-sm">Sin células asociadas</div>`}
          </div>

        </div>`,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close()">Cerrar</button>
        ${APP.user?.role === 'admin'
          ? `<button class="btn btn-primary" onclick="Modal.close(); ChurchesModule.openModal(${JSON.stringify(church).replace(/"/g, '&quot;')})">
               ${IC.edit} Editar nexo
             </button>`
          : ''}`,
    });
  }

  // ── Modal Crear / Editar ─────────────────────────────────

  async function openModal(ch) {
    const isEdit = !!(ch && ch.id);
    Modal.open({
      title: isEdit ? `Editar — ${H.escape(ch.name)}` : 'Nuevo Nexo',
      size: 'md',
      body: `
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Nombre corto *</label>
            <input class="form-input" id="ch-name" value="${H.escape(ch?.name || '')}" placeholder="Ej: JCV Central">
          </div>
          <div class="form-group">
            <label class="form-label">Nombre completo</label>
            <input class="form-input" id="ch-full" value="${H.escape(ch?.fullName || '')}" placeholder="Nombre oficial">
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">País *</label>
            <input class="form-input" id="ch-country" value="${H.escape(ch?.country || 'Argentina')}" placeholder="Argentina">
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input class="form-input" id="ch-phone" type="tel" value="${H.escape(ch?.phone || '')}" placeholder="+54 11...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Dirección</label>
          <input class="form-input" id="ch-addr" value="${H.escape(ch?.address || '')}" placeholder="Calle, número, ciudad">
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="ch-email" type="email" value="${H.escape(ch?.email || '')}" placeholder="contacto@iglesia.com">
          </div>
          <div class="form-group">
            <label class="form-label">Pastores</label>
            <input class="form-input" id="ch-pastors" value="${H.escape(ch?.pastors || '')}" placeholder="Nombre1, Nombre2">
          </div>
        </div>
        <div id="ch-msg"></div>`,
      footer: `
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        ${isEdit
          ? `<button class="btn btn-danger" style="margin-right:auto"
               onclick="ChurchesModule.deleteChurch('${ch.id}','${H.escape(ch.name)}')">
               Eliminar
             </button>`
          : ''}
        <button class="btn btn-primary" onclick="ChurchesModule._submit('${ch?.id || ''}')">
          ${isEdit ? 'Guardar cambios' : 'Crear nexo'}
        </button>`,
    });
  }

  async function _submit(id) {
    const data = {
      name:     (document.getElementById('ch-name')?.value || '').trim(),
      fullName: (document.getElementById('ch-full')?.value || '').trim(),
      country:  (document.getElementById('ch-country')?.value || '').trim(),
      email:    (document.getElementById('ch-email')?.value || '').trim(),
      phone:    (document.getElementById('ch-phone')?.value || '').trim(),
      pastors:  (document.getElementById('ch-pastors')?.value || '').trim(),
      address:  (document.getElementById('ch-addr')?.value || '').trim(),
    };
    if (id) data.id = id;

    const msgEl = document.getElementById('ch-msg');
    if (!data.name || !data.country) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">Nombre y país son requeridos</div>`;
      return;
    }
    const btn = document.querySelector('#modal-overlay .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
    try {
      await API.saveChurch(data);
      Modal.close();
      Toast.success(id ? 'Nexo actualizado' : 'Nexo creado');
      await render();
    } catch (e) {
      if (msgEl) msgEl.innerHTML = `<div class="form-msg form-msg-error">${H.escape(e.message)}</div>`;
      if (btn) { btn.disabled = false; btn.textContent = id ? 'Guardar cambios' : 'Crear nexo'; }
    }
  }

  /*function _onSearch(q) {
    _filtered = H.filterBySearch(_all, q, ['name','country','pastors','email']);
    _renderTable();
    const tot = document.getElementById('ch-total');
    if (tot) tot.textContent = _filtered.length;
  }*/

  async function deleteChurch(id, name) {
    const ok = await Modal.confirm({
      title: 'Eliminar nexo',
      message: `¿Eliminar el nexo <strong>${H.escape(name)}</strong>? Se desvinculará de todas las personas y células asociadas.`,
      confirmText: 'Eliminar',
    });
    if (!ok) return;
    Modal.close();
    try {
      await API.deleteChurch(id);
      Toast.success('Nexo eliminado');
      await render();
    } catch (e) { Toast.error(e.message); }
  }

  return { render, openModal, _submit, deleteChurch };
})();

// ═══════════════════════════════════════════════════════════
// MINISTRIES MODULE — Rediseño v2
// ═══════════════════════════════════════════════════════════
const MinistriesModule = (() => {

  let _all     = [];
  let _people  = [];
  let _query   = '';
  let _typeFilter = 'all';

  // ── Configuración de tipos ──────────────────────────────

  const TYPE_CFG = {
    alabanza:    { label:'Alabanza',      icon:'🎵', color:'#7C3AED', bg:'#F5F3FF', border:'#EDE9FE', dark:'#4C1D95' },
    ensenanza:   { label:'Enseñanza',     icon:'📖', color:'#1D4ED8', bg:'#EFF6FF', border:'#BFDBFE', dark:'#1E3A8A' },
    ujieres:     { label:'Ujieres',       icon:'🤝', color:'#15803D', bg:'#F0FDF4', border:'#BBF7D0', dark:'#14532D' },
    intercesion: { label:'Intercesión',   icon:'🙏', color:'#92400E', bg:'#FFFBEB', border:'#FDE68A', dark:'#78350F' },
    evangelismo: { label:'Evangelismo',   icon:'📢', color:'#991B1B', bg:'#FEF2F2', border:'#FECACA', dark:'#7F1D1D' },
    jovenes:     { label:'Jóvenes',       icon:'⚡', color:'#0E7490', bg:'#ECFEFF', border:'#A5F3FC', dark:'#164E63' },
    ninos:       { label:'Niños',         icon:'⭐', color:'#9A3412', bg:'#FFF7ED', border:'#FED7AA', dark:'#7C2D12' },
    medios:      { label:'Medios',        icon:'🎬', color:'#9D174D', bg:'#FDF2F8', border:'#FBCFE8', dark:'#831843' },
    accion:      { label:'Acción Social', icon:'☕', color:'#44403C', bg:'#F5F5F4', border:'#D6D3D1', dark:'#292524' },
    otro:        { label:'Otro',          icon:'✦',  color:'#3730A3', bg:'#EEF2FF', border:'#C7D2FE', dark:'#312E81' },
  };

  function _tc(type) {
    return TYPE_CFG[type] || TYPE_CFG.otro;
  }

  // ── Carga ───────────────────────────────────────────────

  async function render() {
    const sect = document.getElementById('sect-ministries');
    if (!sect) return;
    sect.innerHTML = `<div class="sect-loading"><div class="spinner"></div></div>`;
    try {
      [_all, _people] = await Promise.all([
        API.getMinistries(),
        API.getPeople().catch(() => []),
      ]);
      sect.innerHTML = '';
      sect.appendChild(_buildPage());
    } catch (e) {
      sect.innerHTML = _renderError(e.message);
    }
  }

  // ── Construcción de la página ────────────────────────────

  function _buildPage() {
    const isAdmin       = APP.user?.role === 'admin';
    const totalMembers  = new Set(_all.flatMap(m => m.memberIds || [])).size;
    const activeTypes   = [...new Set(_all.map(m => m.type).filter(Boolean))];

    const wrap = document.createElement('div');
    wrap.className = 'mnv2-page';

    // ── Hero
    wrap.innerHTML = `
      <div class="mnv2-hero">
        <div class="mnv2-hero-band"></div>
        <div class="mnv2-hero-body">
          <div class="mnv2-hero-left">
            <div class="mnv2-hero-icon">${IC.ministries}</div>
            <div>
              <div class="mnv2-hero-eyebrow">Equipos de Servicio</div>
              <h1 class="mnv2-hero-title">Ministerios</h1>
            </div>
          </div>
          <div class="mnv2-hero-right">
            <div class="mnv2-stats">
              <div class="mnv2-stat">
                <span class="mnv2-stat-val" style="color:#7C3AED">${_all.length}</span>
                <span class="mnv2-stat-lbl">ministerios</span>
              </div>
              <div class="mnv2-stat-sep"></div>
              <div class="mnv2-stat">
                <span class="mnv2-stat-val" style="color:#16A34A">${totalMembers}</span>
                <span class="mnv2-stat-lbl">integrantes</span>
              </div>
              <div class="mnv2-stat-sep"></div>
              <div class="mnv2-stat">
                <span class="mnv2-stat-val" style="color:#0E7490">${activeTypes.length}</span>
                <span class="mnv2-stat-lbl">tipos activos</span>
              </div>
            </div>
            ${isAdmin
              ? `<button class="btn btn-primary mnv2-new-btn" id="mnv2-new-btn">＋ Nuevo Ministerio</button>`
              : ''}
          </div>
        </div>
      </div>`;

    // ── Toolbar
    const toolbar = document.createElement('div');
    toolbar.className = 'mnv2-toolbar';

    // Buscador
    const searchWrap = document.createElement('div');
    searchWrap.className = 'mnv2-search';
    searchWrap.innerHTML = `<span class="mnv2-search-icon">${IC.search}</span>`;
    const searchInput = document.createElement('input');
    searchInput.className = 'mnv2-search-input';
    searchInput.placeholder = 'Buscar ministerio o líder...';
    searchInput.value = _query;
    searchInput.addEventListener('input', e => {
      _query = e.target.value.toLowerCase().trim();
      _repaint(gridEl);
    });
    searchWrap.appendChild(searchInput);

    // Pills de tipo (solo los que existen)
    const pillsWrap = document.createElement('div');
    pillsWrap.className = 'mnv2-pills';

    const allPill = document.createElement('button');
    allPill.className = 'mnv2-pill' + (_typeFilter === 'all' ? ' active' : '');
    allPill.dataset.val = 'all';
    allPill.innerHTML = `✦ Todos`;
    allPill.addEventListener('click', () => _setTypeFilter('all', allPill, pillsWrap, gridEl));
    pillsWrap.appendChild(allPill);

    activeTypes.forEach(type => {
      const tc  = _tc(type);
      const btn = document.createElement('button');
      btn.className = 'mnv2-pill' + (_typeFilter === type ? ' active' : '');
      btn.dataset.val = type;
      btn.innerHTML = `${tc.icon} ${tc.label}`;
      if (_typeFilter === type) {
        btn.style.cssText = `background:${tc.bg};color:${tc.color};border-color:${tc.border}`;
      }
      btn.addEventListener('click', () => _setTypeFilter(type, btn, pillsWrap, gridEl));
      pillsWrap.appendChild(btn);
    });

    toolbar.appendChild(searchWrap);
    toolbar.appendChild(pillsWrap);
    wrap.appendChild(toolbar);

    // ── Grid
    const gridEl = document.createElement('div');
    gridEl.className = 'mnv2-grid';
    _repaint(gridEl);
    wrap.appendChild(gridEl);

    // Wiring
    wrap.querySelector('#mnv2-new-btn')?.addEventListener('click', () => openModal());

    return wrap;
  }

  function _setTypeFilter(val, activeBtn, pillsWrap, gridEl) {
    _typeFilter = val;
    pillsWrap.querySelectorAll('.mnv2-pill').forEach(b => {
      b.classList.remove('active');
      b.style.cssText = '';
    });
    activeBtn.classList.add('active');
    if (val !== 'all') {
      const tc = _tc(val);
      activeBtn.style.cssText = `background:${tc.bg};color:${tc.color};border-color:${tc.border}`;
    }
    _repaint(gridEl);
  }

  // ── Render del grid ─────────────────────────────────────

  function _repaint(container) {
    container.innerHTML = '';

    let list = [..._all];
    if (_typeFilter !== 'all') list = list.filter(m => m.type === _typeFilter);
    if (_query) {
      list = list.filter(m =>
        H.matches(m.name,        _query) ||
        H.matches(m.leaders,     _query) ||
        H.matches(m.description, _query) ||
        H.matches(m.type,        _query)
      );
    }

    if (!list.length) {
      const isAdmin = APP.user?.role === 'admin';
      container.innerHTML = `
        <div class="mnv2-empty">
          <div class="mnv2-empty-icon">${IC.ministries}</div>
          <div class="mnv2-empty-title">${_query || _typeFilter !== 'all' ? 'Sin resultados' : 'No hay ministerios'}</div>
          <div class="mnv2-empty-sub">${_query || _typeFilter !== 'all' ? 'Probá con otro filtro.' : 'Creá el primer ministerio del equipo.'}</div>
          ${isAdmin && !_query && _typeFilter === 'all'
            ? `<button class="btn btn-primary" style="margin-top:16px" onclick="MinistriesModule.openModal()">＋ Nuevo Ministerio</button>`
            : ''}
        </div>`;
      return;
    }

    list.forEach(m => container.appendChild(_renderCard(m)));
  }

  // ── Card ────────────────────────────────────────────────

  function _renderCard(ministry) {
    const isAdmin  = APP.user?.role === 'admin';
    const tc       = _tc(ministry.type);
    const memberIds = ministry.memberIds || [];
    const members  = _people.filter(p => memberIds.includes(p.id));
    const leaders  = (ministry.leaders || '').split(',').map(s => s.trim()).filter(Boolean);

    const card = document.createElement('div');
    card.className = 'mnv2-card';

    // Banda de color superior
    const band = document.createElement('div');
    band.className = 'mnv2-card-band';
    band.style.background = `linear-gradient(90deg, ${tc.color}, ${tc.color}99)`;
    card.appendChild(band);

    const body = document.createElement('div');
    body.className = 'mnv2-card-body';

    // ── Header: icono + nombre + tipo
    body.innerHTML = `
      <div class="mnv2-card-header">
        <div class="mnv2-type-icon" style="background:${tc.bg};color:${tc.color};border-color:${tc.border}">
          ${tc.icon}
        </div>
        <div class="mnv2-card-title-wrap">
          <div class="mnv2-card-name">${H.escape(ministry.name)}</div>
          <span class="mnv2-type-chip" style="background:${tc.bg};color:${tc.color};border-color:${tc.border}">
            ${tc.icon} ${tc.label}
          </span>
        </div>
        ${isAdmin ? `<button class="mnv2-edit-btn" id="mnv2-edit-${ministry.id}" title="Editar">${IC.edit}</button>` : ''}
      </div>

      ${ministry.description ? `
        <p class="mnv2-desc">${H.escape(ministry.description)}</p>` : ''}

      <div class="mnv2-meta">
        ${leaders.length ? `
          <div class="mnv2-meta-row">
            <span class="mnv2-meta-icon">👑</span>
            <span class="mnv2-meta-val">${leaders.map(l => H.escape(l)).join(' · ')}</span>
          </div>` : ''}
        ${ministry.schedule ? `
          <div class="mnv2-meta-row">
            <span class="mnv2-meta-icon">📅</span>
            <span class="mnv2-meta-val">${H.escape(ministry.schedule)}</span>
          </div>` : ''}
        ${ministry.location ? `
