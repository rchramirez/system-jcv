const H = {

  /** Formatea fecha ISO → DD/MM/YYYY */
  date(iso) {
    if (!iso) return '—';
    const d = new Date(iso + (iso.includes('T') ? '' : 'T12:00:00'));
    if (isNaN(d)) return '—';
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  },

  /** Formatea fecha ISO → "Hace 2 días", "Hace 3 horas" */
  timeAgo(iso) {
    if (!iso) return '—';
    const d    = new Date(iso);
    const diff = Date.now() - d.getTime();
    const m    = Math.floor(diff / 60000);
    if (m < 1)   return 'Hace un momento';
    if (m < 60)  return `Hace ${m} min`;
    const h = Math.floor(m / 60);
    if (h < 24)  return `Hace ${h}h`;
    const days = Math.floor(h / 24);
    if (days < 7) return `Hace ${days} día${days > 1 ? 's' : ''}`;
    return H.date(iso);
  },

  /** Nombre completo de una persona */
  fullName(person) {
    if (!person) return '—';
    return [person.name, person.lastName].filter(Boolean).join(' ') || '—';
  },

  /** Iniciales para avatar */
  initials(name) {
    if (!name) return '?';
    return name.trim().split(/\s+/).slice(0, 2)
      .map(w => w[0].toUpperCase()).join('');
  },

  /** Normaliza estado para comparación */
  isStatus(enrollment, ...statuses) {
    const s = (enrollment.status || '').toLowerCase();
    return statuses.some(st => {
      const vals = CONFIG.ENROLLMENT_STATUS[st.toUpperCase()] || [st];
      return vals.includes(s);
    });
  },

  /** Calcula promedio de notas */
  calcAverage(scores) {
    if (!scores) return null;
    const vals = CONFIG.SCORE_FIELDS
      .map(f => parseFloat(scores[f]))
      .filter(v => !isNaN(v));
    if (!vals.length) return null;
    return Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 100) / 100;
  },

  /** Verifica si todas las notas están cargadas */
  isComplete(scores) {
    if (!scores) return false;
    return CONFIG.SCORE_FIELDS.every(f => {
      const v = scores[f];
      return v !== '' && v !== undefined && v !== null;
    });
  },

  /** Label del estado de inscripción */
  statusLabel(status) {
    return STATUS_LABELS[status] || status || '—';
  },

  /** Clase CSS del badge de estado */
  statusBadge(status) {
    return STATUS_COLORS[status] || 'badge-gray';
  },

  /** Label del grado */
  gradeLabel(grade) {
    return CONFIG.GRADES[grade] ? CONFIG.GRADES[grade].label : grade || '—';
  },

  /** Label del tipo de ministerio */
  ministryTypeLabel(type) {
    const found = CONFIG.MINISTRY_TYPES.find(t => t.value === type);
    return found ? found.label : type || '—';
  },

  /** Label del género */
  genderLabel(gender) {
    const found = CONFIG.GENDERS.find(g => g.value === gender);
    return found ? found.label : gender || '—';
  },

  /** Trunca texto largo con elipsis */
  truncate(text, max) {
    if (!text) return '';
    max = max || 40;
    return text.length > max ? text.slice(0, max) + '…' : text;
  },

  /** Construye query string de búsqueda normalizado */
  normalizeSearch(str) {
    return (str || '').toLowerCase().normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '').trim();
  },

  /** Verifica si texto contiene búsqueda (con diacríticos) */
  matches(text, search) {
    if (!search) return true;
    return H.normalizeSearch(String(text || '')).includes(H.normalizeSearch(search));
  },

  /** Filtra array por texto en múltiples campos */
  filterBySearch(items, search, fields) {
    if (!search) return items;
    const q = H.normalizeSearch(search);
    return items.filter(item =>
      fields.some(f => H.normalizeSearch(String(item[f] || '')).includes(q))
    );
  },

  /** Ordena array por campo */
  sortBy(items, field, dir) {
    dir = dir || 'asc';
    return [...items].sort((a, b) => {
      const av = a[field] || '', bv = b[field] || '';
      const cmp = av < bv ? -1 : av > bv ? 1 : 0;
      return dir === 'desc' ? -cmp : cmp;
    });
  },

  /** Pagina un array en memoria */
  paginate(items, page, size) {
    size = size || CONFIG.PAGE_SIZE;
    const total = items.length;
    const pages = Math.max(1, Math.ceil(total / size));
    const p     = Math.min(Math.max(1, page || 1), pages);
    const start = (p - 1) * size;
    return {
      rows:     items.slice(start, start + size),
      total,
      page:     p,
      pages,
      pageSize: size,
    };
  },

  /** Convierte notas al color del badge */
  scoreBadge(score) {
    const n = parseFloat(score);
    if (isNaN(n)) return 'badge-gray';
    if (n >= 8)  return 'badge-green';
    if (n >= 6)  return 'badge-blue';
    return 'badge-red';
  },

  /** Crea HTML de badge de estado */
  badge(status) {
    return `<span class="badge ${H.statusBadge(status)}">${H.statusLabel(status)}</span>`;
  },

  /** Crea HTML de badge de nota */
  scoreBadgeHtml(score) {
    if (score === '' || score === null || score === undefined) {
      return `<span class="badge badge-gray">—</span>`;
    }
    return `<span class="badge ${H.scoreBadge(score)}">${parseFloat(score).toFixed(1)}</span>`;
  },

  /** Obtiene color CSS de grado para inline styles */
  gradeStyle(grade, dark) {
    const c = GRADE_COLORS[grade];
    if (!c) return '';
    if (dark) return `background:${c.dark.bg};color:${c.dark.text};`;
    return `background:${c.bg};color:${c.text};border:1px solid ${c.border};`;
  },

  /** Debounce */
  debounce(fn, ms) {
    let t;
    return function(...args) {
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), ms);
    };
  },

  /** Escapa HTML para evitar XSS en templates */
  escape(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  },

  /** Descarga datos como CSV */
  downloadCSV(rows, headers, filename) {
    const csvHeaders = headers.map(h => `"${h.label}"`).join(',');
    const csvRows = rows.map(row =>
      headers.map(h => {
        const v = row[h.field] || '';
        return `"${String(v).replace(/"/g, '""')}"`;
      }).join(',')
    );
    const blob = new Blob(
      ['\uFEFF' + csvHeaders + '\n' + csvRows.join('\n')],
      { type: 'text/csv;charset=utf-8;' }
    );
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href  = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
  },
};
</script>
